    async function connectCurrentCloudProfile() {
      const profile = state.cloudProfile || { mode: "local" };

      if (profile.mode === "local") {
        return firebaseService.connect({ mode: "local" });
      }

      if (profile.mode === "shared") {
        const shared = window.PRICE_TRACKER_SHARED_FIREBASE_CONFIG;
        return firebaseService.connect({
          mode: "shared",
          firebaseConfig: shared.firebase,
          requireApproval: shared.approval?.required === true,
          approvedCollection: shared.approval?.approvedCollection,
          requestCollection: shared.approval?.requestCollection,
          firestoreRoot: shared.paths?.firestoreRoot,
          storageRoot: shared.paths?.storageRoot
        });
      }

      return firebaseService.connect({
        mode: "own",
        firebaseConfig: profile.ownFirebase,
        requireApproval: false,
        firestoreRoot: "users",
        storageRoot: "users"
      });
    }

    async function selectCloudMode(mode) {
      if (!["local", "shared", "own"].includes(mode)) return;

      if (mode === "local") {
        state.cloudProfile = cloudProfileService.saveLocal();
        state.cloudChoiceRequired = false;
        await firebaseService.connect({ mode: "local" });
        showToast("已使用本機模式。");
        if (state.cloudOnboarding) renderHome();
        else renderCloudSettings();
        return;
      }

      if (mode === "shared") {
        state.cloudProfile = cloudProfileService.saveShared();
        state.cloudChoiceRequired = false;
        renderCloudSettings();
        await connectCurrentCloudProfile();
        if (state.currentViewKey === "settings:cloud") {
          renderCloudSettings();
        }
        return;
      }

      state.cloudProfile = {
        ...state.cloudProfile,
        mode: "own"
      };
      state.cloudChoiceRequired = false;
      renderCloudSettings();
    }

    function readOwnFirebaseConfigFromForm() {
      return {
        apiKey: document.querySelector("#ownFirebaseApiKey")?.value || "",
        authDomain: document.querySelector("#ownFirebaseAuthDomain")?.value || "",
        projectId: document.querySelector("#ownFirebaseProjectId")?.value || "",
        storageBucket: document.querySelector("#ownFirebaseStorageBucket")?.value || "",
        messagingSenderId: document.querySelector("#ownFirebaseMessagingSenderId")?.value || "",
        appId: document.querySelector("#ownFirebaseAppId")?.value || ""
      };
    }

    async function saveOwnFirebaseProfile() {
      const config = cloudProfileService.normalizeFirebaseConfig(
        readOwnFirebaseConfigFromForm()
      );

      if (!cloudProfileService.isCompleteFirebaseConfig(config)) {
        showToast("請填寫全部六個 Firebase Web App config 欄位。");
        return;
      }

      state.cloudProfile = cloudProfileService.saveOwn(config);
      state.cloudChoiceRequired = false;
      renderCloudSettings();
      await connectCurrentCloudProfile();

      if (state.cloud.initialized) {
        showToast("Firebase 已連接，請使用 Google 登入。");
      } else {
        showToast("Firebase 連接失敗，請檢查設定。");
      }

      if (state.currentViewKey === "settings:cloud") {
        renderCloudSettings();
      }
    }

    async function reconnectCloud() {
      try {
        await connectCurrentCloudProfile();
        if (state.cloud.initialized) {
          showToast("Firebase 已連接。");
        } else {
          showToast("仍未能連接 Firebase。");
        }
      } catch (error) {
        showToast(error?.message || "Firebase 連接失敗。");

    function removeMissingImageReferencesFromData(entries = []) {
      const productKeys = new Set(
        entries
          .filter((entry) => entry?.type === "products")
          .map((entry) => cleanString(entry.imageKey))
          .filter(Boolean)
      );
      const storeKeys = new Set(
        entries
          .filter((entry) => entry?.type === "stores")
          .map((entry) => cleanString(entry.imageKey))
          .filter(Boolean)
      );

      state.data = normalizeAppData({
        ...state.data,
        products: state.data.products.map((product) =>
          productKeys.has(
            cleanString(product.productImageKey || product.imageKey)
          )
            ? {
                ...product,
                productImageKey: "",
                imageKey: "",
                productImageUpdatedAt: ""
              }
            : product
        ),
        stores: state.data.stores.map((store) =>
          storeKeys.has(cleanString(store.logoKey))
            ? {
                ...store,
                logoKey: "",
                logoUpdatedAt: ""
              }
            : store
        )
      });

      return productKeys.size + storeKeys.size;
    }

    async function initializeCloudFromLocal() {
      const localCounts = state.cloudSync.localCounts || {};
      const cloudCounts = state.cloudSync.cloudCounts || {};
      const localTotal = cloudSyncTotal(localCounts);
      const cloudTotal = cloudSyncTotal(cloudCounts);

      const localImageStatus = await cloudImageService.inspectLocal();
      if (localImageStatus.missingLocalCount) {
        const repair = await showNativeConfirm({
          title: "本機有失效圖片引用",
          message:
            `有 ${localImageStatus.missingLocalCount} 個產品圖片或店舖 Logo 引用，但圖片檔已不在本機。` +
            "如繼續，系統會先保存文字安全備份，再只移除失效圖片欄位；產品、價格及店舖資料會保留。",
          confirmLabel: "修復並繼續"
        });
        if (!repair) return;

        dataService.createSafetyBackup(state.data, {
          reason: "before-local-cloud-init-image-reference-repair",
          createdAt: new Date().toISOString()
        });
        removeMissingImageReferencesFromData(localImageStatus.missing);
        saveData({ cloud: false });
      }

      const ok = await showNativeConfirm({
        title: "以本機資料取代 Cloud？",
        message:
          `將會用此裝置的 ${localTotal} 項記錄完整取代 Cloud 現有 ${cloudTotal} 項記錄。` +
          "不會 merge；完成後圖片及店舖 Logo 會自動同步。",
        confirmLabel: "上載並取代"
      });

      if (!ok) return;

      try {
        await cloudSyncService.initializeFromLocal();
        showToast("Cloud 主資料已建立，之後會自動同步。");
        renderCloudSettings();
      } catch (error) {
        showToast(error?.message || "未能建立 Cloud 主資料。");
      }
    }

    function installCategoryEditorViewportTracking(overlay) {
      const viewport = window.visualViewport;
      const sync = () => {
        if (!overlay?.isConnected) return;
        const height = viewport?.height || window.innerHeight;
        const offsetTop = viewport?.offsetTop || 0;
        overlay.style.setProperty("--picker-visible-height", `${Math.max(280, height)}px`);
        overlay.style.setProperty("--picker-offset-top", `${Math.max(0, offsetTop)}px`);
      };
      sync();
      if (!viewport) return () => {};
      viewport.addEventListener("resize", sync);
      viewport.addEventListener("scroll", sync);
      return () => {
        viewport.removeEventListener("resize", sync);
        viewport.removeEventListener("scroll", sync);
      };
    }

    function closeCategoryEditorSheet(options = {}) {
      const overlay = document.querySelector(".category-editor-overlay");
      if (!overlay) return;
      overlay._viewportCleanup?.();
      overlay.remove();
      document.documentElement.classList.remove("ios-picker-locked");
      document.body.classList.remove("ios-picker-open");
      app.classList.remove("is-modal-locked");
      setAppScrollTop(state.categoryEditorScrollY || 0);
      state.categoryEditorScrollY = 0;
      if (!options.silent) app.focus?.();
    }

    function mountCategoryEditorSheet({ title, formHtml, onSubmit, onChange }) {
      closeCategoryEditorSheet({ silent: true });
      closeObservationStorePicker({ silent: true });
      const overlay = document.createElement("div");
      overlay.className = "ios-picker-overlay category-editor-overlay";
      overlay.innerHTML = `
        <section class="ios-picker-sheet category-editor-sheet" role="dialog" aria-modal="true" aria-labelledby="categoryEditorTitle">
          <div class="ios-picker-handle" aria-hidden="true"></div>
          <header class="ios-picker-header">
            <h2 class="ios-picker-title" id="categoryEditorTitle">${escapeHtml(title)}</h2>
            <button class="ios-picker-close" type="button" data-action="close-category-editor">取消</button>
          </header>
          <div class="category-editor-body">${formHtml}</div>
        </section>
      `;
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay || event.target.closest('[data-action="close-category-editor"]')) {
          closeCategoryEditorSheet();
        }
      });
      overlay.addEventListener("submit", (event) => {
        event.preventDefault();
        onSubmit?.(event.target);
      });
      overlay.addEventListener("change", (event) => {
        onChange?.(event);
      });

      state.categoryEditorScrollY = getAppScrollTop();
      document.body.appendChild(overlay);
      document.documentElement.classList.add("ios-picker-locked");
      document.body.classList.add("ios-picker-open");
      app.classList.add("is-modal-locked");
      overlay._viewportCleanup = installCategoryEditorViewportTracking(overlay);
      requestAnimationFrame(() => overlay.querySelector("input, select")?.focus?.());
    }

    function updateProductCategorySheetSubcategories(overlay, selectedId = "") {
      const mainSelect = overlay.querySelector('[name="categoryMainId"]');
      const subSelect = overlay.querySelector('[name="subcategoryId"]');
      if (!mainSelect || !subSelect) return;
      const category = getCategoryMainById(mainSelect.value, getCategories());
      const fallback = category?.subcategories.find((item) => item.active) || category?.subcategories[0] || null;
      const valid = category?.subcategories.some((item) => item.id === selectedId);
      const nextSelected = valid ? selectedId : fallback?.id || "";
      subSelect.innerHTML = renderSubcategoryOptions(mainSelect.value, nextSelected);
      subSelect.value = nextSelected;
      subSelect.disabled = !category?.subcategories.length;
    }

    function saveProductCategoryReassignment(form) {
      const productId = String(form.dataset.productId || "");
      const product = findProduct(productId);
      if (!product) {
        showToast("找不到產品。");
        return;
      }
      const formData = new FormData(form);
      const categoryId = String(formData.get("categoryMainId") || "");
      const subcategoryId = String(formData.get("subcategoryId") || "");
      const category = getCategoryMainById(categoryId, getCategories());
      const subcategory = getSubcategoryById(categoryId, subcategoryId, getCategories());
      if (!category || !subcategory) {
        showToast("請選擇有效嘅主分類同子分類。");
        return;
      }
      Object.assign(product, {
        categoryId: category.id,
        subcategoryId: subcategory.id,
        category: category.label,
        subcategory: subcategory.label,
        updatedAt: nowIso()
      });
      saveData({ source: "category-settings" });
      closeCategoryEditorSheet({ silent: true });
      showToast("產品分類已更新。");
      refreshSettingsPanel();
    }

      mountCategoryEditorSheet({
        title: "重新分類產品",

    function refreshSettingsPanel() {
      if (state.settingsPanel === "categories") {
        if (state.categoryManagerView === "products" && state.categoryManagerCategoryId && state.categoryManagerSubcategoryId) {
          renderCategoryProductList(state.categoryManagerCategoryId, state.categoryManagerSubcategoryId);
          return;
        }
        if (state.categoryManagerView === "main" && state.categoryManagerCategoryId) {
          renderCategoryMainDetail(state.categoryManagerCategoryId);
          return;
        }
        renderCategoryManager();
        return;
      }

      if (state.settingsPanel) {
        renderSettingsSubpage(state.settingsPanel);
      } else {
        renderSettings();
      }
    }

    function categoryDragRows(list) {
      return Array.from(list?.querySelectorAll?.(":scope > .category-sort-item") || []);
    }

    function handleCategoryDragStart(event) {
      const handle = event.target.closest?.(".category-drag-handle");
      if (
        !handle ||
        state.categoryDrag ||
        state.navigationTransitioning ||
        state.imageViewerOpen ||
        (event.pointerType === "mouse" && event.button !== 0)
      ) return;

      const item = handle.closest(".category-sort-item");
      const list = item?.closest(".category-sort-list");
      const scope = cleanString(list?.dataset.sortScope);
      if (!item || !list || !["categories", "subcategories"].includes(scope)) return;

      event.preventDefault();
      event.stopPropagation();

      const rect = item.getBoundingClientRect();
      const placeholder = document.createElement("div");
      placeholder.className = "category-sort-placeholder";
      placeholder.style.height = `${Math.max(62, rect.height)}px`;
      placeholder.setAttribute("aria-hidden", "true");

      item.after(placeholder);

      const originalStyle = item.getAttribute("style") || "";
      const originalParent = list;
      const pointerId = event.pointerId;

      try {
        handle.setPointerCapture?.(pointerId);
      } catch (error) {
        // Document listeners still keep the drag active.
      }

      item.classList.add("is-dragging");
      item.style.left = `${rect.left}px`;
      item.style.top = `${rect.top}px`;
      item.style.width = `${rect.width}px`;
      item.style.height = `${rect.height}px`;
      item.style.boxSizing = "border-box";
      document.body.appendChild(item);
      document.body.classList.add("category-drag-active");

      state.categoryDrag = {
        pointerId,
        item,
        list: originalParent,
        placeholder,
        scope,
        categoryId: cleanString(originalParent.dataset.categoryId),
        offsetY: event.clientY - rect.top,
        originalStyle,
        moved: false
      };

      if (navigator.vibrate) {
        try { navigator.vibrate(8); } catch (error) {}
      }
    }

    function autoScrollCategoryDrag(clientY) {
      if (!state.categoryDrag) return;

      const rect = app.getBoundingClientRect();
      const edge = Math.min(88, rect.height * 0.18);
      let delta = 0;

      if (clientY < rect.top + edge) {
        const strength = 1 - Math.max(0, clientY - rect.top) / edge;
        delta = -Math.max(3, Math.round(15 * strength));
      } else if (clientY > rect.bottom - edge) {
        const strength = 1 - Math.max(0, rect.bottom - clientY) / edge;
        delta = Math.max(3, Math.round(15 * strength));
      }

      if (delta) app.scrollTop += delta;
    }

    function moveCategoryPlaceholder(clientY) {
      const drag = state.categoryDrag;
      if (!drag) return;

      const rows = categoryDragRows(drag.list);
      let before = null;

      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        if (clientY < rect.top + rect.height / 2) {
          before = row;
          break;
        }
      }

      if (before) {
        drag.list.insertBefore(drag.placeholder, before);
      } else {
        drag.list.appendChild(drag.placeholder);
      }
    }

    function handleCategoryDragMove(event) {
      const drag = state.categoryDrag;
      if (!drag || event.pointerId !== drag.pointerId) return;

      event.preventDefault();
      drag.moved = true;

      autoScrollCategoryDrag(event.clientY);

      const itemTop = event.clientY - drag.offsetY;
      const maxTop = Math.max(0, window.innerHeight - drag.item.offsetHeight);
      drag.item.style.top = `${Math.max(0, Math.min(maxTop, itemTop))}px`;

      moveCategoryPlaceholder(event.clientY);
    }

    function persistCategoryDragOrder(scope, categoryId, orderedIds) {
      const settings = normalizeSettings(state.data.settings, state.data);

      if (scope === "categories") {
        const active = settings.categories.filter((category) => category.active);
        const inactive = settings.categories.filter((category) => !category.active);
        const activeById = new Map(active.map((category) => [category.id, category]));

        if (
          orderedIds.length !== active.length ||
          orderedIds.some((id) => !activeById.has(id))
        ) return false;

        settings.categories = [
          ...orderedIds.map((id) => activeById.get(id)),
          ...inactive
        ];
        settings.categories.forEach((category, index) => {
          category.sortOrder = index;
        });
      } else if (scope === "subcategories") {
        const category = settings.categories.find((item) => item.id === categoryId);
        if (!category) return false;

        const byId = new Map(
          category.subcategories.map((subcategory) => [subcategory.id, subcategory])
        );

        if (
          orderedIds.length !== category.subcategories.length ||
          orderedIds.some((id) => !byId.has(id))
        ) return false;

        category.subcategories = orderedIds.map((id) => byId.get(id));
        category.subcategories.forEach((subcategory, index) => {
          subcategory.sortOrder = index;
        });
      } else {
        return false;
      }

      state.data.settings = settings;
      saveData({ source: "category-settings" });
      return true;
    }

    function finishCategoryDrag({ cancelled = false } = {}) {
      const drag = state.categoryDrag;
      if (!drag) return;

      const {
        item,
        list,
        placeholder,
        scope,
        categoryId,
        originalStyle,
        moved
      } = drag;

      state.categoryDrag = null;
      document.body.classList.remove("category-drag-active");

      if (placeholder.isConnected) {
        placeholder.replaceWith(item);
      } else if (list.isConnected) {
        list.appendChild(item);
      }

      item.classList.remove("is-dragging");
      if (originalStyle) {
        item.setAttribute("style", originalStyle);
      } else {
        item.removeAttribute("style");
      }

      state.suppressCategoryClickUntil = performance.now() + 320;

      if (!cancelled && moved && list.isConnected) {
        const orderedIds = categoryDragRows(list)
          .map((row) => cleanString(row.dataset.sortId))
          .filter(Boolean);

        persistCategoryDragOrder(scope, categoryId, orderedIds);
      }

      requestAnimationFrame(() => {
        if (scope === "categories") {
          renderCategoryManager();
        } else if (categoryId) {
          renderCategoryMainDetail(categoryId);
        }
      });
    }

    function handleCategoryDragEnd(event) {
      const drag = state.categoryDrag;

    function moveCategoryMain(categoryId, direction) {
      if (![-1, 1].includes(direction)) return;
      const settings = normalizeSettings(state.data.settings, state.data);
      const category = settings.categories.find((item) => item.id === categoryId);
      if (!category) return;

      const peers = settings.categories.filter((item) => item.active === category.active);
      const peerIndex = peers.findIndex((item) => item.id === categoryId);
      const nextPeerIndex = peerIndex + direction;
      if (peerIndex < 0 || nextPeerIndex < 0 || nextPeerIndex >= peers.length) return;

      const currentIndex = settings.categories.findIndex((item) => item.id === peers[peerIndex].id);
      const nextIndex = settings.categories.findIndex((item) => item.id === peers[nextPeerIndex].id);
      [settings.categories[currentIndex], settings.categories[nextIndex]] = [
        settings.categories[nextIndex],
        settings.categories[currentIndex]
      ];

      settings.categories.forEach((item, itemIndex) => {
        item.sortOrder = itemIndex;
      });
      state.data.settings = settings;
      saveData({ source: "category-settings" });
      refreshSettingsPanel();
    }

    function moveSubcategory(categoryId, subcategoryId, direction) {
      if (![-1, 1].includes(direction)) return;
      const settings = normalizeSettings(state.data.settings, state.data);
      const category = settings.categories.find((item) => item.id === categoryId);
      if (!category) return;
      const index = category.subcategories.findIndex((item) => item.id === subcategoryId);
      const nextIndex = index + direction;
      if (index < 0 || nextIndex < 0 || nextIndex >= category.subcategories.length) return;
      [category.subcategories[index], category.subcategories[nextIndex]] = [category.subcategories[nextIndex], category.subcategories[index]];
      category.subcategories.forEach((subcategory, itemIndex) => { subcategory.sortOrder = itemIndex; });
      state.data.settings = settings;
      saveData({ source: "category-settings" });
      refreshSettingsPanel();
    }

    function getVisibleProducts() {
      const query = state.currentSearch.trim().toLowerCase();
      const products = state.data.products.filter((product) => productMatchesQuery(product, query));

      products.sort((a, b) => {
        const statsA = getStats(a.id);
        const statsB = getStats(b.id);
        if (state.sortBy === "name") return productTitle(a).localeCompare(productTitle(b), "zh-Hant");
        if (state.sortBy === "latestDate") return String(statsB.latest?.date || "").localeCompare(String(statsA.latest?.date || ""));
        if (state.sortBy === "lowestUnit") return comparableSortValue(statsA.lowest) - comparableSortValue(statsB.lowest);
        return String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
      });

      return products;
    }

    function comparableSortValue(value) {
      return Number.isFinite(value) ? value : Number.POSITIVE_INFINITY;
    }

    function productMatchesQuery(product, query) {
      if (!query) return true;
      const observations = getProductObservations(product.id);
      const haystack = [
        ...getProductBarcodes(product),
        product.name,
        product.brand,
        product.variant,
        formatProductCategoryPath(product),
        ...observations.map((observation) => getObservationStoreName(observation))
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function groupProductsByCategory(products) {
      const settings = normalizeSettings(state.data.settings, state.data);
      const categoryOrder = new Map(settings.categories.map((category, index) => [category.id, index]));
      const groups = new Map();

      products.forEach((product) => {
        const path = getProductCategoryPath(product, settings.categories);
        const category = path.category || getFallbackCategoryPath(settings.categories).category;
        const subcategory = path.subcategory || getFallbackCategoryPath(settings.categories).subcategory;
        if (!category || !subcategory) return;
        if (!groups.has(category.id)) {
          groups.set(category.id, {
            id: category.id,
            label: category.label,
            order: categoryOrder.get(category.id) ?? 999,
            products: [],
            subgroups: new Map()
          });
        }
        const group = groups.get(category.id);
        group.products.push(product);
        if (!group.subgroups.has(subcategory.id)) {
          group.subgroups.set(subcategory.id, {
            id: subcategory.id,
            label: subcategory.label,
            order: category.subcategories.findIndex((item) => item.id === subcategory.id),
            products: []
          });
        }
        group.subgroups.get(subcategory.id).products.push(product);
      });

      return [...groups.values()]
        .sort((a, b) => a.order - b.order || a.label.localeCompare(b.label, "zh-Hant"))
        .map((group) => ({
          ...group,
          subgroups: [...group.subgroups.values()].sort((a, b) => a.order - b.order || a.label.localeCompare(b.label, "zh-Hant"))
        }));
    }

        <div class="stat">
          <span class="stat-label">${escapeHtml(label)}</span>
          <span class="stat-value" id="${escapeHtml(id)}">-</span>
        </div>
      `;

    function trueFalse(value) {
      return value ? "true" : "false";
    }

    function updateScannerDiagnostics() {
      const currentUrl = document.querySelector("#diagCurrentUrl");
      const secureContext = document.querySelector("#diagSecureContext");
      const mediaDevices = document.querySelector("#diagMediaDevices");
      const getUserMedia = document.querySelector("#diagGetUserMedia");
      const zxing = document.querySelector("#diagZxing");
      const reader = document.querySelector("#diagBrowserMultiFormatReader");
      const userAgent = document.querySelector("#diagUserAgent");
      const libraryError = document.querySelector("#diagLibraryError");
      const lastErrorName = document.querySelector("#diagLastErrorName");
      const lastErrorMessage = document.querySelector("#diagLastErrorMessage");

      if (currentUrl) currentUrl.textContent = window.location.href;
      if (secureContext) secureContext.textContent = trueFalse(Boolean(window.isSecureContext));
      if (mediaDevices) mediaDevices.textContent = trueFalse(Boolean(navigator.mediaDevices));
      if (getUserMedia) getUserMedia.textContent = trueFalse(Boolean(navigator.mediaDevices?.getUserMedia));
      if (zxing) zxing.textContent = trueFalse(Boolean(window.ZXingBrowser));
      if (reader) reader.textContent = trueFalse(Boolean(window.ZXingBrowser?.BrowserMultiFormatReader));
      if (userAgent) userAgent.textContent = navigator.userAgent || "-";
      if (libraryError) libraryError.textContent = window.ZXingBrowserLoadError || "-";
      if (lastErrorName) lastErrorName.textContent = state.scannerDiagnostics.lastScannerErrorName || "-";
      if (lastErrorMessage) lastErrorMessage.textContent = state.scannerDiagnostics.lastScannerErrorMessage || "-";
    }

    function setScannerError(errorOrName, fallbackMessage = "") {
      if (!errorOrName) {
        state.scannerDiagnostics.lastScannerErrorName = "";
        state.scannerDiagnostics.lastScannerErrorMessage = "";
        updateScannerDiagnostics();
        return;
      }

      if (typeof errorOrName === "string") {
        state.scannerDiagnostics.lastScannerErrorName = "ScannerError";
        state.scannerDiagnostics.lastScannerErrorMessage = errorOrName;
        updateScannerDiagnostics();
        return;
      }

      state.scannerDiagnostics.lastScannerErrorName = errorOrName.name || "Error";
      state.scannerDiagnostics.lastScannerErrorMessage = errorOrName.message || fallbackMessage || String(errorOrName);
      updateScannerDiagnostics();
    }

    async function waitForZXingBrowser() {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return true;
      if (window.ZXingBrowserLoadPromise) {
        const loaded = await Promise.race([
          window.ZXingBrowserLoadPromise,
          new Promise((resolve) => window.setTimeout(() => resolve(false), 5000))
        ]);
        if (!loaded && !window.ZXingBrowser?.BrowserMultiFormatReader && !window.ZXingBrowserLoadError) {
          window.ZXingBrowserLoadError = "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
        }
      }
      updateScannerDiagnostics();
      return Boolean(window.ZXingBrowser?.BrowserMultiFormatReader);
    }

    async function testCameraPermission() {
      const status = document.querySelector("#scannerStatus");
      updateScannerDiagnostics();

      if (!navigator.mediaDevices?.getUserMedia) {
        const message = "此瀏覽器不支援相機存取，請改用 Safari 或手動輸入條碼。";
        if (status) status.textContent = message;
        setScannerError({ name: "NotSupportedError", message });
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        stream.getTracks().forEach((track) => track.stop());
        if (status) status.textContent = "相機權限已允許";
        setScannerError("");
      } catch (error) {
        if (status) status.textContent = `${error?.name || "Error"}: ${error?.message || "相機權限測試失敗"}`;
        setScannerError(error, "相機權限測試失敗");
      }
    }

    async function startScanner() {
      const status = document.querySelector("#scannerStatus");
      const video = document.querySelector("#scannerVideo");
      if (!status || !video) return;

      updateScannerDiagnostics();

      if (!window.isSecureContext) {
        const message = "相機需要 HTTPS 網址。請用 GitHub Pages / Vercel / Netlify 測試，不能用普通 http 網址。";
        status.textContent = message;
        setScannerError(message);
        return;
      }

      if (!navigator.mediaDevices?.getUserMedia) {
        const message = "未能開啟相機，請使用手動輸入條碼。";
        status.textContent = message;
        setScannerError(message);
        return;
      }

      const zxingLoaded = await waitForZXingBrowser();
      if (!zxingLoaded) {
        const message = "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
        if (!window.ZXingBrowserLoadError) window.ZXingBrowserLoadError = message;
        status.textContent = message;
        setScannerError(message);
        return;
      }

      try {
        status.textContent = "正在尋找條碼...";
        setScannerError("");
        const reader = new ZXingBrowser.BrowserMultiFormatReader();
        const constraints = {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        const controls = await reader.decodeFromConstraints(constraints, video, (result) => {
          if (!result) return;
          const barcode = cleanBarcode(result.getText());
          if (!barcode) return;
          state.scannerDiagnostics.lastScannedBarcode = barcode;
          setScannerError("");
          status.textContent = `已掃描條碼: ${barcode}`;
          stopScanner();
          showToast(`已掃描: ${barcode}`);
          processBarcodeInput(barcode, state.scannerContext);
        });

        state.scanner = reader;
        state.scannerControls = controls;
        updateScannerDiagnostics();
      } catch (error) {
        status.textContent = "未能開啟相機，請使用手動輸入條碼。";
        setScannerError(error, "未能開啟相機或讀取條碼。");
      }
    }

    function stopScanner() {
      try {
        if (state.scannerControls?.stop) state.scannerControls.stop();
        if (state.scanner?.reset) state.scanner.reset();
      } catch (error) {
        // Best effort cleanup only.
      }
      state.scanner = null;
      state.scannerControls = null;

      const video = document.querySelector("#scannerVideo");
      const stream = video?.srcObject;
      if (stream?.getTracks) {
        stream.getTracks().forEach((track) => track.stop());
        video.srcObject = null;
      }
    }

    function processBarcodeInput(barcode, context = {}) {
      const cleanValue = cleanBarcode(barcode);

        return;
      }
      if (context.mode === "attach" && context.targetProductId) {

      handleBarcode(cleanValue);

    async function confirmBarcodeProductLink(productId, barcode) {
      const product = findProduct(productId);
      const cleanValue = cleanBarcode(barcode);
      if (!product || !cleanValue) return;
      const confirmed = await showNativeConfirm({
        title: "連結條碼？",
        message: `將 ${cleanValue} 加入「${productTitle(product)}」？請確認容量、口味及型號係同一產品。`,
        confirmLabel: "確認連結"
      });
      if (!confirmed) return;
      await attachBarcodeToProduct(productId, cleanValue, { confirmed: true });
    }

    async function attachBarcodeToProduct(productId, barcode, options = {}) {
      const product = findProduct(productId);
      const cleanValue = cleanBarcode(barcode);
      if (!product || !cleanValue) {
        showToast("未能加入條碼。");
        return false;
      }
      const owner = findProductByBarcode(cleanValue);
      if (owner) {
        if (owner.id === productId) {
          showToast("此條碼已經加入產品。");
          renderProductDetail(productId);
        } else {
          showToast(`此條碼已屬於「${productTitle(owner)}」。`);
          renderProductDetail(owner.id);
        }
        return false;
      }
      if (!options.confirmed) {
        const confirmed = await showNativeConfirm({
          title: "加入產品條碼？",
          message: `將 ${cleanValue} 加入「${productTitle(product)}」？`,
          confirmLabel: "加入條碼"
        });
        if (!confirmed) {
          renderProductDetail(productId);
          return false;
        }
      }
      const barcodes = [...getProductBarcodes(product), cleanValue];
      const primary = barcodes[0] || "";
      Object.assign(product, {
        barcode: primary,
        barcodes,
        updatedAt: nowIso()
      });
      state.data.observations.forEach((observation) => {
        if (observation.productId === productId) observation.barcode = primary;
      });
      saveData();
      showToast("條碼已加入產品。");
      renderProductDetail(productId);
      return true;
    }

    async function removeProductBarcode(productId, barcode) {
      const product = findProduct(productId);
      const cleanValue = cleanBarcode(barcode);
      if (!product || !cleanValue || !getProductBarcodes(product).includes(cleanValue)) return;
      const confirmed = await showNativeConfirm({
        title: "移除條碼？",
        message: `從「${productTitle(product)}」移除 ${cleanValue}？產品同價格記錄會保留。`,
        confirmLabel: "移除"
      });
      if (!confirmed) return;
      const barcodes = getProductBarcodes(product).filter((item) => item !== cleanValue);
      const primary = barcodes[0] || "";
      Object.assign(product, {
        barcode: primary,
        barcodes,
        updatedAt: nowIso()
      });
      state.data.observations.forEach((observation) => {
        if (observation.productId === productId) observation.barcode = primary;
      });
      saveData();
      showToast("條碼已移除。");
      renderProductDetail(productId);
    }

      const units = getSalesUnits().filter((unit) => unit.active || unit.label === selected);
      if (selected && !units.some((unit) => unit.label === selected)) {
        units.push({ id: "selected", label: selected, active: true });
      }
      return units.map((unit) => `<option value="${escapeHtml(unit.label)}"${unit.label === selected ? " selected" : ""}>${escapeHtml(unit.label)}</option>`).join("");
    }

    function getCategories() {
      const categories = state.data?.settings?.categories;
      if (Array.isArray(categories) && categories.some((category) => Array.isArray(category?.subcategories))) {
        return categories;
      }
      const settings = normalizeSettings(state.data?.settings, state.data || {});
      if (state.data) state.data.settings = settings;
      return settings.categories;
    }

    function renderCategoryMainOptions(selectedId) {
      const categories = getCategories().filter((category) =>
        category.id === selectedId ||
        (category.active && category.subcategories.some((subcategory) => subcategory.active))
      );
      return categories.map((category) => `<option value="${escapeHtml(category.id)}"${category.id === selectedId ? " selected" : ""}>${escapeHtml(category.label)}${category.active ? "" : "（已停用）"}</option>`).join("");
    }

    function renderSubcategoryOptions(categoryId, selectedId) {
      const category = getCategoryMainById(categoryId, getCategories()) || getFallbackCategoryPath(getCategories()).category;
      const subcategories = (category?.subcategories || []).filter((subcategory) => subcategory.active || subcategory.id === selectedId);
      if (!subcategories.length) return `<option value="">請先在設定新增子分類</option>`;
      return subcategories.map((subcategory) => `<option value="${escapeHtml(subcategory.id)}"${subcategory.id === selectedId ? " selected" : ""}>${escapeHtml(subcategory.label)}${subcategory.active ? "" : "（已停用）"}</option>`).join("");
    }

    function updateSubcategoryOptions(options = {}) {
      const mainSelect = document.querySelector('[name="categoryMainId"]');
      const subSelect = document.querySelector('[name="subcategoryId"]');
      if (!mainSelect || !subSelect) return;
      const previous = options.preserveSelection
        ? String(subSelect.dataset.selectedSubcategory || subSelect.value || "")
        : String(subSelect.value || "");
      const category = getCategoryMainById(mainSelect.value, getCategories());
      const validPrevious = category?.subcategories.some((subcategory) => subcategory.id === previous);
      const fallback = category?.subcategories.find((subcategory) => subcategory.active) || category?.subcategories[0] || null;
      const selected = validPrevious ? previous : fallback?.id || "";
      subSelect.innerHTML = renderSubcategoryOptions(mainSelect.value, selected);
      subSelect.value = selected;
      subSelect.dataset.selectedSubcategory = selected;
      subSelect.disabled = !category?.subcategories.length;
    }

    function renderDealTypeOptions(selected) {
      return DEAL_TYPES.map(([value, label]) => `<option value="${value}"${value === selected ? " selected" : ""}>${label}</option>`).join("");
    }

    function renderOptions(values, selected, labeler = (value) => value) {
      return values.map((value) => `<option value="${escapeHtml(value)}"${value === selected ? " selected" : ""}>${escapeHtml(labeler(value))}</option>`).join("");
    }

    function renderStoreTypeLabel(value) {
      return {
        "Physical store": "實體店",
        "Online store": "網店",
        Both: "兩者"
      }[value] || value || "實體店";

    function getNormalizedSettings() {
      const current = state.data.settings;
      if (
        current &&
        Array.isArray(current.regions) &&
        Array.isArray(current.currencies) &&
        Array.isArray(current.salesUnits) &&
        Array.isArray(current.capacityUnits) &&
        Array.isArray(current.categories)
      ) {
        return current;
      }
      const settings = normalizeSettings(current, state.data);
      state.data.settings = settings;
      return settings;

    function getCurrencyDefinition(code) {
      const cleanCode = cleanString(code, "HKD").toUpperCase();
      return getNormalizedSettings().currencies.find((currency) => currency.code === cleanCode) || null;
    }

      return getRegion(value)?.name || legacyRegionName(value) || "香港";

    function renderRegionOptions(selected, options = {}) {
      const includeInactive = options.includeInactive === true;
      const settings = getNormalizedSettings();
      const values = settings.regions.filter((region) => includeInactive || region.active || region.id === selected);

    function renderCurrencyOptions(selected, options = {}) {
      const includeInactive = options.includeInactive === true;
      const settings = getNormalizedSettings();
      const code = cleanString(selected, "HKD").toUpperCase();
      return settings.currencies
        .filter((currency) => includeInactive || currency.active || currency.code === code)

    function getCurrentExchangeRateToHKD(currencyCode) {
      const code = cleanString(currencyCode, "HKD").toUpperCase();
      if (code === "HKD") return 1;
      return optionalPositiveNumber(getCurrencyDefinition(code)?.rateToHKD) || Number.NaN;

      return Number(rate).toLocaleString("en-HK", { minimumFractionDigits: 0, maximumFractionDigits: 6 });

      const dealType = document.querySelector('[name="dealType"]')?.value || "normal";

      const promotionDetails = document.querySelector("#promotionDetails");
      if (!promoFields) return;
      if (promotionDetails) promotionDetails.hidden = dealType === "normal";

      const visibleFields = {
        normal: ["price"],
        b1g1: ["price"],
        bundle: ["total", "items"],
        "second-half": ["price"],
        percentage: ["price", "percentage"],
        fixed: ["price", "fixed"],
        custom: ["total", "items"]
      }[dealType] || [];

      });

    async function saveProductForm(form) {
      if (state.productImageProcessing) {
        showToast("正在處理圖片…");
        return;
      }

      const formData = new FormData(form);
      const productId = form.dataset.productId;
      const existingProduct = productId ? findProduct(productId) : null;
      const submittedBarcode = cleanBarcode(formData.get("barcode"));
      const barcodes = existingProduct
        ? getProductBarcodes(existingProduct)
        : normalizeBarcodeList({ barcode: submittedBarcode });
      const barcode = barcodes[0] || "";
      const standardQuantity = Number(formData.get("standardQuantity"));
      const categoryMainId = String(formData.get("categoryMainId") || FALLBACK_CATEGORY_ID).trim();
      const subcategoryId = String(formData.get("subcategoryId") || FALLBACK_SUBCATEGORY_ID).trim();
      const categoryPath = {
        category: getCategoryMainById(categoryMainId, getCategories()),
        subcategory: getSubcategoryById(categoryMainId, subcategoryId, getCategories())
      };
      if (!categoryPath.category || !categoryPath.subcategory) {
        showToast("請選擇有效嘅主分類同子分類。");
        return;
      }
      const category = categoryPath.category.label;
      const subcategory = categoryPath.subcategory.label;

      if (!formData.get("name") || !formData.get("brand") || !Number.isFinite(standardQuantity) || standardQuantity <= 0) {
        showToast("請填寫所有必填產品資料。");
        return;
      }

      const existingBarcodeProduct = !existingProduct && barcode ? findProductByBarcode(barcode) : null;
      if (existingBarcodeProduct && existingBarcodeProduct.id !== productId) {
        showToast("此條碼已經有產品。");
        renderProductDetail(existingBarcodeProduct.id);
        return;
      }

      const timestamp = nowIso();
      const oldProductImageKey = existingProduct?.productImageKey || existingProduct?.imageKey || "";
      let productImageKey = state.removeProductImageOnSave ? "" : oldProductImageKey;
      let productImageUpdatedAt = existingProduct?.productImageUpdatedAt || "";
      const selectedProductImage = state.pendingProductImageBlob;

      if (selectedProductImage) {
        const error = validateProcessedProductImageBlob(selectedProductImage);
        if (error) {
          showToast(error);
          return;
        }

        const newImageKey = uid("product_image");
        try {
          await saveImageBlob(newImageKey, selectedProductImage);
          revokeImageObjectUrl(newImageKey);
          productImageKey = newImageKey;
          productImageUpdatedAt = timestamp;
        } catch (error) {
          showToast("產品圖片未能儲存，但產品文字資料仍會儲存。");
          productImageKey = oldProductImageKey;
          productImageUpdatedAt = existingProduct?.productImageUpdatedAt || "";
        }
      }

      if (state.removeProductImageOnSave) productImageUpdatedAt = "";

      const shouldDeleteOldImage = Boolean(
        oldProductImageKey &&
        (state.removeProductImageOnSave || (selectedProductImage && productImageKey !== oldProductImageKey))
      );

      const payload = {
        barcode,
        barcodes,
        brand: String(formData.get("brand") || "").trim(),
        name: String(formData.get("name") || "").trim(),
        variant: String(formData.get("variant") || "").trim(),
        standardQuantity,
        unit: String(formData.get("unit") || "ml"),
        salesUnit: String(formData.get("salesUnit") || "件").trim() || "件",
        categoryId: categoryPath.category.id,
        subcategoryId: categoryPath.subcategory.id,
        category,
        subcategory,
        notes: String(formData.get("notes") || "").trim(),
        productImageKey,
        productImageUpdatedAt,
        updatedAt: timestamp
      };

      if (productId) {
        const index = state.data.products.findIndex((product) => product.id === productId);
        if (index === -1) return;
        state.data.products[index] = { ...state.data.products[index], ...payload };
        state.data.observations.forEach((observation) => {
          if (observation.productId === productId) observation.barcode = barcode;
        });
        revokePendingProductImagePreview();
        state.removeProductImageOnSave = false;
        saveData();
        if (shouldDeleteOldImage) await removeStoredProductImage(oldProductImageKey);
        showToast("產品已更新。");
        renderProductDetail(productId);
        return;
      }

      const product = {
        id: uid("product"),
        ...payload,
        createdAt: timestamp
      };
      state.data.products.push(product);
      revokePendingProductImagePreview();
      state.removeProductImageOnSave = false;
      saveData();
      if (shouldDeleteOldImage) await removeStoredProductImage(oldProductImageKey);
      showToast("產品已新增，請加入第一筆價格。");
      renderObservationForm(product.id);
    }

    async function removeStoredProductImage(imageKey) {

        await deleteImageBlob(imageKey);
      } catch (error) {
        // An unreferenced local image does not affect the saved product.
      }
      revokeImageObjectUrl(imageKey);
    }

    function validateLogoFile(file) {
      if (!file || !file.size) return "";
      const extension = file.name.split(".").pop().toLowerCase();
      const isSvg = extension === "svg";
      if (!LOGO_TYPES.includes(file.type) && !isSvg) return "Logo 檔案格式不支援。請使用 PNG、JPG、WEBP 或 SVG。";
      if (file.size > MAX_LOGO_BYTES) return "Logo 檔案太大。請使用 1MB 或以下的圖片。";
      return "";
    }

    function validateProductImageFile(file) {
      if (!file || !file.size) return "無法讀取此相片，請選擇另一張圖片";
      const extension = String(file.name || "").split(".").pop().toLowerCase();
      const type = String(file.type || "").toLowerCase();
      const knownPhotoExtension = ["jpg", "jpeg", "png", "webp", "heic", "heif"].includes(extension);
      if (extension === "svg" || type === "image/svg+xml") return "不支援此圖片格式";
      if (type && !type.startsWith("image/") && !knownPhotoExtension) return "不支援此圖片格式";
      return "";
    }

    function validateProcessedProductImageBlob(blob) {
      if (!blob || !blob.size || !String(blob.type || "").startsWith("image/")) {
        return "圖片處理失敗，請選擇另一張圖片";
      }
      if (blob.size > MAX_PRODUCT_IMAGE_BYTES) {
        return "圖片壓縮後仍然太大，請選擇另一張圖片";
      }
      return "";
    }

    async function handleProductImageFileChange(input) {
      const file = input.files?.[0];
      const processToken = state.productImageProcessToken + 1;
      state.productImageProcessToken = processToken;
      revokePendingProductImagePreview();
      state.removeProductImageOnSave = false;

      if (!file) {
        updateProductImagePreview();
        return;
      }

      const inputError = validateProductImageFile(file);
      if (inputError) {
        input.value = "";
        showToast(inputError);
        updateProductImagePreview({ status: inputError, statusClass: "is-error" });
        return;
      }

      setProductImageProcessing(true);
      updateProductImagePreview({ status: "正在處理圖片…", statusClass: "is-processing" });
      showToast("正在處理圖片…");

      try {
        await nextAnimationFrame();
        const processed = await processProductImage(file);
        if (processToken !== state.productImageProcessToken) return;

        const outputError = validateProcessedProductImageBlob(processed.blob);
        if (outputError) throw new Error(outputError);

        state.pendingProductImageBlob = processed.blob;
        state.pendingProductImageName = file.name || "產品圖片";
        state.pendingProductImagePreviewUrl = URL.createObjectURL(processed.blob);
        input.value = "";
        updateProductImagePreview({ status: "產品圖片已壓縮" });
        showToast("產品圖片已壓縮");
      } catch (error) {
        if (processToken !== state.productImageProcessToken) return;
        input.value = "";
        revokePendingProductImagePreview();
        const message = getProductImageErrorMessage(error);
        updateProductImagePreview({ status: message, statusClass: "is-error" });
        showToast(message);
      } finally {
        if (processToken === state.productImageProcessToken) setProductImageProcessing(false);
      }
    }

    async function processProductImage(file) {
      let decoded;
      try {
        decoded = await decodeProductImage(file);
      } catch (error) {
        throw new Error("無法讀取此相片，請選擇另一張圖片");
      }

      try {
        const useWebp = await supportsProductImageWebp();
        const outputType = useWebp ? "image/webp" : "image/jpeg";
        const qualities = useWebp ? PRODUCT_IMAGE_WEBP_QUALITIES : PRODUCT_IMAGE_JPEG_QUALITIES;

        for (const longEdge of PRODUCT_IMAGE_LONG_EDGES) {
          const dimensions = getProductImageDimensions(decoded.width, decoded.height, longEdge);
          for (const quality of qualities) {
            const blob = await encodeProductImage(decoded.source, dimensions.width, dimensions.height, outputType, quality);
            if (blob && blob.type === outputType && blob.size <= MAX_PRODUCT_IMAGE_BYTES) {
              return { blob, width: dimensions.width, height: dimensions.height, quality };
            }
          }
        }
      } finally {
        decoded.close();
      }

      throw new Error("圖片壓縮後仍然太大，請選擇另一張圖片");
    }

    async function decodeProductImage(file) {
      if (typeof createImageBitmap === "function") {
        try {
          const bitmap = await createImageBitmap(file, { imageOrientation: "from-image" });
          if (bitmap.width > 0 && bitmap.height > 0) {
            return {
              source: bitmap,
              width: bitmap.width,
              height: bitmap.height,
              close: () => bitmap.close?.()
            };
          }
          bitmap.close?.();
        } catch (error) {
          // Safari may decode a camera format through HTMLImageElement instead.
        }
      }

      const objectUrl = URL.createObjectURL(file);
      try {
        const image = await new Promise((resolve, reject) => {
          const element = new Image();
          element.onload = () => resolve(element);
          element.onerror = () => reject(new Error("decode failed"));
          element.src = objectUrl;
        });
        if (!image.naturalWidth || !image.naturalHeight) throw new Error("decode failed");
        return {
          source: image,
          width: image.naturalWidth,
          height: image.naturalHeight,
          close: () => URL.revokeObjectURL(objectUrl)
        };
      } catch (error) {
        URL.revokeObjectURL(objectUrl);
        throw error;
      }
    }

    function getProductImageDimensions(width, height, maxLongEdge) {
      const sourceLongEdge = Math.max(width, height);
      const scale = Math.min(1, maxLongEdge / sourceLongEdge);
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale))
      };
    }

    async function encodeProductImage(source, width, height, type, quality) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d", { alpha: false });
      if (!context) throw new Error("圖片處理失敗，請選擇另一張圖片");
      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, width, height);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.drawImage(source, 0, 0, width, height);
      return canvasToBlob(canvas, type, quality);
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        if (typeof canvas.toBlob !== "function") {
          reject(new Error("圖片處理失敗，請選擇另一張圖片"));
          return;
        }
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("圖片處理失敗，請選擇另一張圖片"));
        }, type, quality);
      });
    }

    async function supportsProductImageWebp() {
      if (typeof productImageWebpSupported === "boolean") return productImageWebpSupported;
      try {
        const canvas = document.createElement("canvas");
        canvas.width = 1;
        canvas.height = 1;
        const blob = await canvasToBlob(canvas, "image/webp", 0.8);
        productImageWebpSupported = blob.type === "image/webp";
      } catch (error) {
        productImageWebpSupported = false;
      }
      return productImageWebpSupported;
    }

    function nextAnimationFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function getProductImageErrorMessage(error) {
      const message = String(error?.message || "");
      if (message.includes("圖片壓縮後仍然太大")) return "圖片壓縮後仍然太大，請選擇另一張圖片";
      if (message.includes("無法讀取此相片")) return "無法讀取此相片，請選擇另一張圖片";
      return "圖片處理失敗，請選擇另一張圖片";
    }
