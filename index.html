    function migrateV5ToV6(source, context) {
      const parsed = source && typeof source === "object" ? source : {};
      const meta = parsed.meta && typeof parsed.meta === "object" ? parsed.meta : {};
      const history = normalizeMigrationHistory(meta.migrationHistory);
      const migrationId = "schema-v5-to-v6-advanced-price-analysis";
      if (!history.some((entry) => entry.id === migrationId)) {
        history.push({
          id: migrationId,
          fromVersion: context.fromVersion,
          toVersion: context.toVersion,
          migratedAt: context.migratedAt
        });
      }
      return {
        ...parsed,
        schemaVersion: context.toVersion,
        meta: { ...meta, migrationHistory: history },
        observations: Array.isArray(parsed.observations)
          ? parsed.observations.map((observation) => ({
              ...(observation || {}),
              priceNature: normalizePriceNature(observation?.priceNature)
            }))
          : []
      };
    }

    function loadData() {
      return dataService.reload();
    }

    function saveData(options = {}) {
      state.data = dataService.persist(state.data);

      if (options.cloud !== false) {
        cloudSyncService.recordLocalData(state.data);
        cloudImageService
          .syncReferences(state.data, { source: options.source || "local" })
          .catch((error) => {
            console.warn("Cloud image reference sync failed:", error);
          });
      }

      return state.data;
    }

    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function cleanBarcode(value) {
      return String(value || "").replace(/\s+/g, "").trim();
    }


    function money(value) {
      if (!Number.isFinite(value)) return "未有資料";
      return `HKD ${value.toFixed(2)}`;
    }

    function moneyWithCurrency(value, currency = "HKD") {
      if (!Number.isFinite(value)) return "未有資料";
      return `${currency || "HKD"} ${value.toFixed(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "未有日期";
      return value;
    }

    function formatDatePickerDisplay(value) {
      const match = String(value || "").match(
        /^(\d{4})-(\d{2})-(\d{2})$/
      );
      if (!match) return value || "選擇日期";

      return `${Number(match[1])}年${Number(match[2])}月${Number(match[3])}日`;
    }

    function updateObservationDateDisplay(input) {
      if (!input) return;
      const display = input
        .closest(".ios-date-control")
        ?.querySelector(".ios-date-control-value");
      if (display) {
        display.textContent = formatDatePickerDisplay(input.value);
      }
    }

    function daysSince(dateStr) {
      if (!dateStr) return null;
      const then = new Date(`${dateStr}T00:00:00`);
      if (Number.isNaN(then.getTime())) return null;
      const diff = Date.now() - then.getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    const STALE_AFTER_DAYS = 60;

    function renderStalenessNote(dateStr) {
      const days = daysSince(dateStr);
      if (days === null || days < STALE_AFTER_DAYS) return "";
      const months = Math.max(1, Math.floor(days / 30));
      return `<div class="stale-note">呢個產品已經 ${months} 個月未更新價錢，可能已經唔同</div>`;
    }

    function productTitle(product) {
      return [product.brand, product.name].filter(Boolean).join(" ") || "未命名產品";
    }

    function getAppScrollTop() {
      return Math.max(
        0,
        Number(app?.scrollTop || 0)
      );
    }

    function setAppScrollTop(value) {
      if (!app) return;
      app.scrollTop = Math.max(
        0,
        Number(value || 0)
      );
    }

    function captureTopbarChrome() {
      const title =
        document.querySelector("#screenTitle")?.textContent ||
        "條碼格價記錄";
      const backButton = document.querySelector(".topbar-back");

      return {
        title,
        hasBack: Boolean(backButton && !backButton.hidden)
      };
    }

    function topbarBackIconMarkup() {
      return `
        <svg width="9" height="16" viewBox="0 0 9 16" fill="none" aria-hidden="true">
          <path d="M8 1L1 8l7 7" stroke="#0b6478" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      `;
    }

    function createTopbarChromeLayer(chrome, className = "") {
      if (!topbarTransitionHost || !chrome) return null;

      const layer = document.createElement("div");
      layer.className =
        `topbar-nav-layer ${className}`.trim();
      layer.innerHTML = `
        <span class="topbar-back" ${chrome.hasBack ? "" : "hidden"}>
          ${topbarBackIconMarkup()}
        </span>
        <div class="brand">
          <span class="brand-title">${escapeHtml(chrome.title || "")}</span>
        </div>
      `;
      topbarTransitionHost.appendChild(layer);
      return layer;
    }

    function clearTopbarTransition(options = {}) {
      window.clearTimeout(state.topbarTransitionTimer);
      topbarTransitionHost?.replaceChildren();

      if (options.showLive !== false) {
        topbarNavLive?.classList.remove(
          "is-hidden-for-transition"
        );
      }

      state.interactiveTopbarCurrentLayer = null;
      state.interactiveTopbarPreviousLayer = null;
    }

    function animateTopbarChrome(
      oldChrome,
      newChrome,
      direction,
      duration = 520,
      preparedOldLayer = null
    ) {
      if (
        !topbarTransitionHost ||
        !topbarNavLive ||
        !oldChrome ||
        !newChrome
      ) return;

      let oldLayer = preparedOldLayer;

      if (!oldLayer) {
        clearTopbarTransition({ showLive: false });
        topbarNavLive.classList.add(
          "is-hidden-for-transition"
        );
        oldLayer = createTopbarChromeLayer(
          oldChrome,
          "is-old"
        );
      }

      const newLayer = createTopbarChromeLayer(
        newChrome,
        "is-new"
      );

      if (!oldLayer || !newLayer) {
        clearTopbarTransition();
        return;
      }

      const easing =
        "cubic-bezier(0.22, 0.72, 0, 1)";
      const oldEnd =
        direction === "forward" ? "-14%" : "14%";
      const newStart =
        direction === "forward" ? "16%" : "-16%";
      const exitDuration = 190;
      const enterDelay = 205;
      const enterDuration = Math.max(
        270,
        duration - enterDelay
      );

      oldLayer.style.transform =
        "translate3d(0, 0, 0)";
      oldLayer.style.opacity = "1";
      newLayer.style.transform =
        `translate3d(${newStart}, 0, 0)`;
      newLayer.style.opacity = "0";

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          oldLayer.style.transition =
            `transform ${exitDuration}ms ${easing}, opacity 150ms ease-out`;
          newLayer.style.transition =
            `transform ${enterDuration}ms ${easing} ${enterDelay}ms, ` +
            `opacity 230ms ease-out ${enterDelay}ms`;

          oldLayer.style.transform =
            `translate3d(${oldEnd}, 0, 0)`;
          oldLayer.style.opacity = "0";
          newLayer.style.transform =
            "translate3d(0, 0, 0)";
          newLayer.style.opacity = "1";
        });
      });

      state.topbarTransitionTimer = window.setTimeout(
        clearTopbarTransition,
        duration + 55
      );
    }

    function beginInteractiveTopbarSwipe(
      currentChrome,
      previousChrome
    ) {
      if (!topbarTransitionHost || !topbarNavLive) return;

      clearTopbarTransition();
      topbarNavLive.classList.add(
        "is-hidden-for-transition"
      );

      const previousLayer = createTopbarChromeLayer(
        previousChrome,
        "is-previous"
      );
      const currentLayer = createTopbarChromeLayer(
        currentChrome,
        "is-current"
      );

      if (!previousLayer || !currentLayer) {
        clearTopbarTransition();
        return;
      }

      previousLayer.style.transform =
        "translate3d(-14%, 0, 0)";
      previousLayer.style.opacity = "0";
      currentLayer.style.transform =
        "translate3d(0, 0, 0)";
      currentLayer.style.opacity = "1";

      state.interactiveTopbarPreviousLayer =
        previousLayer;
      state.interactiveTopbarCurrentLayer =
        currentLayer;
    }

    function updateInteractiveTopbarSwipe(progress) {
      const previousLayer =
        state.interactiveTopbarPreviousLayer;
      const currentLayer =
        state.interactiveTopbarCurrentLayer;
      if (!previousLayer || !currentLayer) return;

      const safeProgress = Math.max(
        0,
        Math.min(1, Number(progress || 0))
      );
      const currentFade = Math.max(
        0,
        1 - safeProgress / 0.46
      );
      const previousFade = safeProgress <= 0.48
        ? 0
        : Math.min(
            1,
            (safeProgress - 0.48) / 0.52
          );

      previousLayer.style.transform =
        `translate3d(${-14 * (1 - safeProgress)}%, 0, 0)`;
      previousLayer.style.opacity =
        String(previousFade);
      currentLayer.style.transform =
        `translate3d(${16 * safeProgress}%, 0, 0)`;
      currentLayer.style.opacity =
        String(currentFade);
    }

    function settleInteractiveTopbarSwipe(
      shouldGoBack,
      duration
    ) {
      const previousLayer =
        state.interactiveTopbarPreviousLayer;
      const currentLayer =
        state.interactiveTopbarCurrentLayer;
      if (!previousLayer || !currentLayer) return;

      const easing = "cubic-bezier(0.32, 0.72, 0, 1)";
      previousLayer.style.transition =
        `transform ${duration}ms ${easing}, opacity ${duration}ms ${easing}`;
      currentLayer.style.transition =
        `transform ${duration}ms ${easing}, opacity ${duration}ms ${easing}`;

      requestAnimationFrame(() => {
        if (shouldGoBack) {
previousLayer.style.transform =
            "translate3d(0, 0, 0)";
          previousLayer.style.opacity = "1";
          currentLayer.style.transform =
            "translate3d(16%, 0, 0)";
          currentLayer.style.opacity = "0";
        } else {
          previousLayer.style.transform =
            "translate3d(-14%, 0, 0)";
          previousLayer.style.opacity = "0";
          currentLayer.style.transform =
            "translate3d(0, 0, 0)";
          currentLayer.style.opacity = "1";
        }
      });
    }

    function navigateBack() {
      state.nextNavigationDirection = "back";
      if (typeof state.backHandler === "function") {
        state.backHandler();
      } else {
        renderHome();
      }
    }

    function cloneCurrentViewForNavigation() {
      const clone = app.cloneNode(true);
      const originalControls = app.querySelectorAll(
        "input, textarea, select, details"
      );
      const clonedControls = clone.querySelectorAll(
        "input, textarea, select, details"
      );

      originalControls.forEach((original, index) => {
        const copied = clonedControls[index];
        if (!copied) return;

        if (original instanceof HTMLInputElement) {
          if (["checkbox", "radio"].includes(original.type)) {
            copied.checked = original.checked;
            copied.toggleAttribute(
              "checked",
              original.checked
            );
          } else {
            copied.value = original.value;
            copied.setAttribute("value", original.value);
          }
        } else if (original instanceof HTMLTextAreaElement) {
          copied.value = original.value;
          copied.textContent = original.value;
        } else if (original instanceof HTMLSelectElement) {
          copied.value = original.value;
          [...copied.options].forEach((option) => {
            option.toggleAttribute(
              "selected",
              option.value === original.value
            );
          });
        } else if (
          original instanceof HTMLDetailsElement
        ) {
          copied.open = original.open;
          copied.toggleAttribute("open", original.open);
        }
      });

      return clone.innerHTML;
    }

    function getNavigationViewportRect() {
      const top = Math.max(
        0,
        Math.round(
          topbar?.getBoundingClientRect().bottom || 0
        )
      );

      return {
        top,
        left: 0,
        width: Math.round(window.innerWidth),
        height: Math.max(
          1,
          Math.round(window.innerHeight - top)
        )
      };
    }

    function captureNavigationSnapshot() {
      if (!app.innerHTML.trim()) return null;

      return {
        html: cloneCurrentViewForNavigation(),
        offsetY: -getAppScrollTop(),
        scrollTop: getAppScrollTop(),
        viewKey: state.currentViewKey,
        chrome: captureTopbarChrome()
      };
    }


    function createNavigationSurface(
      snapshot,
      className = "",
      viewportOverride = null
    ) {
      if (!snapshot) return null;

      const viewport =
        viewportOverride || getNavigationViewportRect();

      const surface = document.createElement("div");
      surface.className =
        `ios-nav-surface ${className}`.trim();
      surface.style.top = `${viewport.top}px`;
      surface.style.left = "0";
      surface.style.width = `${viewport.width}px`;
      surface.style.height = `${viewport.height}px`;

      const frame = document.createElement("div");
      frame.className = "ios-nav-surface-frame";

      const content = document.createElement("div");
      content.className = "ios-nav-surface-content";
      content.style.transform =
        `translate3d(0, ${Number(snapshot.offsetY || 0)}px, 0)`;
      content.innerHTML = snapshot.html;

      frame.appendChild(content);
      surface.appendChild(frame);
      document.body.appendChild(surface);
      return surface;
    }

    function clearNavigationSurfaces(options = {}) {
      window.clearTimeout(
        state.navigationTransitionTimer
      );
      document
        .querySelectorAll(".ios-nav-surface")
        .forEach((surface) => surface.remove());

      document.body.classList.remove(
        "ios-navigation-active",
        "ios-edge-swipe-active"
      );
      state.navigationTransitioning = false;

      if (options.clearTopbar !== false) {
        clearTopbarTransition();
      }

      if (options.showApp !== false) {
        app.style.visibility = "";
      }
    }



    function animateNavigationSurfaces(
      oldSurface,
      newSurface,
      direction,
      onComplete
    ) {
      if (!oldSurface || !newSurface) {
        clearNavigationSurfaces();
        onComplete?.();
        return;
      }

      const width = Math.max(
        1,
        newSurface.getBoundingClientRect().width
      );
      const duration = 520;
      const easing =
        "cubic-bezier(0.32, 0.72, 0, 1)";

      state.navigationTransitioning = true;
      document.body.classList.add(
        "ios-navigation-active"
      );
      app.style.visibility = "hidden";

      oldSurface.classList.remove(
        "is-front",
        "is-previous",
        "is-revealed"
      );
      newSurface.classList.remove(
        "is-front",
        "is-previous",
        "is-revealed"
      );

      oldSurface.style.opacity = "1";
      newSurface.style.opacity = "1";

      if (direction === "forward") {
        oldSurface.classList.add("is-previous");
        newSurface.classList.add("is-front");

        oldSurface.style.transform =
          "translate3d(0, 0, 0)";
        newSurface.style.transform =
          `translate3d(${width}px, 0, 0)`;
      } else {
        oldSurface.classList.add("is-front");
        newSurface.classList.add("is-previous");

        oldSurface.style.transform =
          "translate3d(0, 0, 0)";
        newSurface.style.transform =
          `translate3d(${-Math.round(width * 0.12)}px, 0, 0)`;
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          oldSurface.style.transition =
            `transform ${duration}ms ${easing}`;
          newSurface.style.transition =
            `transform ${duration}ms ${easing}`;

          if (direction === "forward") {
            oldSurface.style.transform =
              `translate3d(${-Math.round(width * 0.12)}px, 0, 0)`;
            newSurface.style.transform =
              "translate3d(0, 0, 0)";
          } else {
            oldSurface.style.transform =
              `translate3d(${width}px, 0, 0)`;
            newSurface.style.transform =
              "translate3d(0, 0, 0)";
          }
        });
      });

      state.navigationTransitionTimer =
        window.setTimeout(() => {
          if (typeof onComplete === "function") {
            clearNavigationSurfaces({
              showApp: false
            });
            onComplete();
          } else {
            clearNavigationSurfaces();
          }
        }, duration + 40);
    }

    function applyTabEntryAnimation() {
      window.clearTimeout(
        state.navigationAnimationTimer
      );
      app.classList.remove("ios-view-enter-tab");
      void app.offsetWidth;
      app.classList.add("ios-view-enter-tab");
      state.navigationAnimationTimer =
        window.setTimeout(() => {
          app.classList.remove("ios-view-enter-tab");
        }, 330);
    }


    function beginInteractiveBackSwipe() {
      const previousSnapshot =
        state.navigationVisualStack.at(-1);
      const currentSnapshot =
        captureNavigationSnapshot();

      if (!previousSnapshot || !currentSnapshot) {
        return false;
      }

      clearNavigationSurfaces();

      const viewport = getNavigationViewportRect();
      const previousLayer = createNavigationSurface(
        previousSnapshot,
        "is-previous",
        viewport
      );
      const currentLayer = createNavigationSurface(
        currentSnapshot,
        "is-front",
        viewport
      );

      if (!previousLayer || !currentLayer) {
        clearNavigationSurfaces();
        return false;
      }

      const width = Math.max(
        1,
        currentLayer.getBoundingClientRect().width
      );

      previousLayer.style.transform =
        `translate3d(${-Math.round(width * 0.12)}px, 0, 0)`;
      previousLayer.style.opacity = "1";
      currentLayer.style.transform =
        "translate3d(0, 0, 0)";
      currentLayer.style.opacity = "1";

      beginInteractiveTopbarSwipe(
        currentSnapshot.chrome,
        previousSnapshot.chrome
      );

      state.edgeSwipePreviousLayer =
        previousLayer;
      state.edgeSwipeCurrentLayer =
        currentLayer;
      state.edgeSwipeWidth = width;
      state.navigationTransitioning = true;

      document.body.classList.add(
        "ios-navigation-active",
        "ios-edge-swipe-active"
      );
      app.style.visibility = "hidden";
      return true;
    }


    function updateInteractiveBackSwipe(distance) {
      const previousLayer =
        state.edgeSwipePreviousLayer;
      const currentLayer =
        state.edgeSwipeCurrentLayer;
      const width = Math.max(
        1,
        state.edgeSwipeWidth
      );

      if (!previousLayer || !currentLayer) return;

      const progress = Math.min(
        1,
        Math.max(0, distance / width)
      );
      const previousOffset =
        -width * 0.12 * (1 - progress);

      previousLayer.style.transform =
        `translate3d(${previousOffset}px, 0, 0)`;
      previousLayer.style.opacity = "1";
      currentLayer.style.transform =
        `translate3d(${Math.max(0, distance)}px, 0, 0)`;
      currentLayer.style.opacity = "1";

      updateInteractiveTopbarSwipe(progress);
    }

    function handleNavigationSwipeStart(event) {
      if (
        state.navigationTransitioning ||
        event.touches.length !== 1 ||
        state.imageViewerOpen ||
        typeof state.backHandler !== "function" ||
        !state.navigationVisualStack.length ||
        document.querySelector(".ios-picker-overlay")
      ) return;

      const touch = event.touches[0];
      if (touch.clientX > 30) return;

      if (
        event.target.closest?.(
          "input, textarea, select, [contenteditable='true']"
        )
      ) return;

      resetNavigationSwipe();
      state.edgeSwipeTracking = true;
      state.edgeSwipeStartX = touch.clientX;
      state.edgeSwipeStartY = touch.clientY;
      state.edgeSwipeCurrentX = touch.clientX;
      state.edgeSwipeStartedAt = performance.now();
      state.edgeSwipeBackHandler = state.backHandler;
    }

    function handleNavigationSwipeMove(event) {
      if (
        !state.edgeSwipeTracking ||
        event.touches.length !== 1
      ) return;

      const touch = event.touches[0];
      const deltaX =
        touch.clientX - state.edgeSwipeStartX;
      const deltaY =
        touch.clientY - state.edgeSwipeStartY;

      if (!state.edgeSwipeActive) {
        if (deltaX < 8) return;

        if (
          Math.abs(deltaY) >
          Math.abs(deltaX) * 0.72
        ) {
          resetNavigationSwipe();
          return;
        }

        if (!beginInteractiveBackSwipe()) {
          resetNavigationSwipe();
          return;
        }

        state.edgeSwipeActive = true;
        resetPullToRefresh();
      }

      event.preventDefault();
      state.edgeSwipeCurrentX = touch.clientX;
      const distance = Math.max(
        0,
        Math.min(
          state.edgeSwipeWidth,
          touch.clientX - state.edgeSwipeStartX
        )
      );
      updateInteractiveBackSwipe(distance);
    }

    function handleNavigationSwipeEnd() {
      if (!state.edgeSwipeTracking) return;

      if (!state.edgeSwipeActive) {
        resetNavigationSwipe();
        return;
      }

      const width = Math.max(
        1,
        state.edgeSwipeWidth
      );
      const distance = Math.max(
        0,
        Math.min(
          width,
          state.edgeSwipeCurrentX -
            state.edgeSwipeStartX
        )
      );
      const elapsed = Math.max(
        1,
        performance.now() -
          state.edgeSwipeStartedAt
      );
      const velocity = distance / elapsed;
      const shouldGoBack =
        distance > width * 0.32 ||
        velocity > 0.55;

      const previousLayer =
        state.edgeSwipePreviousLayer;
      const currentLayer =
        state.edgeSwipeCurrentLayer;
      const backHandler =
        state.edgeSwipeBackHandler;

      if (!previousLayer || !currentLayer) {
        resetNavigationSwipe();
        return;
      }

      const progress = distance / width;
      const duration = shouldGoBack
        ? Math.max(
            150,
            Math.min(300, (1 - progress) * 360)
          )
        : Math.max(
            180,
            Math.min(300, progress * 320 + 160)
          );
      const easing =
        "cubic-bezier(0.32, 0.72, 0, 1)";

      previousLayer.style.transition =
        `transform ${duration}ms ${easing}, opacity ${duration}ms ${easing}`;
      currentLayer.style.transition =
        `transform ${duration}ms ${easing}`;

      settleInteractiveTopbarSwipe(
        shouldGoBack,
        duration
      );

      requestAnimationFrame(() => {
        if (shouldGoBack) {
          previousLayer.style.transform =
            "translate3d(0, 0, 0)";
          previousLayer.style.opacity = "1";
          currentLayer.style.transform =
            `translate3d(${width}px, 0, 0)`;
        } else {
previousLayer.style.transform =
            `translate3d(${-Math.round(width * 0.12)}px, 0, 0)`;
          previousLayer.style.opacity = "0.97";
          currentLayer.style.transform =
            "translate3d(0, 0, 0)";
        }
      });

      window.setTimeout(() => {
        if (
          shouldGoBack &&
          typeof backHandler === "function"
        ) {
          state.navigationVisualStack.pop();
          state.suppressNextViewTransition = true;
          state.nextNavigationDirection = "none";
          backHandler();

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              finishNavigationSwipe();
            });
          });
          return;
        }

        finishNavigationSwipe();
      }, duration + 20);
    }

    function finishNavigationSwipe() {
      state.edgeSwipeTracking = false;
      state.edgeSwipeActive = false;
      state.edgeSwipeStartX = 0;
      state.edgeSwipeStartY = 0;
      state.edgeSwipeCurrentX = 0;
      state.edgeSwipeStartedAt = 0;
      state.edgeSwipeBackHandler = null;
      state.edgeSwipePreviousLayer = null;
      state.edgeSwipeCurrentLayer = null;
      state.edgeSwipeWidth = 0;
      clearNavigationSurfaces();
    }

    function resetNavigationSwipe() {
      if (
        state.edgeSwipePreviousLayer ||
        state.edgeSwipeCurrentLayer
      ) {
        clearNavigationSurfaces();
      } else {
        clearTopbarTransition();
      }

      state.edgeSwipeTracking = false;
      state.edgeSwipeActive = false;
      state.edgeSwipeStartX = 0;
      state.edgeSwipeStartY = 0;
      state.edgeSwipeCurrentX = 0;
      state.edgeSwipeStartedAt = 0;
      state.edgeSwipeBackHandler = null;
      state.edgeSwipePreviousLayer = null;
      state.edgeSwipeCurrentLayer = null;
      state.edgeSwipeWidth = 0;
    }

    function setView(html, afterRender, chrome = {}) {
      const direction =
        state.nextNavigationDirection || "none";
      state.nextNavigationDirection = "none";

      const suppressTransition =
        state.suppressNextViewTransition;
      state.suppressNextViewTransition = false;

      closeCategoryEditorSheet({ silent: true });
      closeObservationStorePicker({ silent: true });

      const previousViewKey = state.currentViewKey;
      const previousScrollTop = getAppScrollTop();

      if (previousViewKey) {
        state.scrollPositions[previousViewKey] =
          previousScrollTop;
      }

      const canLayerTransition =
        !suppressTransition &&
        !state.navigationTransitioning &&
        ["forward", "back"].includes(direction) &&
        Boolean(app.innerHTML.trim());

      let oldSnapshot = null;
      let oldSurface = null;
      let preparedOldTopbarLayer = null;
      let transitionViewport = null;

      if (canLayerTransition) {
        clearNavigationSurfaces();
        transitionViewport =
          getNavigationViewportRect();
        oldSnapshot = captureNavigationSnapshot();
        oldSurface = createNavigationSurface(
          oldSnapshot,
          "is-front",
          transitionViewport
        );

        clearTopbarTransition({ showLive: false });
        topbarNavLive?.classList.add(
          "is-hidden-for-transition"
        );
        preparedOldTopbarLayer =
          createTopbarChromeLayer(
            oldSnapshot.chrome,
            "is-old"
          );

        app.style.visibility = "hidden";

        if (
          direction === "forward" &&
          oldSnapshot
        ) {
          state.navigationVisualStack.push(
            oldSnapshot
          );
        } else if (direction === "back") {
          state.navigationVisualStack.pop();
        }
      } else if (direction === "tab") {
        state.navigationVisualStack = [];
      }

      stopScanner();
      closeProductImageViewer();

      if (app.querySelector('[data-form="product"]')) {
        cancelProductImageProcessing();
      }

      app.innerHTML = html;
      if (typeof afterRender === "function") {
        afterRender();
      }

      hydrateStoreLogos(app);
      hydrateProductImages(app);
      updateChrome(chrome);

      const nextViewKey = String(
        chrome.viewKey ||
        chrome.tab ||
        chrome.title ||
        "screen"
      );
      state.currentViewKey = nextViewKey;

      const savedScroll =
        state.scrollPositions[nextViewKey];
      const targetScroll = Number.isFinite(savedScroll)
        ? savedScroll
        : 0;

      setAppScrollTop(targetScroll);

      requestAnimationFrame(() => {
        setAppScrollTop(targetScroll);

        if (
          canLayerTransition &&
          oldSurface &&
          oldSnapshot
        ) {
          requestAnimationFrame(() => {
            const newSnapshot =
              captureNavigationSnapshot();
            const newSurface =
              createNavigationSurface(
                newSnapshot,
                direction === "forward"
                  ? "is-front"
                  : "is-previous",
                transitionViewport
              );

            animateTopbarChrome(
              oldSnapshot.chrome,
              newSnapshot.chrome,
              direction,
              520,
              preparedOldTopbarLayer
            );

            animateNavigationSurfaces(
              oldSurface,
              newSurface,
              direction,
              () => {
                setAppScrollTop(targetScroll);
                requestAnimationFrame(() => {
                  setAppScrollTop(targetScroll);
                  app.style.visibility = "";
                });
              }
            );
          });
          return;
        }

        app.style.visibility = "";

        if (
          direction === "tab" &&
          !suppressTransition
        ) {
          applyTabEntryAnimation();
        }
      });
    }

    function updateChrome({ title = "條碼格價記錄", back = null, tab = "", refresh = null } = {}) {
      const titleEl = document.querySelector("#screenTitle");
      if (titleEl) titleEl.textContent = title;

      const nextBackHandler = typeof back === "function" ? back : null;
      state.backHandler = nextBackHandler;
      const backEl = document.querySelector(".topbar-back");
      if (backEl) {
        backEl.hidden = nextBackHandler === null;
      }

      state.pullToRefreshHandler = typeof refresh === "function" ? refresh : null;
      if (!state.pullRefreshing) resetPullToRefresh();

      document.querySelectorAll(".tabbar button").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.tab === tab);
      });
      requestAnimationFrame(updateTabbarLiquidIndicator);
    }

    function updateTabbarLiquidIndicator() {
      const tabbar = document.querySelector("#tabbar");
      const indicator = document.querySelector("#tabbarLiquidIndicator");
      const activeButton = tabbar?.querySelector("button.is-active");
      if (!tabbar || !indicator || !activeButton) {
        if (indicator) indicator.style.opacity = "0";
        return;
      }

      const tabbarRect = tabbar.getBoundingClientRect();
      const buttonRect = activeButton.getBoundingClientRect();
      indicator.style.opacity = "1";
      indicator.style.width = `${buttonRect.width}px`;
      indicator.style.transform = `translate3d(${buttonRect.left - tabbarRect.left - 6}px, 0, 0)`;
    }

      if (!observation) return "";

      return String(storeDisplayName(store) || observation.storeNameSnapshot || observation.store || "").trim();

    function getObservationStore(observation) {
      if (!observation) return null;
      if (observation.storeId) {
        const store = findStore(observation.storeId);
        if (store) return store;
      }
      return findStoreByName(observation.storeNameSnapshot || observation.store);

    function ensureStoreForObservation(name) {
      const cleanName = String(name || "").trim();
      if (!cleanName) return null;
      const existing = findStoreByName(cleanName);
      if (existing) return existing;

      const timestamp = nowIso();
      const store = {
        storeId: uid("store"),
        storeName: cleanName,
        displayName: cleanName,
        countryOrRegion: "Hong Kong",
        storeType: "Physical store",
        defaultCurrency: "HKD",
        logoKey: "",
        logoUpdatedAt: "",
        notes: "",
        createdAt: timestamp,
        updatedAt: timestamp
      };
      dataService.addStore(store);
      return store;

      const dateDiff = String(b.date || "").localeCompare(String(a.date || ""));
      if (dateDiff !== 0) return dateDiff;
      return String(b.createdAt || "").localeCompare(String(a.createdAt || ""));

    async function hydrateStoreLogos(root = document) {
      const images = [...root.querySelectorAll("img[data-logo-key]")];
      for (const image of images) {
        if (image.dataset.logoHydrated === "1") continue;
        image.dataset.logoHydrated = "1";
        try {
          await cloudImageService.ensureLocal(
            "stores",
            image.dataset.logoKey
          );
          const url = await getLogoObjectUrl(image.dataset.logoKey);
          if (url) {
            const showLoadedLogo = () => image.closest(".store-logo")?.classList.add("has-loaded-image");
            image.addEventListener("load", showLoadedLogo, { once: true });
            image.src = url;
            image.hidden = false;
            if (image.complete && image.naturalWidth > 0) showLoadedLogo();
          }
        } catch (error) {
          image.hidden = true;
        }
      }
    }

    async function hydrateProductImages(root = document) {
      const images = [...root.querySelectorAll("img[data-image-key]")];
      for (const image of images) {
        if (image.dataset.imageHydrated === "1") continue;
        image.dataset.imageHydrated = "1";
        try {
          await cloudImageService.ensureLocal(
            "products",
            image.dataset.imageKey
          );
          const url = await getImageObjectUrl(image.dataset.imageKey);
          if (url) {
            const showLoadedImage = () => image.closest(".product-image")?.classList.add("has-loaded-image");
            image.addEventListener("load", showLoadedImage, { once: true });
            image.src = url;
            image.hidden = false;
            if (image.complete && image.naturalWidth > 0) showLoadedImage();
          }
        } catch (error) {
          image.hidden = true;
        }
      }
    }

    function openProductImageViewer(trigger) {
      const sourceImage = trigger?.querySelector?.("img");
      const sourceUrl = sourceImage?.currentSrc || sourceImage?.src || "";
      if (!sourceUrl || sourceImage.hidden || !trigger.classList.contains("has-loaded-image")) return;

      closeProductImageViewer();
      const viewer = document.createElement("div");
      viewer.className = "image-viewer";
      viewer.setAttribute("role", "dialog");
      viewer.setAttribute("aria-modal", "true");
      viewer.setAttribute("aria-label", "產品圖片");
      viewer.innerHTML = `
        <button class="image-viewer-close" type="button" aria-label="關閉圖片">×</button>
        <img class="image-viewer-image" src="${escapeHtml(sourceUrl)}" alt="產品圖片" draggable="false">
      `;

      viewer.addEventListener("click", (event) => {
        if (event.target === viewer || event.target.closest(".image-viewer-close")) closeProductImageViewer();
      });
      viewer.querySelector(".image-viewer-image")?.addEventListener("click", (event) => event.stopPropagation());

      state.imageViewerScrollY = getAppScrollTop();
      state.imageViewerTrigger = trigger;
      state.imageViewerOpen = true;
      document.body.appendChild(viewer);
      document.body.classList.add("image-viewer-open");
      app.classList.add("is-modal-locked");
      viewer.querySelector(".image-viewer-close")?.focus();

    function closeProductImageViewer() {
      const viewer = document.querySelector(".image-viewer");
      if (!viewer && !state.imageViewerOpen) return;
      viewer?.remove();
      document.body.classList.remove("image-viewer-open");
      app.classList.remove("is-modal-locked");
      const restoreY = state.imageViewerScrollY || 0;
      const trigger = state.imageViewerTrigger;
      state.imageViewerOpen = false;
      state.imageViewerScrollY = 0;
      state.imageViewerTrigger = null;
      setAppScrollTop(restoreY);
      if (trigger?.isConnected) trigger.focus?.();
    }

    function handlePullTouchStart(event) {
      resetPullToRefresh();
      if (
        !state.pullToRefreshHandler ||
        state.pullRefreshing ||
        state.imageViewerOpen ||
        hasUnsavedRefreshInput() ||
        getAppScrollTop() > 0 ||
        event.touches.length !== 1 ||
        event.target.closest?.("input, textarea, select, a, .topbar, .tabbar, .category-drag-handle, [data-action='view-product-image']")
      ) return;

      const touch = event.touches[0];
      state.pullStartX = touch.clientX;
      state.pullStartY = touch.clientY;
      state.pullDistance = 0;
      state.pullTracking = true;
      state.pullGestureActive = false;
    }

    function hasUnsavedRefreshInput() {
      const backupText = document.querySelector("#backupJson")?.value.trim() || "";
      return Boolean(
        document.querySelector("[data-form]") ||
        backupText ||
        state.pendingImport ||
        state.pendingFullImport
      );
    }

    function handlePullTouchMove(event) {
      if (!state.pullTracking || state.pullRefreshing || event.touches.length !== 1) return;
      if (getAppScrollTop() > 0) {
        resetPullToRefresh();
        return;
      }

      const touch = event.touches[0];
      const deltaX = touch.clientX - state.pullStartX;
      const deltaY = touch.clientY - state.pullStartY;
      if (deltaY <= 0 || Math.abs(deltaX) > Math.abs(deltaY)) {
        if (Math.abs(deltaX) > 10 || deltaY < -4) resetPullToRefresh();
        return;
      }
      if (deltaY < 10) return;

      state.pullGestureActive = true;
      state.pullDistance = Math.min(110, deltaY);
      event.preventDefault();
      updatePullRefreshIndicator(
        state.pullDistance >= 70 ? "放開重新整理" : "下拉重新整理",
        state.pullDistance
      );
    }

    function handlePullTouchEnd() {
      if (!state.pullTracking) return;
      const shouldRefresh = state.pullGestureActive && state.pullDistance >= 70;
      state.pullTracking = false;
      if (shouldRefresh) {
        void performPullToRefresh();
      } else {
        resetPullToRefresh();
      }
    }

    function updatePullRefreshIndicator(message, distance = 0) {
      if (!pullRefreshIndicator) return;
      pullRefreshIndicator.textContent = message;
      pullRefreshIndicator.classList.add("is-visible");
      pullRefreshIndicator.classList.toggle("is-settling", state.pullRefreshing);
      if (!state.pullRefreshing) {
        const offset = Math.min(8, -42 + distance * 0.72);
        pullRefreshIndicator.style.transform = `translate(-50%, ${offset}px)`;
      } else {
        pullRefreshIndicator.style.transform = "";
      }
    }

    async function performPullToRefresh() {
      if (state.pullRefreshing || !state.pullToRefreshHandler || state.imageViewerOpen) return;
      const refreshHandler = state.pullToRefreshHandler;
      state.pullRefreshing = true;
      updatePullRefreshIndicator("正在更新…", 70);

      try {
        state.data = loadData();
        await Promise.resolve(refreshHandler());
        updatePullRefreshIndicator("已更新", 70);
        window.setTimeout(() => {
          state.pullRefreshing = false;
          resetPullToRefresh();
        }, 700);
      } catch (error) {
        updatePullRefreshIndicator("重新整理失敗，請再試一次", 70);
        window.setTimeout(() => {
          state.pullRefreshing = false;
          resetPullToRefresh();
        }, 1200);
      }
    }

    function resetPullToRefresh() {
      if (state.pullRefreshing) return;
      state.pullTracking = false;
      state.pullGestureActive = false;
      state.pullDistance = 0;
      if (!pullRefreshIndicator) return;
      pullRefreshIndicator.classList.remove("is-visible", "is-settling");
      pullRefreshIndicator.style.transform = "";
      pullRefreshIndicator.textContent = "下拉重新整理";
    }

      if (state.cloud.connecting) {
        return `${cloudModeLabel(mode)} · 連接中`;

    function cloudStatusPresentation() {
      const mode = state.cloudProfile?.mode || "local";

      if (mode === "local") {
        return {
          label: "本機使用中",
          className: "is-ready",
          description: "目前所有文字資料及圖片都只儲存在這部裝置。"
        };
      }

      if (state.cloud.connecting) {
        return {
          label: "連接中",
          className: "",
          description: "正在載入 Firebase 及檢查連接。"
        };
      }

      if (state.cloud.lastError) {
        return {
          label: "需要處理",
          className: "is-error",
          description: state.cloud.lastError.message || "Firebase 連接失敗。"
        };
      }

      if (!state.cloud.initialized) {
        return {
          label: "未連接",
          className: "is-warning",
          description: mode === "own"
            ? "請完成自己的 Firebase Web App 設定。"
            : "尚未連接 Price Tracker Cloud。"
        };
      }

      if (!state.cloud.authenticated) {
        return {
          label: "未登入",
          className: "is-warning",
          description: "Firebase 已連接，請使用 Google 帳戶登入。"
        };
      }

      if (mode === "shared") {
        if (state.cloud.approval === "approved") {
          return {
            label: "已批准",
            className: "is-ready",
            description: "帳戶可以使用 Price Tracker Cloud。文字資料可設定自動同步。"
          };
        }

        if (state.cloud.approval === "checking") {
          return {
            label: "檢查中",
            className: "",
            description: "正在檢查 Price Tracker Cloud 使用權限。"
          };
        }

        if (state.cloud.approval === "not-approved") {
          return {
            label: state.cloud.accessRequest === "submitted"
              ? "申請已提交"
              : "未獲批准",
            className: "is-warning",
            description: state.cloud.accessRequest === "submitted"
              ? "管理員批准後，請重新檢查狀態。"
              : "請提交使用申請，由管理員批准。"
          };

        return {
          label: "權限錯誤",
          className: "is-error",
          description: "未能讀取批准狀態，請確認 Firestore Rules 已發布。"
        };
      }

      return {
        label: "已連接",
        className: "is-ready",
        description: "已登入自己的 Firebase。文字資料可設定自動同步。"
      };
    }

    function renderCloudUserCard(user) {
      if (!user) return "";

      const initials = String(user.displayName || user.email || "U")
        .trim()
        .slice(0, 1)
        .toUpperCase();

      return `
        <div class="cloud-user-card">
          <span class="cloud-user-avatar">
            ${user.photoURL
              ? `<img src="${escapeHtml(user.photoURL)}" alt="">`
              : escapeHtml(initials)}
          </span>
          <span class="cloud-user-main">
            <span class="cloud-user-name">${escapeHtml(user.displayName || "Google 使用者")}</span>
            <span class="cloud-user-email">${escapeHtml(user.email || "")}</span>
          </span>
        </div>
      `;
    }

    function renderOwnFirebaseConfig() {
      const config = state.cloudProfile?.ownFirebase || {};
      return `
        <section class="cloud-config-card">
          <div>
            <h2 class="cloud-status-title">自己的 Firebase Web App</h2>
            <p class="cloud-status-subtitle">只輸入 Firebase Web App 的公開 config。唔好輸入 Admin SDK、service account 或 private key。</p>
          </div>
          <div class="cloud-config-grid">
            <label>
              API Key
              <input id="ownFirebaseApiKey" type="text" autocomplete="off" value="${escapeHtml(config.apiKey || "")}" placeholder="AIza...">
            </label>
            <label>
              Auth Domain
              <input id="ownFirebaseAuthDomain" type="text" autocomplete="off" value="${escapeHtml(config.authDomain || "")}" placeholder="project.firebaseapp.com">
            </label>
            <label>
              Project ID
              <input id="ownFirebaseProjectId" type="text" autocomplete="off" value="${escapeHtml(config.projectId || "")}" placeholder="my-project">
            </label>
            <label>
              Storage Bucket
              <input id="ownFirebaseStorageBucket" type="text" autocomplete="off" value="${escapeHtml(config.storageBucket || "")}" placeholder="project.firebasestorage.app">
            </label>
            <label>
              Messaging Sender ID
              <input id="ownFirebaseMessagingSenderId" type="text" inputmode="numeric" autocomplete="off" value="${escapeHtml(config.messagingSenderId || "")}" placeholder="123456789">
            </label>
            <label>
              App ID
              <input id="ownFirebaseAppId" type="text" autocomplete="off" value="${escapeHtml(config.appId || "")}" placeholder="1:...:web:...">
            </label>
          </div>
          <button class="btn-primary" type="button" data-action="save-own-firebase">儲存並測試連接</button>
          <p class="helper">自己的 Firebase 亦要啟用 Google Sign-in，並將 yutintinmarco.github.io 加入 Authorized domains。</p>
        </section>
      `;
    }

    function renderCloudConnectionPanel() {
      const mode = state.cloudProfile?.mode || "local";
      const presentation = cloudStatusPresentation();
      const user = state.cloud.user;

      if (mode === "local") {
        return `
          <section class="cloud-status-card">
            <div class="cloud-status-header">
              <div>
                <h2 class="cloud-status-title">本機資料</h2>
                <p class="cloud-status-subtitle">${escapeHtml(presentation.description)}</p>
              </div>
              <span class="cloud-status-badge ${presentation.className}">${escapeHtml(presentation.label)}</span>
            </div>
            <div class="notice">記得定期使用「備份與還原」匯出 JSON。清除網站資料可能會移除本機記錄及圖片。</div>
          </section>
        `;
      }

      const projectId = state.cloud.projectId ||
        (mode === "own"
          ? state.cloudProfile?.ownFirebase?.projectId
          : window.PRICE_TRACKER_SHARED_FIREBASE_CONFIG?.firebase?.projectId) ||
        "";

      const actionButtons = [];

      if (!state.cloud.initialized && !state.cloud.connecting) {
        actionButtons.push(
          `<button class="btn-secondary" type="button" data-action="cloud-reconnect">重新連接 Firebase</button>`
        );
      }

      if (state.cloud.initialized && !state.cloud.authenticated) {
        actionButtons.push(
          `<button class="btn-primary" type="button" data-action="cloud-sign-in">使用 Google 登入</button>`
        );
      }

      if (state.cloud.authenticated) {
        if (
          mode === "shared" &&
          state.cloud.approval === "not-approved" &&
          state.cloud.accessRequest !== "submitted"
        ) {
          actionButtons.push(
            `<button class="btn-primary" type="button" data-action="cloud-request-access">申請使用 Price Tracker Cloud</button>`
          );
        }

        if (mode === "shared") {
          actionButtons.push(
            `<button class="btn-secondary" type="button" data-action="cloud-refresh-approval">重新檢查批准狀態</button>`
          );
        }

        actionButtons.push(
          `<button class="btn-plain" type="button" data-action="cloud-sign-out">登出 Google 帳戶</button>`
        );
      }

      return `
        <section class="cloud-status-card">
          <div class="cloud-status-header">
            <div>
              <h2 class="cloud-status-title">${escapeHtml(cloudModeLabel(mode))}</h2>
              <p class="cloud-status-subtitle">${escapeHtml(presentation.description)}</p>
            </div>
            <span class="cloud-status-badge ${presentation.className}">${escapeHtml(presentation.label)}</span>
          </div>

          ${renderCloudUserCard(user)}

          <div class="cloud-detail-list">
            <div class="cloud-detail-row">
              <span class="cloud-detail-label">Firebase Project</span>
              <span class="cloud-detail-value">${escapeHtml(projectId || "未設定")}</span>
            </div>
            <div class="cloud-detail-row">
              <span class="cloud-detail-label">網絡</span>
              <span class="cloud-detail-value">${state.cloud.online ? "Online" : "Offline"}</span>
            </div>
            <div class="cloud-detail-row">
              <span class="cloud-detail-label">App 版本</span>
              <span class="cloud-detail-value">${escapeHtml(APP_BUILD)}</span>
            </div>
            <div class="cloud-detail-row">
              <span class="cloud-detail-label">Firebase SDK</span>
              <span class="cloud-detail-value">${escapeHtml(state.cloud.sdkVersion || firebaseService.getSdkVersion())}</span>
            </div>
            <div class="cloud-detail-row">
              <span class="cloud-detail-label">Google 登入</span>
              <span class="cloud-detail-value">${state.cloud.authenticated ? "已登入" : "未登入"}</span>
            </div>
            ${mode === "shared" ? `
              <div class="cloud-detail-row">
                <span class="cloud-detail-label">使用權限</span>
                <span class="cloud-detail-value">${escapeHtml(presentation.label)}</span>
              </div>
            ` : ""}
          </div>

          ${user && mode === "shared" ? `
            <div>
              <div class="helper">Firebase UID</div>
              <div class="cloud-code">${escapeHtml(user.uid)}</div>
              <button class="btn-plain btn-sm" style="margin-top:7px;" type="button" data-action="copy-cloud-uid">複製 UID</button>
            </div>
          ` : ""}

          ${state.cloud.lastError ? `
            <div class="notice danger-note">
              ${escapeHtml(state.cloud.lastError.code || "Firebase error")}<br>
              ${escapeHtml(state.cloud.lastError.message || "")}
            </div>
          ` : ""}

          ${actionButtons.length ? `
            <div class="cloud-action-stack">${actionButtons.join("")}</div>
          ` : ""}

          <p class="helper">產品、店舖、價格記錄、設定、產品圖片及店舖 Logo 都會在完成首次設定後自動同步。</p>
        </section>
      `;
    }

    function cloudSyncCanRun() {
      const mode = state.cloudProfile?.mode || "local";
      if (mode === "local") return false;
      if (!state.cloud.initialized || !state.cloud.authenticated) return false;
      if (mode === "shared" && state.cloud.approval !== "approved") return false;
      return true;
    }

    function cloudSyncTotal(counts) {
      return (
        Number(counts?.products || 0) +
        Number(counts?.observations || 0) +
        Number(counts?.stores || 0)
      );
    }

    function renderCloudSyncCounts(title, counts) {
      return `
        <div>
          <div class="helper" style="margin-bottom:7px;">${escapeHtml(title)}</div>
          <div class="cloud-sync-counts">
            <div class="cloud-sync-count">
              <span class="cloud-sync-count-value">${Number(counts?.products || 0)}</span>
              <span class="cloud-sync-count-label">產品</span>
            </div>
            <div class="cloud-sync-count">
              <span class="cloud-sync-count-value">${Number(counts?.observations || 0)}</span>
              <span class="cloud-sync-count-label">價格記錄</span>
            </div>
            <div class="cloud-sync-count">
              <span class="cloud-sync-count-value">${Number(counts?.stores || 0)}</span>
              <span class="cloud-sync-count-label">店舖</span>
            </div>
          </div>
        </div>
      `;
    }

    function cloudSyncPhasePresentation() {
      const sync = state.cloudSync || {};

      if (sync.phase === "checking") {
        return {
          label: "檢查雲端資料",
          className: "",
          description: "正在比較此裝置同 Cloud 狀態。"
        };
      }

      if (sync.phase === "initializing-upload") {
        return {
          label: "正在上載",
          className: "",
          description: "正在以本機資料建立 Cloud 主版本。請保持 App 開啟。"
        };
      }

      if (sync.phase === "initializing-download") {
        return {
          label: "正在下載",
          className: "",
          description: "已先備份本機文字資料，正在由 Cloud 設定此裝置。"
        };
      }

      if (sync.phase === "syncing") {
        return {
          label: "正在同步",
          className: "",
          description: "本機已保存，正在將變更寫入 Cloud。"
        };
      }

      if (sync.phase === "offline") {
        return {
          label: "離線待同步",
          className: "is-warning",
          description: "變更已自動保存在本機，恢復網絡後會補傳。"
        };
      }

      if (sync.phase === "error") {
        return {
          label: "同步需要處理",
          className: "is-error",
          description:
            sync.lastError?.message ||
            "資料已保存在本機，稍後可以重新同步。"
        };
      }

      if (sync.initialized) {
        return {
          label: sync.pendingCount ? "等待同步" : "雲端已同步",
          className: sync.pendingCount ? "is-warning" : "is-ready",
          description: sync.pendingCount
            ? `有 ${sync.pendingCount} 項變更等待寫入 Cloud。`
            : "Cloud 係正式主資料；本機會自動保存離線快取。"
        };
      }

      return {
        label: "首次設定",
        className: "is-warning",
        description: "請指定以本機資料建立 Cloud，或者由已有 Cloud 資料設定此裝置。"
      };
    }

    function formatCloudSyncTime(value) {
      if (!value) return "尚未完成";

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;

      return new Intl.DateTimeFormat("zh-HK", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function renderCloudSyncPanel() {
      if (!cloudSyncCanRun()) return "";

      const sync = state.cloudSync || {};
      const presentation = cloudSyncPhasePresentation();
      const busy =
        sync.syncing ||
        sync.phase === "checking" ||
        sync.phase === "initializing-upload" ||
        sync.phase === "initializing-download";

      if (!sync.initialized) {
        const cloudEmpty = !sync.cloudInitialized;
        const localTotal = cloudSyncTotal(sync.localCounts);
        const cloudTotal = cloudSyncTotal(sync.cloudCounts);

        return `
          <section class="cloud-sync-card">
            <div class="cloud-status-header">
              <div>
                <h2 class="cloud-status-title">首次資料設定</h2>
                <p class="cloud-status-subtitle">${escapeHtml(presentation.description)}</p>
              </div>
              <span class="cloud-status-badge ${presentation.className}">${escapeHtml(presentation.label)}</span>
            </div>

            ${renderCloudSyncCounts("此裝置本機資料", sync.localCounts)}
            ${renderCloudSyncCounts("Cloud 現有資料", sync.cloudCounts)}

            ${sync.lastError ? `
              <div class="notice danger-note">
                ${escapeHtml(sync.lastError.code || "Cloud sync error")}<br>
                ${escapeHtml(sync.lastError.message || "")}
              </div>
            ` : ""}

            <div class="cloud-sync-direction">
              <button class="cloud-sync-direction-card" type="button" data-action="cloud-sync-upload" ${busy ? "disabled" : ""}>
                <span class="cloud-sync-direction-title">以上載本機資料建立 Cloud</span>
                <span class="cloud-sync-direction-description">Cloud 會被本機 ${localTotal} 項記錄完整取代，不會 merge。適合你目前第一部電話。</span>
              </button>

              <button class="cloud-sync-direction-card" type="button" data-action="cloud-sync-download" ${(busy || cloudEmpty) ? "disabled" : ""}>
                <span class="cloud-sync-direction-title">由 Cloud 設定此裝置</span>
                <span class="cloud-sync-direction-description">${cloudEmpty
                  ? "Cloud 暫時冇資料，完成第一部電話上載後先可使用。"
                  : `本機會先做安全備份，再由 Cloud ${cloudTotal} 項記錄完整取代，不會 merge。`}</span>
              </button>
            </div>

            <button class="btn-plain" type="button" data-action="cloud-sync-refresh" ${busy ? "disabled" : ""}>重新檢查資料數量</button>
            <p class="helper">文字資料包括產品、店舖、價格記錄、分類及單位設定；圖片及店舖 Logo 會由 Cloud Storage 另外同步。</p>
          </section>
        `;
      }

      return `
        <section class="cloud-sync-card">
          <div class="cloud-status-header">
            <div>
              <h2 class="cloud-status-title">Cloud 資料同步</h2>
              <p class="cloud-status-subtitle">${escapeHtml(presentation.description)}</p>
            </div>
            <span class="cloud-status-badge ${presentation.className}">${escapeHtml(presentation.label)}</span>
          </div>

          <div class="cloud-sync-progress">
            <span class="cloud-sync-dot ${presentation.className}"></span>
            <span>${escapeHtml(presentation.label)}</span>
          </div>

          ${renderCloudSyncCounts("目前資料", sync.localCounts)}

          <div class="cloud-sync-meta">
            <div class="cloud-sync-meta-row">
              <span class="cloud-sync-meta-label">待同步變更</span>
              <span class="cloud-sync-meta-value">${Number(sync.pendingCount || 0)} 項</span>
            </div>
            <div class="cloud-sync-meta-row">
              <span class="cloud-sync-meta-label">最後完成同步</span>
              <span class="cloud-sync-meta-value">${escapeHtml(formatCloudSyncTime(sync.lastSyncAt))}</span>
            </div>
            <div class="cloud-sync-meta-row">
              <span class="cloud-sync-meta-label">本機裝置 ID</span>
              <span class="cloud-sync-meta-value">${escapeHtml(String(sync.deviceId || "").slice(-12))}</span>
            </div>
          </div>

          ${sync.lastError ? `
            <div class="notice danger-note">
              ${escapeHtml(sync.lastError.code || "Cloud sync error")}<br>
              ${escapeHtml(sync.lastError.message || "")}
            </div>
          ` : ""}

          <button class="btn-secondary" type="button" data-action="cloud-sync-now" ${busy ? "disabled" : ""}>立即同步</button>
          <button class="btn-plain" type="button" data-action="cloud-sync-refresh" ${busy ? "disabled" : ""}>重新讀取 Cloud 狀態</button>
          <p class="helper">每次儲存會先自動寫入本機，然後背景同步到 Cloud。離線期間的變更會保留並在恢復網絡後補傳。</p>
        </section>
      `;
    }

    function cloudImagePhasePresentation() {
      const images = state.cloudImages || {};

      if (images.phase === "scanning") {
        return {
          label: "檢查圖片",
          className: "",
          description: "正在比較本機圖片快取同 Cloud Storage。"
        };
      }

      if ([
        "syncing",
        "recovery-uploading",
        "recovery-pruning",
        "recovery-downloading",
        "recovery-clearing",
        "inspecting"
      ].includes(images.phase)) {
        return {
          label: "正在同步圖片",
          className: "",
          description: "正在上載或下載產品圖片及店舖 Logo。"
        };
      }

      if (images.phase === "offline") {
        return {
          label: "離線待同步",
          className: "is-warning",
          description: "圖片仍保存在本機，恢復網絡後會自動補傳。"
        };
      }

      if (images.phase === "incomplete") {
        return {
          label: "圖片引用需要修復",
          className: "is-warning",
          description: `Cloud 缺少 ${Number(images.missingRemoteCount || 0)} 張已引用圖片；其中 ${Number(images.brokenReferenceCount || 0)} 張在本機亦冇快取。系統已停止無限重試。`
        };
      }

      if (images.phase === "error") {
        return {
          label: "圖片同步需要處理",
          className: "is-error",
          description:
            images.lastError?.message ||
            "圖片已保存在本機，稍後可以重新同步。"
        };
      }

      if (images.attached) {
        return {
          label: images.pendingCount ? "等待同步" : "圖片已同步",
          className: images.pendingCount ? "is-warning" : "is-ready",
          description: images.pendingCount
            ? `有 ${images.pendingCount} 張圖片等待同步。`
            : "產品圖片及店舖 Logo 已放入 Cloud Storage，並自動保存本機快取。"
        };
      }

      return {
        label: "等待文字資料設定",
        className: "is-warning",
        description: "完成 Cloud 文字資料首次設定後，圖片會自動開始同步。"
      };
    }

    function renderCloudImagePanel() {
      if (!cloudSyncCanRun()) return "";

      const images = state.cloudImages || {};
      const presentation = cloudImagePhasePresentation();
      const busy = images.syncing || images.phase === "scanning";

      return `
        <section class="cloud-image-card">
          <div class="cloud-status-header">
            <div>
              <h2 class="cloud-status-title">Cloud 圖片同步</h2>
              <p class="cloud-status-subtitle">${escapeHtml(presentation.description)}</p>
            </div>
            <span class="cloud-status-badge ${presentation.className}">${escapeHtml(presentation.label)}</span>
          </div>

          <div class="cloud-image-stats">
            <div class="cloud-image-stat">
              <strong>${Number(images.referencedCount || 0)}</strong>
              <span>Cloud 圖片總數</span>
            </div>
            <div class="cloud-image-stat">
              <strong>${Number(images.cachedCount || 0)}</strong>
              <span>本機已快取</span>
            </div>
            <div class="cloud-image-stat">
              <strong>${Number(images.pendingCount || 0)}</strong>
              <span>待同步</span>
            </div>
          </div>

          <div class="cloud-sync-meta">
            <div class="cloud-sync-meta-row">
              <span class="cloud-sync-meta-label">已上載</span>
              <span class="cloud-sync-meta-value">${Number(images.uploadedCount || 0)} 張</span>
            </div>
            <div class="cloud-sync-meta-row">
              <span class="cloud-sync-meta-label">已下載</span>
              <span class="cloud-sync-meta-value">${Number(images.downloadedCount || 0)} 張</span>
            </div>
            <div class="cloud-sync-meta-row">
              <span class="cloud-sync-meta-label">最後完成同步</span>
              <span class="cloud-sync-meta-value">${escapeHtml(formatCloudSyncTime(images.lastSyncAt))}</span>
            </div>
          </div>

          ${images.lastError ? `
            <div class="notice danger-note">
              ${escapeHtml(images.lastError.code || "Cloud image error")}<br>
              ${escapeHtml(images.lastError.message || "")}
            </div>
          ` : ""}

          <button class="btn-secondary" type="button" data-action="cloud-images-sync-now" ${busy ? "disabled" : ""}>立即同步圖片</button>
          <p class="helper">圖片先保存在本機 IndexedDB，再背景同步到 Cloud Storage。另一部電話會自動下載並建立本機快取。</p>
        </section>
      `;
    }


    function renderCloudRecoveryEntry() {
      if (!cloudSyncCanRun() || !state.cloudSync.initialized) return "";

      return `
        <section class="cloud-recovery-entry">
          <button class="cloud-recovery-entry-button" type="button" data-action="open-cloud-recovery">
            <span class="cloud-recovery-entry-icon">↻</span>
            <span class="cloud-recovery-entry-main">
              <span class="cloud-recovery-entry-title">進階復原</span>
              <span class="cloud-recovery-entry-description">完整取代、重新下載、重建圖片快取或清空 Cloud。所有操作都不會 merge。</span>
            </span>
            <span class="cloud-recovery-chevron">›</span>
          </button>
        </section>
      `;
    }

    function cloudRecoveryBusy() {
      return state.cloudRecovery?.busy === true;
    }

    function setCloudRecoveryBusy(action = "", message = "") {
      state.cloudRecovery = {
        ...state.cloudRecovery,
        busy: Boolean(action),
        action,
        message,
        lastError: null
      };
      if (state.currentViewKey === "settings:cloud-recovery") {
        renderCloudRecovery();
      }
    }

    function cloudRecoveryTextTotal(counts) {
      return cloudSyncTotal(counts || {});
    }

    function renderCloudRecoverySummary() {
      const local = state.cloudSync.localCounts || {};
      const cloud = state.cloudSync.cloudCounts || {};
      const images = state.cloudImages || {};

      return `
        <div class="cloud-recovery-summary-grid">
          <div class="cloud-recovery-summary">
            <span class="cloud-recovery-summary-title">此裝置文字資料</span>
            <strong class="cloud-recovery-summary-value">${cloudRecoveryTextTotal(local)}</strong>
            <span class="cloud-recovery-summary-meta">${Number(local.products || 0)} 產品 · ${Number(local.observations || 0)} 價格 · ${Number(local.stores || 0)} 店舖</span>
          </div>
          <div class="cloud-recovery-summary">
            <span class="cloud-recovery-summary-title">Cloud 文字資料</span>
            <strong class="cloud-recovery-summary-value">${cloudRecoveryTextTotal(cloud)}</strong>
            <span class="cloud-recovery-summary-meta">${Number(cloud.products || 0)} 產品 · ${Number(cloud.observations || 0)} 價格 · ${Number(cloud.stores || 0)} 店舖</span>
          </div>
          <div class="cloud-recovery-summary">
            <span class="cloud-recovery-summary-title">此裝置圖片快取</span>
            <strong class="cloud-recovery-summary-value">${Number(images.cachedCount || 0)}</strong>
            <span class="cloud-recovery-summary-meta">引用 ${Number(images.referencedCount || 0)} 張 · 缺少 ${Number(images.missingLocalCount || 0)} 張</span>
          </div>
          <div class="cloud-recovery-summary">
            <span class="cloud-recovery-summary-title">Cloud Storage</span>
            <strong class="cloud-recovery-summary-value">${Number(images.remoteCount || 0)}</strong>
            <span class="cloud-recovery-summary-meta">產品 ${Number(images.remoteProductCount || 0)} · Logo ${Number(images.remoteStoreCount || 0)}${Number(images.missingRemoteCount || 0) ? ` · 缺檔 ${Number(images.missingRemoteCount || 0)}` : ""}</span>
          </div>
        </div>
      `;
    }

    function renderCloudRecovery() {

    function openCloudRecovery() {
      renderCloudRecovery();
      refreshCloudRecoveryStatus({ silent: true });
    }

    async function refreshCloudRecoveryStatus(options = {}) {
      if (cloudRecoveryBusy() && options.allowBusy !== true) return;
      if (!options.silent) setCloudRecoveryBusy("checking", "正在檢查 Cloud 及圖片數量。 ");

      try {
        await cloudSyncService.refresh();
        await cloudImageService.inspectCloud();
        state.cloudRecovery = {
          ...state.cloudRecovery,
          busy: false,
          action: "",
          message: "",
          lastCheckedAt: new Date().toISOString(),
          lastError: null
        };
        if (!options.silent) showToast("復原資料狀態已更新。");
      } catch (error) {
        state.cloudRecovery = {
          ...state.cloudRecovery,
          busy: false,
          action: "",
          message: "",
          lastError: {
            code: error?.code || "cloud-recovery/check-failed",
            message: error?.message || "未能檢查復原資料狀態。"
          }
        };
      }

      if (state.currentViewKey === "settings:cloud-recovery") {
        renderCloudRecovery();
      }
    }

    async function confirmCloudRecoveryTwice({
      firstTitle,
      firstMessage,
      firstLabel,
      finalTitle,
      finalMessage,
      finalLabel
    }) {
      const first = await showNativeConfirm({
        title: firstTitle,
        message: firstMessage,
        confirmLabel: firstLabel
      });
      if (!first) return false;

      return showNativeConfirm({
        title: finalTitle,
        message: finalMessage,
        confirmLabel: finalLabel
      });
    }

    function setCloudRecoveryError(error, fallback) {
      const code = error?.code || "cloud-recovery/failed";
      const isMissingObject = [
        "storage/object-not-found",
        "storage/object_not_found"
      ].includes(String(code));
      state.cloudRecovery = {
        ...state.cloudRecovery,
        busy: false,
        action: "",
        message: "",
        lastError: {
          code,
          message: isMissingObject
            ? "Cloud Storage 找不到已引用圖片。系統已停止重試，請使用本頁的失效圖片引用修復功能。"
            : error?.message || fallback
        }
      };
      if (state.currentViewKey === "settings:cloud-recovery") {
        renderCloudRecovery();
      }
    }

    let cloudRecoveryInteractionLocked = false;

    async function runCloudRecoveryInteraction(task) {
      if (cloudRecoveryBusy() || cloudRecoveryInteractionLocked) return;
      cloudRecoveryInteractionLocked = true;
      try {
        return await task();
      } finally {
        cloudRecoveryInteractionLocked = false;
      }
    }

    async function replaceCloudFromThisDevice() {
      return runCloudRecoveryInteraction(async () => {
        await refreshCloudRecoveryStatus({ silent: true });

        const local = state.cloudSync.localCounts || {};
        const cloud = state.cloudSync.cloudCounts || {};
        const localText = cloudRecoveryTextTotal(local);
        const cloudText = cloudRecoveryTextTotal(cloud);
        const localImages = Number(state.cloudImages.referencedCount || 0);
        const cloudImages = Number(state.cloudImages.remoteCount || 0);
        const missing = Number(state.cloudImages.missingLocalCount || 0);

        if (missing) {
          showToast(`此裝置缺少 ${missing} 張圖片，未能用作完整主版本。`);
          return;
        }

        const ok = await confirmCloudRecoveryTwice({
          firstTitle: "以此裝置取代 Cloud？",
          firstMessage: `本機 ${localText} 項文字資料及 ${localImages} 張圖片，會完整取代 Cloud 現有 ${cloudText} 項文字資料及 ${cloudImages} 張圖片。不會 merge。`,
          firstLabel: "繼續",
          finalTitle: "最後確認",
          finalMessage: "Cloud 現有資料會被刪除並由此裝置重建。其他裝置之後會收到新主版本。確定執行？",
          finalLabel: "取代 Cloud"
        });
        if (!ok) return;

        setCloudRecoveryBusy("replace-cloud", "正在上載完整圖片及重建 Cloud 主資料。 ");
        let suspended = false;
        try {
          await cloudImageService.suspend("replace-cloud");
          suspended = true;
          await cloudImageService.uploadAllFromLocal({ prune: false });
          await cloudSyncService.initializeFromLocal();
          await cloudImageService.pruneCloudToLocal();
          await cloudImageService.resume({ rescan: true, source: "local" });
          suspended = false;
          await refreshCloudRecoveryStatus({ silent: true, allowBusy: true });
          state.cloudRecovery.busy = false;
          showToast("Cloud 已由此裝置完整重建。");
          renderCloudRecovery();
        } catch (error) {
          if (suspended) {
            await cloudImageService.resume({ rescan: true, source: "local" }).catch(() => {});
          }
          setCloudRecoveryError(error, "未能以此裝置完整取代 Cloud。");
        }
      });
    }

    async function resetThisDeviceFromCloud() {
      return runCloudRecoveryInteraction(async () => {
        await refreshCloudRecoveryStatus({ silent: true });

        const missingRemote = Number(state.cloudImages.missingRemoteCount || 0);
        if (missingRemote) {
          showToast(`Cloud 缺少 ${missingRemote} 張圖片，已暫停重設以保護本機快取。`);
          return;
        }

        const localText = cloudRecoveryTextTotal(state.cloudSync.localCounts);
        const cloudText = cloudRecoveryTextTotal(state.cloudSync.cloudCounts);
        const cloudImages = Number(state.cloudImages.remoteCount || 0);

        const ok = await confirmCloudRecoveryTwice({
          firstTitle: "由 Cloud 重設此裝置？",
          firstMessage: `本機現有 ${localText} 項文字資料會先保存安全備份，再由 Cloud 的 ${cloudText} 項文字資料完整取代；圖片快取會安全重新下載約 ${cloudImages} 張圖片。`,
          firstLabel: "繼續",
          finalTitle: "最後確認",
          finalMessage: "本機未同步的文字變更及本機獨有圖片可能會消失。Cloud 會保持不變。確定重設此裝置？",
          finalLabel: "重設此裝置"
        });
        if (!ok) return;

        setCloudRecoveryBusy("reset-device", "正在由 Cloud 重新建立此裝置資料及圖片快取。 ");
        let suspended = false;
        try {
          await cloudImageService.suspend("reset-device");
          suspended = true;
          await cloudSyncService.initializeFromCloud();
          revokeAllLogoObjectUrls();
          await cloudImageService.rebuildLocalFromCloud();
          await cloudImageService.resume({ rescan: true, source: "cloud" });
          suspended = false;
          await refreshCloudRecoveryStatus({ silent: true, allowBusy: true });
          state.cloudRecovery.busy = false;
          showToast("此裝置已由 Cloud 完整重設。");
          renderCloudRecovery();
        } catch (error) {
          if (suspended) {
            await cloudImageService.resume({ rescan: true, source: "cloud" }).catch(() => {});
          }
          setCloudRecoveryError(error, "未能由 Cloud 完整重設此裝置。");
        }
      });
    }

    async function rebuildLocalImageCache() {
      return runCloudRecoveryInteraction(async () => {
        await refreshCloudRecoveryStatus({ silent: true });

        const missingRemote = Number(state.cloudImages.missingRemoteCount || 0);
        if (missingRemote) {

          revokeAllLogoObjectUrls();

    async function repairBrokenImageReferences() {
      return runCloudRecoveryInteraction(async () => {
        await refreshCloudRecoveryStatus({ silent: true });
        const broken = cloudImageService.getMissingRemoteReferences({
          onlyBroken: true
        });
        if (!broken.length) {
          showToast("目前冇需要修復的失效圖片引用。");
          return;
        }

        const ok = await confirmCloudRecoveryTwice({
          firstTitle: "移除失效圖片引用？",
          firstMessage: `有 ${broken.length} 個產品圖片或店舖 Logo 引用，但圖片檔在 Cloud 同本機都已不存在。產品、價格及店舖資料會保留，只會清除失效圖片欄位。`,
          firstLabel: "繼續",
          finalTitle: "最後確認",
          finalMessage: "圖片檔本身已無法下載。清除引用後，其他裝置亦會停止尋找呢啲不存在的圖片。",
          finalLabel: "修復引用"
        });
        if (!ok) return;

        setCloudRecoveryBusy("repair-image-references", "正在修復失效圖片引用。 ");
        try {
          dataService.createSafetyBackup(state.data, {
            reason: "before-repair-broken-image-references",
            createdAt: new Date().toISOString()
          });

          removeMissingImageReferencesFromData(broken);

          saveData({ source: "local" });
          await cloudSyncService.forceSync();
          await cloudImageService.syncReferences(state.data, { source: "local" });
          await cloudImageService.inspectCloud();
          await refreshCloudRecoveryStatus({ silent: true, allowBusy: true });
          state.cloudRecovery.busy = false;
          showToast(`已修復 ${broken.length} 個失效圖片引用；其他資料冇改。`);
          renderCloudRecovery();
        } catch (error) {
          setCloudRecoveryError(error, "未能修復失效圖片引用。");
        }
      });
    }

    async function clearCloudAndRestart() {
      return runCloudRecoveryInteraction(async () => {
        await refreshCloudRecoveryStatus({ silent: true });

        const cloudText = cloudRecoveryTextTotal(state.cloudSync.cloudCounts);
        const cloudImages = Number(state.cloudImages.remoteCount || 0);
        const ok = await confirmCloudRecoveryTwice({
          firstTitle: "清空全部 Cloud 資料？",
          firstMessage: `將永久刪除 Cloud 的 ${cloudText} 項文字資料及 ${cloudImages} 張圖片。本機資料及本機圖片快取會保留，不會 merge 或自動重新上載。`,
          firstLabel: "繼續",
          finalTitle: "最後確認：清空 Cloud",
          finalMessage: "其他裝置將失去 Cloud 主資料。完成後需重新選擇『以上載本機資料建立 Cloud』。確定永久清空？",
          finalLabel: "永久清空 Cloud"
        });
        if (!ok) return;

        setCloudRecoveryBusy("clear-cloud", "正在清空 Cloud 文字資料及圖片。 ");
        let suspended = false;
        let imageError = null;
        try {
          await cloudImageService.suspend("clear-cloud");
          suspended = true;
          await cloudSyncService.clearCloud({ deferStatus: true });
          try {
            await cloudImageService.clearCloud();
          } catch (error) {
            imageError = error;
          }
          cloudSyncService.finalizeClearCloud(imageError);
          await cloudImageService.resume({ rescan: false });
          suspended = false;
          state.cloudRecovery = {
            ...state.cloudRecovery,
            busy: false,
            action: "",
            message: "",
            lastCheckedAt: new Date().toISOString(),
            lastError: imageError ? {
              code: imageError.code || "cloud-recovery/image-clear-incomplete",
              message: imageError.message || "Cloud 文字資料已清空，但部分舊圖片可能仍留在 Storage。"
            } : null
          };
          showToast(imageError ? "Cloud 文字資料已清空；部分圖片清理未完成。" : "Cloud 已清空，本機資料同圖片快取仍然保留。 ");
          renderCloudSettings();
        } catch (error) {
          if (suspended) {
            await cloudImageService.resume({ rescan: false }).catch(() => {});
          }
          setCloudRecoveryError(error, "未能清空 Cloud。");
        }
      });
    }
