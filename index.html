<!doctype html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6478">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="格價記錄">
  <title>條碼格價記錄</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <script>
    window.ZXingBrowserLoadError = "";
    window.ZXingBrowserLoadPromise = new Promise((resolve) => {
      window.__resolveZXingBrowserLoad = resolve;
    });
    window.addEventListener("error", (event) => {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return;
      window.ZXingBrowserLoadError = event?.message || "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
      window.__resolveZXingBrowserLoad?.(false);
      window.dispatchEvent(new Event("zxing-ready"));
    });
    window.addEventListener("unhandledrejection", (event) => {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return;
      const reason = event?.reason;
      window.ZXingBrowserLoadError = reason?.message || String(reason || "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。");
      window.__resolveZXingBrowserLoad?.(false);
      window.dispatchEvent(new Event("zxing-ready"));
    });
  </script>
  <script type="module">
    import { BrowserMultiFormatReader } from "https://esm.sh/@zxing/browser@0.1.5?bundle";
    window.ZXingBrowser = { BrowserMultiFormatReader };
    window.ZXingBrowserLoadError = "";
    window.__resolveZXingBrowserLoad?.(true);
    window.dispatchEvent(new Event("zxing-ready"));
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4f2;
      --surface: #ffffff;
      --surface-alt: #f3f8f7;
      --surface-sunken: #f3f8f7;
      --text: #0b2320;
      --muted: #78908c;
      --muted-strong: #3d504d;
      --muted-mid: #55706c;
      --line: #e0eae7;
      --line-strong: #c9dfdd;
      --primary: #0b6478;
      --primary-dark: #0a4f61;
      --primary-soft: #e3f1f3;
      --danger: #c0392b;
      --danger-soft: #fdeceb;
      --danger-line: #f6cfc9;
      --warning: #8a5a10;
      --warning-soft: #fdf3e2;
      --warning-mid: #b7791f;
      --success: #0f8a5f;
      --success-soft: #e8f7ef;
      --new: #4338ca;
      --new-soft: #eef2ff;
      --neutral: #64748b;
      --neutral-soft: #f1f4f5;
      --shadow-sm: 0 1px 2px rgba(11, 35, 32, 0.04);
      --shadow: 0 8px 20px rgba(11, 35, 32, 0.08);
      --shadow-lg: 0 16px 30px rgba(11, 100, 120, 0.28);
      --radius-sm: 12px;
      --radius: 14px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --tabbar-h: 74px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      width: 100%;
      background: var(--bg);
      overflow-x: hidden;
    }

    body {
      min-height: 100%;
      width: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
      line-height: 1.45;
      font-variant-numeric: tabular-nums;
      overflow-x: hidden;
    }

    .app-shell {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 16px calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px) + 24px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 -16px 8px;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .topbar-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      min-height: 36px;
      flex: 0 0 auto;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: var(--surface-alt);
      cursor: pointer;
    }

    .topbar-back[hidden] {
      display: none !important;
    }

    .topbar-back svg {
      display: block;
    }

    .brand {
      min-width: 0;
      flex: 1;
    }

    .brand-title {
      margin: 0;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.01em;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-subtitle {
      display: none;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-weight: 800;
      font-size: 14.5px;
      transition: background-color 0.15s ease, transform 0.05s ease;
    }

    button,
    input,
    select,
    textarea,
    summary,
    [role="button"] {
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.985);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    summary:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      font-family: inherit;
      font-size: 14.5px;
      padding: 10px 12px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--muted-mid);
    }

    label > input,
    label > select,
    label > textarea {
      margin-top: 5px;
      font-weight: 400;
      color: var(--text);
    }

    @media (max-width: 600px) {
      input,
      select,
      textarea {
        font-size: 16px;
      }
    }

    .main-actions {
      display: grid;
      gap: 8px;
      margin: 4px 0 18px;
    }

    .main-actions-secondary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button-row,
    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .compact-actions button,
    .button-row button {
      flex: 1 1 auto;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      border-radius: var(--radius-lg);
      font-size: 16px;
      box-shadow: 0 10px 24px rgba(11, 100, 120, 0.3);
    }

    .btn-hero-icon {
      display: inline-flex;
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .btn-hero-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .btn-secondary {
      background: var(--primary-soft);
      color: var(--primary-dark);
      border: 1px solid var(--line-strong);
    }

    .btn-plain {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 700;
      font-size: 14px;
    }

    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid var(--danger-line);
      font-weight: 700;
    }

    .btn-sm {
      min-height: 36px;
      padding: 0 12px;
      font-size: 12.5px;
    }

    .section {
      margin: 18px 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 2px 10px;
    }

    .section-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--muted-strong);
    }

    .muted {
      color: var(--muted);
      font-size: 12.5px;
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .toolbar {
      position: sticky;
      top: calc(env(safe-area-inset-top, 0px) + 53px);
      z-index: 5;
      display: grid;
      gap: 8px;
      margin: 0 -16px 4px;
      padding: 6px 16px 12px;
      background: var(--bg);
    }

    .toolbar label {
      font-size: 0;
    }

    .toolbar label > input,
    .toolbar label > select {
      margin-top: 0;
    }

    .card-list {
      display: grid;
      gap: 8px;
    }

    .card {
      display: grid;
      gap: 8px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: 13px;
      text-align: left;
      color: inherit;
      font-weight: 400;
      box-shadow: var(--shadow-sm);
    }

    button.card {
      font-weight: 400;
    }

    button.card:active {
      background: var(--surface-alt);
    }

    .product-list {
      display: grid;
      gap: 8px;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: 12px;
      text-align: left;
      color: inherit;
      font-weight: 400;
      box-shadow: var(--shadow-sm);
    }

    .card-row:active {
      background: var(--surface-alt);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 14.5px;
      min-width: 0;
    }

    .card-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-variant {
      font-weight: 500;
      color: var(--muted);
      font-size: 0.92em;
    }

    .row-layout {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    .card-body {
      display: grid;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .card-side {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      flex: 0 0 auto;
    }

    .card-chevron {
      display: none;
    }

    .card-price-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 6px;
    }

    .card-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .stale-dot {
      display: none;
    }

    .stale-flag {
      font-size: 10.5px;
      color: var(--warning-mid);
      font-weight: 700;
      white-space: nowrap;
    }

    .stale-note {
      display: block;
      background: var(--warning-soft);
      color: var(--warning);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12.5px;
      font-weight: 700;
      margin: 0 0 14px;
    }

    .product-card-layout {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
    }

    .product-image {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--primary-dark);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
    }

    .product-image-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .product-image.has-loaded-image .product-image-fallback {
      display: none;
    }

    .product-image[data-action="view-product-image"] {
      cursor: zoom-in;
    }

    .product-image.card-thumb {
      width: 46px;
      height: 46px;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .product-image.latest-thumb {
      width: 46px;
      height: 46px;
      font-size: 12px;
      flex: 0 0 auto;
    }

    .product-image.detail {
      width: 92px;
      height: 92px;
      border-radius: 18px;
      font-size: 20px;
      flex: 0 0 auto;
    }

    .product-image.preview {
      width: 84px;
      height: 84px;
      border-radius: var(--radius-sm);
      font-size: 18px;
    }

    .product-image img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: var(--surface);
    }

    /* Keep the full product visible outside the product form. */
    .product-image.card-thumb img,
    .product-image.latest-thumb img,
    .product-image.detail img {
      object-fit: contain;
      padding: 4px;
    }

    /* Only the Add / Edit Product preview fills the whole square frame. */
    .product-image.preview img {
      object-fit: cover;
      padding: 0;
    }

    .product-image img[hidden] {
      display: none;
    }

    .product-image-upload {
      display: grid;
      grid-template-columns: 84px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 6px;
    }

    .product-image-preview-slot {
      width: 84px;
      height: 84px;
    }

    .product-image-upload-content {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .product-image-upload-title {
      margin: 0;
      color: var(--text);
      font-size: 12.5px;
      font-weight: 700;
      line-height: 1.35;
    }

    .product-image-upload-status {
      display: block;
      min-height: 17px;
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.35;
    }

    .product-image-upload-status.is-processing {
      color: var(--primary-dark);
      font-weight: 700;
    }

    .product-image-upload-status.is-error {
      color: var(--danger);
      font-weight: 700;
    }

    .product-image-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .product-image-picker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      margin: 0;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: var(--primary-soft);
      color: var(--primary-dark);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 800;
      touch-action: manipulation;
    }

    .product-image-picker[aria-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .product-image-remove[hidden] {
      display: none;
    }

    .product-image-auto-note {
      margin: 0;
      color: var(--muted);
      font-size: 11.5px;
    }

    .form-section.product-image-section {
      gap: 4px;
      margin-bottom: 16px;
    }

    .image-viewer {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: max(56px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.92);
      overscroll-behavior: contain;
      touch-action: pan-x pan-y pinch-zoom;
    }

    .image-viewer[hidden] {
      display: none;
    }

    .image-viewer-image {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: calc(100vh - 88px);
      max-height: calc(100dvh - 88px);
      object-fit: contain;
      touch-action: pan-x pan-y pinch-zoom;
      user-select: none;
      -webkit-user-drag: none;
    }

    .image-viewer-close {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: max(12px, env(safe-area-inset-right));
      z-index: 121;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 26px;
      line-height: 1;
    }

    body.image-viewer-open {
      position: fixed;
      width: 100%;
      overflow: hidden;
    }

    .pull-refresh-indicator {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      left: 50%;
      z-index: 70;
      min-height: 32px;
      padding: 7px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: var(--surface);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -44px);
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .pull-refresh-indicator.is-visible {
      opacity: 1;
    }

    .pull-refresh-indicator.is-settling {
      transform: translate(-50%, 8px) !important;
    }

    @media (prefers-reduced-motion: reduce) {
      .pull-refresh-indicator {
        transition: none;
      }
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 11px 13px;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 11.5px;
      margin-bottom: 3px;
    }

    .stat-value {
      display: block;
      font-weight: 800;
      font-size: 15px;
      color: var(--primary-dark);
      overflow-wrap: anywhere;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-new {
      background: var(--new-soft);
      color: var(--new);
    }

    .status-cheap {
      background: var(--success-soft);
      color: var(--success);
    }

    .status-normal {
      background: var(--neutral-soft);
      color: var(--neutral);
    }

    .status-expensive {
      background: var(--warning-soft);
      color: var(--warning-mid);
    }

    /* Product detail hero */
    .detail-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .detail-head-text {
      min-width: 0;
    }

    .detail-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.3;
    }

    .detail-subtitle {
      margin: 2px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .hero {
      border-radius: var(--radius-xl);
      padding: 18px;
      color: #fff;
      margin-bottom: 14px;
    }

    .hero-new { background: linear-gradient(135deg, #4f46e5, #3730a3); }
    .hero-cheap { background: linear-gradient(135deg, #0f9d69, #0a6e49); }
    .hero-normal { background: linear-gradient(135deg, #5b6b74, #3f4a52); }
    .hero-expensive { background: linear-gradient(135deg, #c98a2b, #a16620); }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .hero-label {
      font-size: 12.5px;
      opacity: 0.85;
    }

    .hero-value {
      font-size: 26px;
      font-weight: 900;
      margin-top: 2px;
    }

    .hero-badge {
      font-size: 11.5px;
      font-weight: 800;
      padding: 4px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .hero-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.22);
      margin: 14px 0;
    }

    .hero-range {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.25);
      margin-bottom: 8px;
    }

    .hero-range-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.35);
    }

    .hero-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11.5px;
      opacity: 0.85;
      margin-bottom: 10px;
    }

    .hero-delta {
      font-size: 12.5px;
      opacity: 0.9;
    }

    .summary-line {
      margin: 0 0 16px;
      font-size: 13px;
      color: var(--muted-mid);
    }

    .screen-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.3;
    }

    .screen-lead {
      color: var(--muted);
      font-size: 13px;
      margin: 2px 0 14px;
    }

    .scanner-frame {
      position: relative;
      border-radius: var(--radius-xl);
      background: #0b1a22;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .scanner-frame video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .scanner-reticle {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scanner-corner {
      position: absolute;
      width: 24px;
      height: 24px;
    }

    .scanner-corner.tl {
      top: 22.5%;
      left: 15%;
      border-top: 3px solid #fff;
      border-left: 3px solid #fff;
      border-radius: 6px 0 0 0;
    }

    .scanner-corner.tr {
      top: 22.5%;
      right: 15%;
      border-top: 3px solid #fff;
      border-right: 3px solid #fff;
      border-radius: 0 6px 0 0;
    }

    .scanner-corner.bl {
      bottom: 22.5%;
      left: 15%;
      border-bottom: 3px solid #fff;
      border-left: 3px solid #fff;
      border-radius: 0 0 0 6px;
    }

    .scanner-corner.br {
      bottom: 22.5%;
      right: 15%;
      border-bottom: 3px solid #fff;
      border-right: 3px solid #fff;
      border-radius: 0 0 6px 0;
    }

    .scanner-hint {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 12.5px;
      text-align: center;
      pointer-events: none;
    }

    .manual-inline {
      display: flex;
      gap: 8px;
    }

    .manual-inline input {
      flex: 1;
      min-width: 0;
      min-height: 44px;
    }

    .btn-lookup {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      background: var(--text);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 14px;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--muted-strong);
      line-height: 1.8;
      margin: 0;
    }

    .danger-note {
      border-color: var(--danger-line);
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 700;
      line-height: 1.5;
    }

    .promo-fields {
      display: grid;
      gap: 12px;
    }

    .promo-fields.is-muted {
      opacity: 0.55;
    }

    .promo-help[hidden] {
      display: none;
    }

    .form-section {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form-section-title {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted-strong);
    }

    .store-choice-list {
      display: grid;
      gap: 6px;
    }

    .store-choice {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 52px;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 8px 12px;
      text-align: left;
      font-weight: 400;
    }

    .store-choice.is-selected {
      background: var(--primary-soft);
      border-color: var(--primary);
    }

    .store-choice[hidden] {
      display: none;
    }

    .store-choice-content {
      min-width: 0;
    }

    .store-meta {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
    }

    .calc-preview {
      border-radius: var(--radius-lg);
      background: var(--primary-soft);
      padding: 14px;
      margin-bottom: 18px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .preview-grid .helper {
      font-size: 11.5px;
      color: #3d6e6a;
    }

    .preview-value {
      display: block;
      font-size: 15px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-top: 2px;
    }

    .manual-store-entry[hidden],
    .currency-field[hidden] {
      display: none;
    }

    .store-inline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .store-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 9px;
      background: var(--surface-alt);
      color: var(--primary-dark);
      font-weight: 800;
      flex: 0 0 auto;
    }

    .store-logo.small {
      width: 22px;
      height: 22px;
      font-size: 9px;
    }

    .store-logo.large {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      font-size: 12.5px;
    }

    .store-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .store-logo img[hidden] {
      display: none;
    }

    .store-name {
      font-weight: 800;
      font-size: 13.5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .store-card {
      display: grid;
      gap: 8px;
    }

    .store-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .store-card-text {
      min-width: 0;
      flex: 1;
    }

    .store-card-text .store-name {
      display: block;
      font-size: 14.5px;
    }

    .store-card-usage {
      flex: 0 0 auto;
      font-size: 12px;
    }

    .logo-preview {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    /* Price history rows */
    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    .history-meta {
      min-width: 0;
    }

    .history-date {
      display: block;
      font-weight: 800;
      font-size: 13.5px;
    }

    .history-store-line {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
      font-size: 12.5px;
      color: var(--muted);
      min-width: 0;
    }

    .deal-tag {
      font-size: 12.5px;
      color: var(--muted);
      white-space: nowrap;
    }

    .history-price {
      text-align: right;
      flex: 0 0 auto;
    }

    .history-unit-price-line {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
    }

    .history-unit-price {
      font-weight: 800;
      font-size: 14px;
      color: var(--primary-dark);
      white-space: nowrap;
    }

    .history-original {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
    }

    .price-tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 800;
      white-space: nowrap;
    }

    .price-tag-cheap {
      background: var(--success-soft);
      color: var(--success);
    }

    .price-tag-expensive {
      background: var(--warning-soft);
      color: var(--warning-mid);
    }

    /* Category groups */
    .category-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 10px;
    }

    .category-group {
      margin-bottom: 16px;
    }

    .category-group .card-list,
    .category-group .product-list {
      margin-top: 8px;
    }

    .category-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      list-style: none;
      cursor: pointer;
      min-height: 30px;
      padding: 0 2px 8px;
    }

    .category-summary::-webkit-details-marker {
      display: none;
    }

    .category-name {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stats-highlight .stat {
      background: var(--primary-soft);
      border-color: var(--line-strong);
    }

    .stats-highlight .stat-value {
      font-size: 16px;
    }

    .more-stats {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px 14px;
      margin: 0 0 18px;
    }

    .more-stats-summary {
      list-style: none;
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 800;
      color: var(--primary-dark);
    }

    .more-stats-summary::-webkit-details-marker {
      display: none;
    }

    .more-stats .notice {
      border: 0;
      padding: 10px 0 0;
      background: transparent;
    }

    .more-stats .stats-grid {
      margin-top: 10px;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* Bottom tab bar */
    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      display: flex;
      justify-content: space-around;
      align-items: center;
      max-width: 560px;
      margin: 0 auto;
      padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 12px);
      background: var(--surface);
      border-top: 1px solid var(--line);
    }

    .tabbar button {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      min-height: 44px;
      padding: 4px 10px;
      background: none;
      border: 0;
      color: #9fb3af;
    }

    .tabbar button.is-active {
      color: var(--primary);
    }

    .tabbar button span {
      font-size: 10.5px;
      font-weight: 700;
    }

    .tabbar svg {
      display: block;
    }

    .toast {
      position: fixed;
      left: 20px;
      right: 20px;
      bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px) + 16px);
      max-width: 520px;
      margin: 0 auto;
      background: var(--text);
      color: #fff;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 13.5px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 80;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .visually-hidden {
      position: absolute;
      width: 1px !important;
      height: 1px !important;
      min-width: 1px !important;
      min-height: 1px !important;
      margin: -1px !important;
      padding: 0 !important;
      border: 0 !important;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="topbar-back" type="button" data-action="go-back" aria-label="返回" hidden>
        <svg width="9" height="16" viewBox="0 0 9 16" fill="none" aria-hidden="true"><path d="M8 1L1 8l7 7" stroke="#0b6478" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="brand">
        <h1 class="brand-title" id="screenTitle">條碼格價記錄</h1>
      </div>
    </header>
    <main id="app" aria-live="polite"></main>
  </div>
  <nav class="tabbar" id="tabbar" aria-label="主要導覽">
    <button type="button" data-action="show-home" data-tab="home">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 11l8-7 8 7v8a1 1 0 01-1 1h-4v-6H9v6H5a1 1 0 01-1-1v-8z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      <span>首頁</span>
    </button>
    <button type="button" data-action="show-scanner" data-tab="scanner">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M6 8v8M9 8v8M11.5 8v8M14 8v8M16.5 8v8M19 8v8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      <span>掃描</span>
    </button>
    <button type="button" data-action="show-stores" data-tab="stores">
      <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 9l1.5-5h15L21 9M4 9v10a1 1 0 001 1h14a1 1 0 001-1V9M4 9h16M9 20v-6h6v6" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
      <span>店舖</span>
    </button>
  </nav>
  <div class="pull-refresh-indicator" id="pullRefreshIndicator" role="status" aria-live="polite">下拉重新整理</div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const STORAGE_KEY = "barcode-price-tracker-data-v1";
    const UNITS = ["ml", "L", "g", "kg", "pcs", "pack"];
    const SCANNER_DEBUG = new URLSearchParams(window.location.search).get("debug") === "1";
    const LOGO_DB_NAME = "barcode-price-tracker-logos";
    const LOGO_DB_VERSION = 1;
    const LOGO_STORE_NAME = "logos";
    const MAX_LOGO_BYTES = 1024 * 1024;
    const MAX_PRODUCT_IMAGE_BYTES = 1024 * 1024;
    const PRODUCT_IMAGE_LONG_EDGES = [1200, 1000, 800];
    const PRODUCT_IMAGE_WEBP_QUALITIES = [0.8, 0.76, 0.7, 0.65, 0.6];
    const PRODUCT_IMAGE_JPEG_QUALITIES = [0.82, 0.76, 0.7, 0.65, 0.6];
    let productImageWebpSupported;
    const LOGO_TYPES = ["image/png", "image/jpeg", "image/webp", "image/svg+xml"];
    const DEAL_TYPES = [
      ["normal", "普通價"],
      ["b1g1", "買一送一"],
      ["bundle", "套裝價"],
      ["second-half", "第二件半價"],
      ["percentage", "百分比折扣"],
      ["fixed", "固定金額折扣"],
      ["custom", "自訂優惠"]
    ];

    const state = {
      data: loadData(),
      currentSearch: "",
      sortBy: "updated",
      pendingImport: null,
      pendingLogoFile: null,
      pendingLogoPreviewUrl: "",
      pendingProductImageBlob: null,
      pendingProductImageName: "",
      pendingProductImagePreviewUrl: "",
      productImageProcessing: false,
      productImageProcessToken: 0,
      removeProductImageOnSave: false,
      showAllObservationStores: false,
      backHandler: null,
      pullToRefreshHandler: null,
      pullStartX: 0,
      pullStartY: 0,
      pullDistance: 0,
      pullTracking: false,
      pullGestureActive: false,
      pullRefreshing: false,
      imageViewerOpen: false,
      imageViewerScrollY: 0,
      imageViewerTrigger: null,
      logoObjectUrls: new Map(),
      scannerDiagnostics: {
        lastScannedBarcode: "",
        lastScannerErrorName: "",
        lastScannerErrorMessage: ""
      },
      scanner: null,
      scannerControls: null
    };

    const app = document.querySelector("#app");
    const toast = document.querySelector("#toast");
    const pullRefreshIndicator = document.querySelector("#pullRefreshIndicator");

    document.addEventListener("DOMContentLoaded", () => {
      renderHome();
      registerServiceWorker();
    });

    window.addEventListener("zxing-ready", () => {
      updateScannerDiagnostics();
    });

    window.addEventListener("beforeunload", () => {
      closeProductImageViewer();
      revokeAllLogoObjectUrls();
      revokePendingLogoPreview();
      revokePendingProductImagePreview();
    });

    document.addEventListener("touchstart", handlePullTouchStart, { passive: true });
    document.addEventListener("touchmove", handlePullTouchMove, { passive: false });
    document.addEventListener("touchend", handlePullTouchEnd, { passive: true });
    document.addEventListener("touchcancel", resetPullToRefresh, { passive: true });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && state.imageViewerOpen) {
        closeProductImageViewer();
        return;
      }
      const imageTrigger = event.target.closest?.('[data-action="view-product-image"]');
      if (imageTrigger && (event.key === "Enter" || event.key === " ")) {
        event.preventDefault();
        openProductImageViewer(imageTrigger);
      }
    });

    app.addEventListener("submit", (event) => {
      event.preventDefault();
      const form = event.target;
      const formType = form.dataset.form;

      if (formType === "manual-barcode") {
        const barcode = cleanBarcode(new FormData(form).get("barcode"));
        if (!barcode) {
          showToast("請輸入條碼。");
          return;
        }
        handleBarcode(barcode);
      }

      if (formType === "product") {
        saveProductForm(form);
      }

      if (formType === "observation") {
        saveObservationForm(form);
      }

      if (formType === "store") {
        saveStoreForm(form);
      }
    });

    app.addEventListener("input", (event) => {
      if (event.target.id === "search") {
        state.currentSearch = event.target.value;
        renderHomeLists();
      }
      if (event.target.id === "observationStoreSearch") {
        filterObservationStores(event.target.value);
      }
      if (event.target.name === "store") {
        handleManualStoreInput();
      }
      if (event.target.closest('[data-form="product"]') && (event.target.name === "brand" || event.target.name === "name")) {
        updateProductImagePreview();
      }
      if (event.target.closest('[data-form="observation"]')) {
        updateObservationPreview();
      }
    });

    app.addEventListener("change", (event) => {
      if (event.target.id === "sortBy") {
        state.sortBy = event.target.value;
        renderHomeLists();
      }
      if (event.target.name === "dealType") {
        updateDealFieldVisibility();
        updateObservationPreview();
      }
      if (event.target.name === "currency") {
        updateObservationCurrencyFields(event.target.value);
      }
      if (event.target.closest('[data-form="observation"]')) {
        updateObservationPreview();
      }
      if (event.target.name === "logoFile") {
        handleLogoFileChange(event.target);
      }
      if (event.target.name === "productImageFile") {
        void handleProductImageFileChange(event.target);
      }
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const action = button.dataset.action;
      const productId = button.dataset.productId;
      const observationId = button.dataset.observationId;
      const storeId = button.dataset.storeId;

      if (action === "view-product-image") {
        event.preventDefault();
        event.stopPropagation();
        openProductImageViewer(button);
        return;
      }

      if (action === "show-home") renderHome();
      if (action === "go-back") {
        if (typeof state.backHandler === "function") state.backHandler();
        else renderHome();
      }
      if (action === "show-stores") renderStoreManagement();
      if (action === "add-store") renderStoreForm();
      if (action === "edit-store") renderStoreForm(findStore(storeId));
      if (action === "delete-store") deleteStore(storeId);
      if (action === "remove-store-logo") removeStoreLogo(storeId);
      if (action === "select-observation-store") selectObservationStore(storeId);
      if (action === "show-manual-store") showManualStoreInput();
      if (action === "show-scanner") renderScanner();
      if (action === "show-manual") renderManualBarcode(button.dataset.barcode || "");
      if (action === "try-again") renderScanner();
      if (action === "open-product") renderProductDetail(productId);
      if (action === "add-product") renderProductForm({ barcode: button.dataset.barcode || "" });
      if (action === "add-product-no-barcode") renderProductForm({ barcode: "" });
      if (action === "edit-product") renderProductForm(findProduct(productId));
      if (action === "delete-product") deleteProduct(productId);
      if (action === "remove-product-image") removeProductImage(productId);
      if (action === "add-observation") renderObservationForm(productId);
      if (action === "edit-observation") renderObservationForm(productId, findObservation(observationId));
      if (action === "delete-observation") deleteObservation(productId, observationId);
      if (action === "export-json") exportBackup();
      if (action === "copy-json") copyBackup();
      if (action === "import-json") importBackup();
      if (action === "confirm-import-json") confirmImportBackup();
      if (action === "cancel-import-json") cancelImportBackup();
      if (action === "expand-all-groups") toggleAllGroups(button.dataset.scope, true);
      if (action === "collapse-all-groups") toggleAllGroups(button.dataset.scope, false);
      if (action === "toggle-all-observation-stores") toggleAllObservationStores();
    });

    function toggleAllGroups(scopeId, open) {
      const container = document.querySelector(`#${scopeId}-groups`);
      if (!container) return;
      container.querySelectorAll("details.category-group").forEach((details) => {
        details.open = open;
      });
    }

    function loadData() {
      const empty = { products: [], observations: [], stores: [] };
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return empty;
        const parsed = JSON.parse(raw);
        return {
          products: Array.isArray(parsed.products) ? parsed.products.map(normalizeProductRecord) : [],
          observations: Array.isArray(parsed.observations) ? parsed.observations : [],
          stores: Array.isArray(parsed.stores) ? parsed.stores : []
        };
      } catch (error) {
        return empty;
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function cleanBarcode(value) {
      return String(value || "").replace(/\s+/g, "").trim();
    }

    function normalizeProductRecord(product) {
      return { ...(product || {}), barcode: cleanBarcode(product?.barcode) };
    }

    function money(value) {
      if (!Number.isFinite(value)) return "未有資料";
      return `HKD ${value.toFixed(2)}`;
    }

    function moneyWithCurrency(value, currency = "HKD") {
      if (!Number.isFinite(value)) return "未有資料";
      return `${currency || "HKD"} ${value.toFixed(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "未有日期";
      return value;
    }

    function daysSince(dateStr) {
      if (!dateStr) return null;
      const then = new Date(`${dateStr}T00:00:00`);
      if (Number.isNaN(then.getTime())) return null;
      const diff = Date.now() - then.getTime();
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    const STALE_AFTER_DAYS = 60;

    function renderStalenessNote(dateStr) {
      const days = daysSince(dateStr);
      if (days === null || days < STALE_AFTER_DAYS) return "";
      const months = Math.max(1, Math.floor(days / 30));
      return `<div class="stale-note">呢個產品已經 ${months} 個月未更新價錢，可能已經唔同</div>`;
    }

    function productTitle(product) {
      return [product.brand, product.name].filter(Boolean).join(" ") || "未命名產品";
    }

    function setView(html, afterRender, chrome = {}) {
      stopScanner();
      closeProductImageViewer();
      if (app.querySelector('[data-form="product"]')) cancelProductImageProcessing();
      app.innerHTML = html;
      if (typeof afterRender === "function") afterRender();
      hydrateStoreLogos(app);
      hydrateProductImages(app);
      updateChrome(chrome);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function updateChrome({ title = "條碼格價記錄", back = null, tab = "", refresh = null } = {}) {
      const titleEl = document.querySelector("#screenTitle");
      if (titleEl) titleEl.textContent = title;

      const nextBackHandler = typeof back === "function" ? back : null;
      state.backHandler = nextBackHandler;
      const backEl = document.querySelector(".topbar-back");
      if (backEl) {
        backEl.hidden = nextBackHandler === null;
      }

      state.pullToRefreshHandler = typeof refresh === "function" ? refresh : null;
      if (!state.pullRefreshing) resetPullToRefresh();

      document.querySelectorAll(".tabbar button").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.tab === tab);
      });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function findProduct(productId) {
      return state.data.products.find((product) => product.id === productId) || null;
    }

    function findProductByBarcode(barcode) {
      const cleanValue = cleanBarcode(barcode);
      if (!cleanValue) return null;
      return state.data.products.find((product) => cleanBarcode(product.barcode) === cleanValue) || null;
    }

    function findObservation(observationId) {
      return state.data.observations.find((observation) => observation.id === observationId) || null;
    }

    function findStore(storeId) {
      return state.data.stores.find((store) => store.storeId === storeId) || null;
    }

    function normalizeStoreName(value) {
      return String(value || "").trim().replace(/\s+/g, " ").toLowerCase();
    }

    function storeDisplayName(store) {
      if (!store) return "";
      return String(store.displayName || store.storeName || "").trim();
    }

    function findStoreByName(name) {
      const normalized = normalizeStoreName(name);
      if (!normalized) return null;
      return state.data.stores.find((store) =>
        normalizeStoreName(store.displayName) === normalized ||
        normalizeStoreName(store.storeName) === normalized
      ) || null;
    }

    function getObservationStoreName(observation) {
      if (!observation) return "";
      const store = observation.storeId ? findStore(observation.storeId) : null;
      return String(storeDisplayName(store) || observation.storeNameSnapshot || observation.store || "").trim();
    }

    function getObservationStore(observation) {
      if (!observation) return null;
      if (observation.storeId) {
        const store = findStore(observation.storeId);
        if (store) return store;
      }
      return findStoreByName(observation.storeNameSnapshot || observation.store);
    }

    function getObservationCountryOrRegion(observation) {
      const store = getObservationStore(observation);
      return observation?.countryOrRegionSnapshot || store?.countryOrRegion || "Hong Kong";
    }

    function getObservationCurrency(observation) {
      const store = getObservationStore(observation);
      return observation?.currency || observation?.currencySnapshot || store?.defaultCurrency || "HKD";
    }

    function ensureStoreForObservation(name) {
      const cleanName = String(name || "").trim();
      if (!cleanName) return null;
      const existing = findStoreByName(cleanName);
      if (existing) return existing;

      const timestamp = nowIso();
      const store = {
        storeId: uid("store"),
        storeName: cleanName,
        displayName: cleanName,
        countryOrRegion: "Hong Kong",
        storeType: "Physical store",
        defaultCurrency: "HKD",
        logoKey: "",
        notes: "",
        createdAt: timestamp,
        updatedAt: timestamp
      };
      state.data.stores.push(store);
      return store;
    }

    function getProductObservations(productId) {
      return state.data.observations
        .filter((observation) => observation.productId === productId)
        .sort(sortObservationDesc);
    }

    function sortObservationDesc(a, b) {
      const dateDiff = String(b.date || "").localeCompare(String(a.date || ""));
      if (dateDiff !== 0) return dateDiff;
      return String(b.createdAt || "").localeCompare(String(a.createdAt || ""));
    }

    function storeInitials(name) {
      const text = String(name || "店").trim();
      if (!text) return "店";
      const letters = [...text.replace(/\s+/g, "")].slice(0, 2).join("");
      return letters.toUpperCase();
    }

    function productInitials(product) {
      const text = productTitle(product || {}).replace(/\s+/g, "");
      return [...(text || "產品")].slice(0, 2).join("").toUpperCase();
    }

    function renderProductImageShell(product, size = "card-thumb") {

    function renderStoreLogoShell(source, size = "small") {

      return `<span class="store-inline">${renderStoreLogoShell(source, size)}<span class="store-name">${escapeHtml(name)}</span></span>`;
    }

    function openLogoDb() {
      return new Promise((resolve, reject) => {
        if (!window.indexedDB) {
          reject(new Error("IndexedDB is not available"));
          return;
        }

        const request = window.indexedDB.open(LOGO_DB_NAME, LOGO_DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(LOGO_STORE_NAME)) {
            db.createObjectStore(LOGO_STORE_NAME, { keyPath: "logoKey" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("Cannot open logo database"));
      });
    }

    async function withLogoStore(mode, callback) {
      const db = await openLogoDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(LOGO_STORE_NAME, mode);
        const store = tx.objectStore(LOGO_STORE_NAME);
        let result;
        try {
          result = callback(store);
        } catch (error) {
          db.close();
          reject(error);
          return;
        }
        tx.oncomplete = () => {
          db.close();
          resolve(result);
        };
        tx.onerror = () => {
          db.close();
          reject(tx.error || new Error("Logo database error"));
        };
      });
    }

    function requestToPromise(request) {
      return new Promise((resolve, reject) => {
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("Logo request failed"));
      });
    }

    function saveImageBlob(imageKey, blob) {
      return withLogoStore("readwrite", (store) =>
        requestToPromise(store.put({ logoKey: imageKey, imageKey, blob, updatedAt: nowIso() }))
      );
    }

    async function getImageBlob(imageKey) {
      if (!imageKey) return null;
      const record = await withLogoStore("readonly", (store) => requestToPromise(store.get(imageKey)));
      return record?.blob || null;
    }

    function deleteImageBlob(imageKey) {
      if (!imageKey) return Promise.resolve();
      return withLogoStore("readwrite", (store) => requestToPromise(store.delete(imageKey)));
    }

    async function getImageObjectUrl(imageKey) {
      if (!imageKey) return "";
      if (state.logoObjectUrls.has(imageKey)) return state.logoObjectUrls.get(imageKey);
      const blob = await getImageBlob(imageKey);
      if (!blob) return "";
      const url = URL.createObjectURL(blob);
      state.logoObjectUrls.set(imageKey, url);
      return url;
    }

    function revokeImageObjectUrl(imageKey) {
      const url = state.logoObjectUrls.get(imageKey);
      if (url) URL.revokeObjectURL(url);
      state.logoObjectUrls.delete(imageKey);
    }

    function saveLogoBlob(logoKey, blob) {
      return saveImageBlob(logoKey, blob);
    }

    async function getLogoBlob(logoKey) {
      return getImageBlob(logoKey);
    }

    function deleteLogoBlob(logoKey) {
      return deleteImageBlob(logoKey);
    }

    async function getLogoObjectUrl(logoKey) {
      return getImageObjectUrl(logoKey);
    }

    function revokeLogoObjectUrl(logoKey) {
      revokeImageObjectUrl(logoKey);
    }

    function revokeAllLogoObjectUrls() {
      state.logoObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      state.logoObjectUrls.clear();
    }

    function revokePendingLogoPreview() {
      if (state.pendingLogoPreviewUrl) URL.revokeObjectURL(state.pendingLogoPreviewUrl);
      state.pendingLogoPreviewUrl = "";
      state.pendingLogoFile = null;
    }

    function revokePendingProductImagePreview() {
      if (state.pendingProductImagePreviewUrl) URL.revokeObjectURL(state.pendingProductImagePreviewUrl);
      state.pendingProductImagePreviewUrl = "";
      state.pendingProductImageBlob = null;
      state.pendingProductImageName = "";
    }

    function cancelProductImageProcessing() {
      state.productImageProcessToken += 1;
      state.productImageProcessing = false;
      revokePendingProductImagePreview();
    }

    async function hydrateStoreLogos(root = document) {
      const images = [...root.querySelectorAll("img[data-logo-key]")];
      for (const image of images) {
        if (image.dataset.logoHydrated === "1") continue;
        image.dataset.logoHydrated = "1";
        try {
          const url = await getLogoObjectUrl(image.dataset.logoKey);
          if (url) {
            image.src = url;
            image.hidden = false;
          }
        } catch (error) {
          image.hidden = true;
        }
      }
    }

    async function hydrateProductImages(root = document) {
      const images = [...root.querySelectorAll("img[data-image-key]")];
      for (const image of images) {
        if (image.dataset.imageHydrated === "1") continue;
        image.dataset.imageHydrated = "1";
        try {
          const url = await getImageObjectUrl(image.dataset.imageKey);
          if (url) {
            const showLoadedImage = () => image.closest(".product-image")?.classList.add("has-loaded-image");
            image.addEventListener("load", showLoadedImage, { once: true });
            image.src = url;
            image.hidden = false;
            if (image.complete && image.naturalWidth > 0) showLoadedImage();
          }
        } catch (error) {
          image.hidden = true;
        }
      }
    }

    function openProductImageViewer(trigger) {
      const sourceImage = trigger?.querySelector?.("img");
      const sourceUrl = sourceImage?.currentSrc || sourceImage?.src || "";
      if (!sourceUrl || sourceImage.hidden || !trigger.classList.contains("has-loaded-image")) return;

      closeProductImageViewer();
      const viewer = document.createElement("div");
      viewer.className = "image-viewer";
      viewer.setAttribute("role", "dialog");
      viewer.setAttribute("aria-modal", "true");
      viewer.setAttribute("aria-label", "產品圖片");
      viewer.innerHTML = `
        <button class="image-viewer-close" type="button" aria-label="關閉圖片">×</button>
        <img class="image-viewer-image" src="${escapeHtml(sourceUrl)}" alt="產品圖片" draggable="false">
      `;

      viewer.addEventListener("click", (event) => {
        if (event.target === viewer || event.target.closest(".image-viewer-close")) closeProductImageViewer();
      });
      viewer.querySelector(".image-viewer-image")?.addEventListener("click", (event) => event.stopPropagation());

      state.imageViewerScrollY = window.scrollY;
      state.imageViewerTrigger = trigger;
      state.imageViewerOpen = true;
      document.body.appendChild(viewer);
      document.body.style.top = `-${state.imageViewerScrollY}px`;
      document.body.classList.add("image-viewer-open");
      viewer.querySelector(".image-viewer-close")?.focus();
    }

    function closeProductImageViewer() {
      const viewer = document.querySelector(".image-viewer");
      if (!viewer && !state.imageViewerOpen) return;
      viewer?.remove();
      document.body.classList.remove("image-viewer-open");
      document.body.style.top = "";
      const restoreY = state.imageViewerScrollY || 0;
      const trigger = state.imageViewerTrigger;
      state.imageViewerOpen = false;
      state.imageViewerScrollY = 0;
      state.imageViewerTrigger = null;
      window.scrollTo(0, restoreY);
      if (trigger?.isConnected) trigger.focus?.();
    }

    function handlePullTouchStart(event) {
      resetPullToRefresh();
      if (
        !state.pullToRefreshHandler ||
        state.pullRefreshing ||
        state.imageViewerOpen ||
        hasUnsavedRefreshInput() ||
        window.scrollY > 0 ||
        event.touches.length !== 1 ||
        event.target.closest?.("input, textarea, select, a, .topbar, .tabbar, [data-action='view-product-image']")
      ) return;

      const touch = event.touches[0];
      state.pullStartX = touch.clientX;
      state.pullStartY = touch.clientY;
      state.pullDistance = 0;
      state.pullTracking = true;
      state.pullGestureActive = false;
    }

    function hasUnsavedRefreshInput() {
      const backupText = document.querySelector("#backupJson")?.value.trim() || "";
      return Boolean(document.querySelector("[data-form]") || backupText || state.pendingImport);
    }

    function handlePullTouchMove(event) {
      if (!state.pullTracking || state.pullRefreshing || event.touches.length !== 1) return;
      if (window.scrollY > 0) {
        resetPullToRefresh();
        return;
      }

      const touch = event.touches[0];
      const deltaX = touch.clientX - state.pullStartX;
      const deltaY = touch.clientY - state.pullStartY;
      if (deltaY <= 0 || Math.abs(deltaX) > Math.abs(deltaY)) {
        if (Math.abs(deltaX) > 10 || deltaY < -4) resetPullToRefresh();
        return;
      }
      if (deltaY < 10) return;

      state.pullGestureActive = true;
      state.pullDistance = Math.min(110, deltaY);
      event.preventDefault();
      updatePullRefreshIndicator(
        state.pullDistance >= 70 ? "放開重新整理" : "下拉重新整理",
        state.pullDistance
      );
    }

    function handlePullTouchEnd() {
      if (!state.pullTracking) return;
      const shouldRefresh = state.pullGestureActive && state.pullDistance >= 70;
      state.pullTracking = false;
      if (shouldRefresh) {
        void performPullToRefresh();
      } else {
        resetPullToRefresh();
      }
    }

    function updatePullRefreshIndicator(message, distance = 0) {
      if (!pullRefreshIndicator) return;
      pullRefreshIndicator.textContent = message;
      pullRefreshIndicator.classList.add("is-visible");
      pullRefreshIndicator.classList.toggle("is-settling", state.pullRefreshing);
      if (!state.pullRefreshing) {
        const offset = Math.min(8, -42 + distance * 0.72);
        pullRefreshIndicator.style.transform = `translate(-50%, ${offset}px)`;
      } else {
        pullRefreshIndicator.style.transform = "";
      }
    }

    async function performPullToRefresh() {
      if (state.pullRefreshing || !state.pullToRefreshHandler || state.imageViewerOpen) return;
      const refreshHandler = state.pullToRefreshHandler;
      state.pullRefreshing = true;
      updatePullRefreshIndicator("正在更新…", 70);

      try {
        state.data = loadData();
        await Promise.resolve(refreshHandler());
        updatePullRefreshIndicator("已更新", 70);
        window.setTimeout(() => {
          state.pullRefreshing = false;
          resetPullToRefresh();
        }, 700);
      } catch (error) {
        updatePullRefreshIndicator("重新整理失敗，請再試一次", 70);
        window.setTimeout(() => {
          state.pullRefreshing = false;
          resetPullToRefresh();
        }, 1200);
      }
    }

    function resetPullToRefresh() {
      if (state.pullRefreshing) return;
      state.pullTracking = false;
      state.pullGestureActive = false;
      state.pullDistance = 0;
      if (!pullRefreshIndicator) return;
      pullRefreshIndicator.classList.remove("is-visible", "is-settling");
      pullRefreshIndicator.style.transform = "";
      pullRefreshIndicator.textContent = "下拉重新整理";
    }

    function getVisibleProducts() {
      const query = state.currentSearch.trim().toLowerCase();
      const products = state.data.products.filter((product) => productMatchesQuery(product, query));

      products.sort((a, b) => {
        const statsA = getStats(a.id);
        const statsB = getStats(b.id);
        if (state.sortBy === "name") return productTitle(a).localeCompare(productTitle(b), "zh-Hant");
        if (state.sortBy === "latestDate") return String(statsB.latest?.date || "").localeCompare(String(statsA.latest?.date || ""));
        if (state.sortBy === "lowestUnit") return comparableSortValue(statsA.lowest) - comparableSortValue(statsB.lowest);
        return String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
      });

      return products;
    }

    function comparableSortValue(value) {
      return Number.isFinite(value) ? value : Number.POSITIVE_INFINITY;
    }

    function productMatchesQuery(product, query) {
      if (!query) return true;
      const observations = getProductObservations(product.id);
      const haystack = [
        product.barcode,
        product.name,
        product.brand,
        product.variant,
        product.category,
        ...observations.map((observation) => getObservationStoreName(observation))
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function trueFalse(value) {
      return value ? "true" : "false";
    }

    function updateScannerDiagnostics() {
      const currentUrl = document.querySelector("#diagCurrentUrl");
      const secureContext = document.querySelector("#diagSecureContext");
      const mediaDevices = document.querySelector("#diagMediaDevices");
      const getUserMedia = document.querySelector("#diagGetUserMedia");
      const zxing = document.querySelector("#diagZxing");
      const reader = document.querySelector("#diagBrowserMultiFormatReader");
      const userAgent = document.querySelector("#diagUserAgent");
      const libraryError = document.querySelector("#diagLibraryError");
      const lastErrorName = document.querySelector("#diagLastErrorName");
      const lastErrorMessage = document.querySelector("#diagLastErrorMessage");

      if (currentUrl) currentUrl.textContent = window.location.href;
      if (secureContext) secureContext.textContent = trueFalse(Boolean(window.isSecureContext));
      if (mediaDevices) mediaDevices.textContent = trueFalse(Boolean(navigator.mediaDevices));
      if (getUserMedia) getUserMedia.textContent = trueFalse(Boolean(navigator.mediaDevices?.getUserMedia));
      if (zxing) zxing.textContent = trueFalse(Boolean(window.ZXingBrowser));
      if (reader) reader.textContent = trueFalse(Boolean(window.ZXingBrowser?.BrowserMultiFormatReader));
      if (userAgent) userAgent.textContent = navigator.userAgent || "-";
      if (libraryError) libraryError.textContent = window.ZXingBrowserLoadError || "-";
      if (lastErrorName) lastErrorName.textContent = state.scannerDiagnostics.lastScannerErrorName || "-";
      if (lastErrorMessage) lastErrorMessage.textContent = state.scannerDiagnostics.lastScannerErrorMessage || "-";
    }

    function setScannerError(errorOrName, fallbackMessage = "") {
      if (!errorOrName) {
        state.scannerDiagnostics.lastScannerErrorName = "";
        state.scannerDiagnostics.lastScannerErrorMessage = "";
        updateScannerDiagnostics();
        return;
      }

      if (typeof errorOrName === "string") {
        state.scannerDiagnostics.lastScannerErrorName = "ScannerError";
        state.scannerDiagnostics.lastScannerErrorMessage = errorOrName;
        updateScannerDiagnostics();
        return;
      }

      state.scannerDiagnostics.lastScannerErrorName = errorOrName.name || "Error";
      state.scannerDiagnostics.lastScannerErrorMessage = errorOrName.message || fallbackMessage || String(errorOrName);
      updateScannerDiagnostics();
    }

    async function waitForZXingBrowser() {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return true;
      if (window.ZXingBrowserLoadPromise) {
        const loaded = await Promise.race([
          window.ZXingBrowserLoadPromise,
          new Promise((resolve) => window.setTimeout(() => resolve(false), 5000))
        ]);
        if (!loaded && !window.ZXingBrowser?.BrowserMultiFormatReader && !window.ZXingBrowserLoadError) {
          window.ZXingBrowserLoadError = "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
        }
      }
      updateScannerDiagnostics();
      return Boolean(window.ZXingBrowser?.BrowserMultiFormatReader);
    }

    async function testCameraPermission() {
      const status = document.querySelector("#scannerStatus");
      updateScannerDiagnostics();

      if (!navigator.mediaDevices?.getUserMedia) {
        const message = "此瀏覽器不支援相機存取，請改用 Safari 或手動輸入條碼。";
        if (status) status.textContent = message;
        setScannerError({ name: "NotSupportedError", message });
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        stream.getTracks().forEach((track) => track.stop());
        if (status) status.textContent = "相機權限已允許";
        setScannerError("");
      } catch (error) {
        if (status) status.textContent = `${error?.name || "Error"}: ${error?.message || "相機權限測試失敗"}`;
        setScannerError(error, "相機權限測試失敗");
      }
    }

    async function startScanner() {
      const status = document.querySelector("#scannerStatus");
      const video = document.querySelector("#scannerVideo");
      if (!status || !video) return;

      updateScannerDiagnostics();

      if (!window.isSecureContext) {
        const message = "相機需要 HTTPS 網址。請用 GitHub Pages / Vercel / Netlify 測試，不能用普通 http 網址。";
        status.textContent = message;
        setScannerError(message);
        return;
      }

      if (!navigator.mediaDevices?.getUserMedia) {
        const message = "未能開啟相機，請使用手動輸入條碼。";
        status.textContent = message;
        setScannerError(message);
        return;
      }

      const zxingLoaded = await waitForZXingBrowser();
      if (!zxingLoaded) {
        const message = "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
        if (!window.ZXingBrowserLoadError) window.ZXingBrowserLoadError = message;
        status.textContent = message;
        setScannerError(message);
        return;
      }

      try {
        status.textContent = "正在尋找條碼...";
        setScannerError("");
        const reader = new ZXingBrowser.BrowserMultiFormatReader();
        const constraints = {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        const controls = await reader.decodeFromConstraints(constraints, video, (result) => {
          if (!result) return;
          const barcode = cleanBarcode(result.getText());
          if (!barcode) return;
          state.scannerDiagnostics.lastScannedBarcode = barcode;
          setScannerError("");
          status.textContent = `已掃描條碼: ${barcode}`;
          stopScanner();
          showToast(`已掃描: ${barcode}`);
          handleBarcode(barcode);
        });

        state.scanner = reader;
        state.scannerControls = controls;
        updateScannerDiagnostics();
      } catch (error) {
        status.textContent = "未能開啟相機，請使用手動輸入條碼。";
        setScannerError(error, "未能開啟相機或讀取條碼。");
      }
    }

    function stopScanner() {
      try {
        if (state.scannerControls?.stop) state.scannerControls.stop();
        if (state.scanner?.reset) state.scanner.reset();
      } catch (error) {
        // Best effort cleanup only.
      }
      state.scanner = null;
      state.scannerControls = null;

      const video = document.querySelector("#scannerVideo");
      const stream = video?.srcObject;
      if (stream?.getTracks) {
        stream.getTracks().forEach((track) => track.stop());
        video.srcObject = null;
      }
    }

    function updateDealFieldVisibility() {

      const visibleFields = {

        fixed: ["price", "fixed"],

      }[dealType] || [];

      document.querySelectorAll("[data-deal-field]").forEach((field) => {

        field.hidden = !visible;
        const input = field.querySelector("input");
