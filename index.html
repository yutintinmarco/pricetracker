<!doctype html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#176b87">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="格價記錄">
  <title>條碼格價記錄</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <script>
    window.ZXingBrowserLoadError = "";
    window.ZXingBrowserLoadPromise = new Promise((resolve) => {
      window.__resolveZXingBrowserLoad = resolve;
    });
    window.addEventListener("error", (event) => {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return;
      window.ZXingBrowserLoadError = event?.message || "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
      window.__resolveZXingBrowserLoad?.(false);
      window.dispatchEvent(new Event("zxing-ready"));
    });
    window.addEventListener("unhandledrejection", (event) => {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return;
      const reason = event?.reason;
      window.ZXingBrowserLoadError = reason?.message || String(reason || "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。");
      window.__resolveZXingBrowserLoad?.(false);
      window.dispatchEvent(new Event("zxing-ready"));
    });
  </script>
  <script type="module">
    import { BrowserMultiFormatReader } from "https://esm.sh/@zxing/browser@0.1.5?bundle";
    window.ZXingBrowser = { BrowserMultiFormatReader };
    window.ZXingBrowserLoadError = "";
    window.__resolveZXingBrowserLoad?.(true);
    window.dispatchEvent(new Event("zxing-ready"));
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8f7;
      --surface: #ffffff;
      --surface-alt: #eef5f3;
      --text: #1f2933;
      --muted: #667085;
      --line: #d8e0dd;
      --primary: #176b87;
      --primary-dark: #105066;
      --danger: #b42318;
      --warning: #9a5b00;
      --success: #087443;
      --shadow: 0 8px 20px rgba(31, 41, 51, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    .app-shell {
      width: min(100%, 860px);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(24px, env(safe-area-inset-bottom));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 0 12px;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand-title {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.15;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .main-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 4px 0 16px;
    }

    .button-row,
    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .compact-actions button,
    .button-row button {
      flex: 1 1 auto;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--surface-alt);
      color: var(--primary-dark);
      border: 1px solid #c8dbd7;
    }

    .btn-plain {
      background: transparent;
      color: var(--primary-dark);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: #fff1f0;
      color: var(--danger);
      border: 1px solid #ffd1cc;
    }

    .section {
      margin: 16px 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .section-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .muted {
      color: var(--muted);
    }

    .helper {
      color: var(--muted);
      font-size: 0.92rem;
      overflow-wrap: anywhere;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .card-list {
      display: grid;
      gap: 10px;
    }

    .card {
      display: grid;
      gap: 8px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
      text-align: left;
      color: inherit;
      box-shadow: 0 1px 0 rgba(31, 41, 51, 0.03);
    }

    button.card {
      font-weight: 400;
    }

    .card-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .card-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .meta-grid,
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px;
      min-height: 74px;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 4px;
    }

    .stat-value {
      display: block;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .status-new {
      background: #eef2ff;
      color: #3538cd;
    }

    .status-cheap {
      background: #ecfdf3;
      color: var(--success);
    }

    .status-normal {
      background: #f2f4f7;
      color: #344054;
    }

    .status-expensive {
      background: #fff4e5;
      color: var(--warning);
    }

    .screen-title {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }

    .screen-lead {
      margin: -4px 0 14px;
      color: var(--muted);
    }

    .scanner-frame {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0b1220;
      aspect-ratio: 4 / 3;
    }

    .scanner-frame video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-alt);
      padding: 10px 12px;
      color: var(--primary-dark);
    }

    .danger-note {
      background: #fff1f0;
      color: var(--danger);
      border-color: #ffd1cc;
    }

    .promo-fields {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-alt);
      padding: 10px;
    }

    .promo-fields.is-muted {
      opacity: 0.72;
    }

    .promo-field[hidden],
    .promo-help[hidden] {
      display: none;
    }

    .form-section {
      display: grid;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .form-section-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .store-choice-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .store-choice {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 56px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 8px;
      text-align: left;
    }

    .store-choice.is-selected {
      border-color: var(--primary);
      background: #edf7f5;
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .store-choice[hidden] {
      display: none;
    }

    .selected-store-box,
    .calc-preview {
      border: 1px solid #c8dbd7;
      border-radius: var(--radius);
      background: var(--surface-alt);
      padding: 10px;
    }

    .manual-store-entry[hidden] {
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .preview-value {
      display: block;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .store-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      vertical-align: middle;
    }

    .store-logo {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f2f4f7;
      color: var(--primary-dark);
      font-size: 0.76rem;
      font-weight: 800;
      line-height: 1;
    }

    .store-logo.small {
      width: 32px;
      height: 32px;
      font-size: 0.7rem;
    }

    .store-logo.large {
      width: 48px;
      height: 48px;
      font-size: 0.85rem;
    }

    .store-logo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #fff;
    }

    .store-logo img[hidden] {
      display: none;
    }

    .store-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .store-card {
      align-items: stretch;
    }

    .store-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .logo-preview {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
    }

    .history-item {
      display: grid;
      gap: 7px;
    }

    .history-main {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .history-main strong {
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.6);
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 10;
      display: none;
      width: min(520px, calc(100% - 28px));
      margin: 0 auto;
      border-radius: var(--radius);
      background: #101828;
      color: #fff;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .toast.show {
      display: block;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    @media (min-width: 640px) {
      .app-shell {
        padding-left: 22px;
        padding-right: 22px;
      }

      .main-actions {
        grid-template-columns: 1.4fr 1fr;
      }

      .toolbar,
      .two-col {
        grid-template-columns: 1fr 1fr;
      }

      .meta-grid,
      .stats-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1 class="brand-title">條碼格價記錄</h1>
        <span class="brand-subtitle">本機儲存</span>
      </div>
      <button class="btn-plain" type="button" data-action="show-home">首頁</button>
    </header>
    <main id="app" aria-live="polite"></main>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const STORAGE_KEY = "barcode-price-tracker-data-v1";
    const UNITS = ["ml", "L", "g", "kg", "pcs", "pack"];
    const SCANNER_DEBUG = new URLSearchParams(window.location.search).get("debug") === "1";
    const LOGO_DB_NAME = "barcode-price-tracker-logos";
    const LOGO_DB_VERSION = 1;
    const LOGO_STORE_NAME = "logos";
    const MAX_LOGO_BYTES = 1024 * 1024;
    const LOGO_TYPES = ["image/png", "image/jpeg", "image/webp", "image/svg+xml"];
    const DEAL_TYPES = [
      ["normal", "普通價"],
      ["b1g1", "買一送一"],
      ["bundle", "套裝價"],
      ["second-half", "第二件半價"],
      ["percentage", "百分比折扣"],
      ["fixed", "固定金額折扣"],
      ["custom", "自訂優惠"]
    ];

    const state = {
      data: loadData(),
      currentSearch: "",
      sortBy: "updated",
      pendingImport: null,
      pendingLogoFile: null,
      pendingLogoPreviewUrl: "",
      logoObjectUrls: new Map(),
      scannerDiagnostics: {
        lastScannedBarcode: "",
        lastScannerErrorName: "",
        lastScannerErrorMessage: ""
      },
      scanner: null,
      scannerControls: null
    };

    const app = document.querySelector("#app");
    const toast = document.querySelector("#toast");

    document.addEventListener("DOMContentLoaded", () => {
      renderHome();
      registerServiceWorker();
    });

    window.addEventListener("zxing-ready", () => {
      updateScannerDiagnostics();
    });

    window.addEventListener("beforeunload", () => {
      revokeAllLogoObjectUrls();
      revokePendingLogoPreview();
    });

    app.addEventListener("submit", (event) => {
      event.preventDefault();
      const form = event.target;
      const formType = form.dataset.form;

      if (formType === "manual-barcode") {
        const barcode = cleanBarcode(new FormData(form).get("barcode"));
        if (!barcode) {
          showToast("請輸入條碼。");
          return;
        }
        handleBarcode(barcode);
      }

      if (formType === "product") {
        saveProductForm(form);
      }

      if (formType === "observation") {
        saveObservationForm(form);
      }

      if (formType === "store") {
        saveStoreForm(form);
      }
    });

    app.addEventListener("input", (event) => {
      if (event.target.id === "search") {
        state.currentSearch = event.target.value;
        renderHomeLists();
      }
      if (event.target.id === "observationStoreSearch") {
        filterObservationStores(event.target.value);
      }
      if (event.target.name === "store") {
        handleManualStoreInput();
      }
      if (event.target.closest('[data-form="observation"]')) {
        updateObservationPreview();
      }
    });

    app.addEventListener("change", (event) => {
      if (event.target.id === "sortBy") {
        state.sortBy = event.target.value;
        renderHomeLists();
      }
      if (event.target.name === "dealType") {
        updateDealFieldVisibility();
        updateObservationPreview();
      }
      if (event.target.closest('[data-form="observation"]')) {
        updateObservationPreview();
      }
      if (event.target.name === "logoFile") {
        handleLogoFileChange(event.target);
      }
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;

      const action = button.dataset.action;
      const productId = button.dataset.productId;
      const observationId = button.dataset.observationId;
      const storeId = button.dataset.storeId;

      if (action === "show-home") renderHome();
      if (action === "show-stores") renderStoreManagement();
      if (action === "add-store") renderStoreForm();
      if (action === "edit-store") renderStoreForm(findStore(storeId));
      if (action === "delete-store") deleteStore(storeId);
      if (action === "remove-store-logo") removeStoreLogo(storeId);
      if (action === "select-observation-store") selectObservationStore(storeId);
      if (action === "show-manual-store") showManualStoreInput();
      if (action === "show-scanner") renderScanner();
      if (action === "show-manual") renderManualBarcode(button.dataset.barcode || "");
      if (action === "try-again") renderScanner();
      if (action === "open-product") renderProductDetail(productId);
      if (action === "add-product") renderProductForm({ barcode: button.dataset.barcode || "" });
      if (action === "edit-product") renderProductForm(findProduct(productId));
      if (action === "delete-product") deleteProduct(productId);
      if (action === "add-observation") renderObservationForm(productId);
      if (action === "edit-observation") renderObservationForm(productId, findObservation(observationId));
      if (action === "delete-observation") deleteObservation(productId, observationId);
      if (action === "export-json") exportBackup();
      if (action === "copy-json") copyBackup();
      if (action === "import-json") importBackup();
      if (action === "confirm-import-json") confirmImportBackup();
      if (action === "cancel-import-json") cancelImportBackup();
    });

    function loadData() {
      const empty = { products: [], observations: [], stores: [] };
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return empty;
        const parsed = JSON.parse(raw);
        return {
          products: Array.isArray(parsed.products) ? parsed.products : [],
          observations: Array.isArray(parsed.observations) ? parsed.observations : [],
          stores: Array.isArray(parsed.stores) ? parsed.stores : []
        };
      } catch (error) {
        return empty;
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function uid(prefix) {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function cleanBarcode(value) {
      return String(value || "").replace(/\s+/g, "").trim();
    }

    function money(value) {
      if (!Number.isFinite(value)) return "未有資料";
      return `HKD ${value.toFixed(2)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
      if (!value) return "未有日期";
      return value;
    }

    function productTitle(product) {
      return [product.brand, product.name].filter(Boolean).join(" ") || "未命名產品";
    }

    function setView(html, afterRender) {
      stopScanner();
      app.innerHTML = html;
      if (typeof afterRender === "function") afterRender();
      hydrateStoreLogos(app);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
    }

    function findProduct(productId) {
      return state.data.products.find((product) => product.id === productId) || null;
    }

    function findProductByBarcode(barcode) {
      return state.data.products.find((product) => product.barcode === barcode) || null;
    }

    function findObservation(observationId) {
      return state.data.observations.find((observation) => observation.id === observationId) || null;
    }

    function findStore(storeId) {
      return state.data.stores.find((store) => store.storeId === storeId) || null;
    }

    function normalizeStoreName(value) {
      return String(value || "").trim().replace(/\s+/g, " ").toLowerCase();
    }

    function storeDisplayName(store) {
      if (!store) return "";
      return String(store.displayName || store.storeName || "").trim();
    }

    function findStoreByName(name) {
      const normalized = normalizeStoreName(name);
      if (!normalized) return null;
      return state.data.stores.find((store) =>
        normalizeStoreName(store.displayName) === normalized ||
        normalizeStoreName(store.storeName) === normalized
      ) || null;
    }

    function getObservationStoreName(observation) {
      if (!observation) return "";
      const store = observation.storeId ? findStore(observation.storeId) : null;
      return String(observation.storeNameSnapshot || observation.store || storeDisplayName(store) || "").trim();
    }

    function getObservationStore(observation) {
      if (!observation) return null;
      if (observation.storeId) {
        const store = findStore(observation.storeId);
        if (store) return store;
      }
      return findStoreByName(observation.storeNameSnapshot || observation.store);
    }

    function ensureStoreForObservation(name) {
      const cleanName = String(name || "").trim();
      if (!cleanName) return null;
      const existing = findStoreByName(cleanName);
      if (existing) return existing;

      const timestamp = nowIso();
      const store = {
        storeId: uid("store"),
        storeName: cleanName,
        displayName: cleanName,
        countryOrRegion: "Hong Kong",
        storeType: "Physical store",
        defaultCurrency: "HKD",
        logoKey: "",
        notes: "",
        createdAt: timestamp,
        updatedAt: timestamp
      };
      state.data.stores.push(store);
      return store;
    }

    function getProductObservations(productId) {
      return state.data.observations
        .filter((observation) => observation.productId === productId)
        .sort(sortObservationDesc);
    }

    function sortObservationDesc(a, b) {

    }

    function storeInitials(name) {

    function openLogoDb() {
      return new Promise((resolve, reject) => {
        if (!window.indexedDB) {
          reject(new Error("IndexedDB is not available"));
          return;
        }

        const request = window.indexedDB.open(LOGO_DB_NAME, LOGO_DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(LOGO_STORE_NAME)) {
            db.createObjectStore(LOGO_STORE_NAME, { keyPath: "logoKey" });
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("Cannot open logo database"));
      });
    }

    async function withLogoStore(mode, callback) {
      const db = await openLogoDb();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(LOGO_STORE_NAME, mode);
        const store = tx.objectStore(LOGO_STORE_NAME);
        let result;
        try {
          result = callback(store);
        } catch (error) {
          db.close();
          reject(error);
          return;
        }
        tx.oncomplete = () => {
          db.close();
          resolve(result);
        };
        tx.onerror = () => {
          db.close();
          reject(tx.error || new Error("Logo database error"));
        };
      });
    }

    function requestToPromise(request) {
      return new Promise((resolve, reject) => {
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("Logo request failed"));
      });
    }

    function saveLogoBlob(logoKey, blob) {
      return withLogoStore("readwrite", (store) =>
        requestToPromise(store.put({ logoKey, blob, updatedAt: nowIso() }))
      );
    }

    async function getLogoBlob(logoKey) {
      if (!logoKey) return null;
      const record = await withLogoStore("readonly", (store) => requestToPromise(store.get(logoKey)));
      return record?.blob || null;
    }

    function deleteLogoBlob(logoKey) {
      if (!logoKey) return Promise.resolve();
      return withLogoStore("readwrite", (store) => requestToPromise(store.delete(logoKey)));
    }

    async function getLogoObjectUrl(logoKey) {
      if (!logoKey) return "";
      if (state.logoObjectUrls.has(logoKey)) return state.logoObjectUrls.get(logoKey);
      const blob = await getLogoBlob(logoKey);
      if (!blob) return "";
      const url = URL.createObjectURL(blob);
      state.logoObjectUrls.set(logoKey, url);
      return url;
    }

    function revokeLogoObjectUrl(logoKey) {
      const url = state.logoObjectUrls.get(logoKey);
      if (url) URL.revokeObjectURL(url);
      state.logoObjectUrls.delete(logoKey);
    }

    function revokeAllLogoObjectUrls() {
      state.logoObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      state.logoObjectUrls.clear();
    }

    function revokePendingLogoPreview() {
      if (state.pendingLogoPreviewUrl) URL.revokeObjectURL(state.pendingLogoPreviewUrl);
      state.pendingLogoPreviewUrl = "";
      state.pendingLogoFile = null;
    }

    async function hydrateStoreLogos(root = document) {
      const images = [...root.querySelectorAll("img[data-logo-key]")];
      for (const image of images) {

        image.dataset.logoHydrated = "1";
        try {
          const url = await getLogoObjectUrl(image.dataset.logoKey);
          if (url) {
            image.src = url;
            image.hidden = false;
          }
        } catch (error) {
          image.hidden = true;
        }
      }
    }

    function getVisibleProducts() {
      const query = state.currentSearch.trim().toLowerCase();
      const products = state.data.products.filter((product) => productMatchesQuery(product, query));

        const statsA = getStats(a.id);
        const statsB = getStats(b.id);
        if (state.sortBy === "name") return productTitle(a).localeCompare(productTitle(b), "zh-Hant");
        if (state.sortBy === "latestDate") return String(statsB.latest?.date || "").localeCompare(String(statsA.latest?.date || ""));
        if (state.sortBy === "lowestUnit") return comparableSortValue(statsA.lowest) - comparableSortValue(statsB.lowest);
        return String(b.updatedAt || "").localeCompare(String(a.updatedAt || ""));
      });

      return products;
    }

    function comparableSortValue(value) {
      return Number.isFinite(value) ? value : Number.POSITIVE_INFINITY;
    }

    function productMatchesQuery(product, query) {
      if (!query) return true;
      const observations = getProductObservations(product.id);
      const haystack = [
        product.barcode,

        product.variant,
        product.category,
        ...observations.map((observation) => getObservationStoreName(observation))
      ].join(" ").toLowerCase();
      return haystack.includes(query);
    }

    function trueFalse(value) {
      return value ? "true" : "false";
    }

    function updateScannerDiagnostics() {
      const currentUrl = document.querySelector("#diagCurrentUrl");
      const secureContext = document.querySelector("#diagSecureContext");
      const mediaDevices = document.querySelector("#diagMediaDevices");
      const getUserMedia = document.querySelector("#diagGetUserMedia");
      const zxing = document.querySelector("#diagZxing");
      const reader = document.querySelector("#diagBrowserMultiFormatReader");
      const userAgent = document.querySelector("#diagUserAgent");
      const libraryError = document.querySelector("#diagLibraryError");
      const lastErrorName = document.querySelector("#diagLastErrorName");
      const lastErrorMessage = document.querySelector("#diagLastErrorMessage");

      if (currentUrl) currentUrl.textContent = window.location.href;
      if (secureContext) secureContext.textContent = trueFalse(Boolean(window.isSecureContext));
      if (mediaDevices) mediaDevices.textContent = trueFalse(Boolean(navigator.mediaDevices));
      if (getUserMedia) getUserMedia.textContent = trueFalse(Boolean(navigator.mediaDevices?.getUserMedia));
      if (zxing) zxing.textContent = trueFalse(Boolean(window.ZXingBrowser));
      if (reader) reader.textContent = trueFalse(Boolean(window.ZXingBrowser?.BrowserMultiFormatReader));
      if (userAgent) userAgent.textContent = navigator.userAgent || "-";
      if (libraryError) libraryError.textContent = window.ZXingBrowserLoadError || "-";
      if (lastErrorName) lastErrorName.textContent = state.scannerDiagnostics.lastScannerErrorName || "-";
      if (lastErrorMessage) lastErrorMessage.textContent = state.scannerDiagnostics.lastScannerErrorMessage || "-";
    }

    function setScannerError(errorOrName, fallbackMessage = "") {
      if (!errorOrName) {
        state.scannerDiagnostics.lastScannerErrorName = "";
        state.scannerDiagnostics.lastScannerErrorMessage = "";
        updateScannerDiagnostics();
        return;
      }

      if (typeof errorOrName === "string") {
        state.scannerDiagnostics.lastScannerErrorName = "ScannerError";
        state.scannerDiagnostics.lastScannerErrorMessage = errorOrName;
        updateScannerDiagnostics();
        return;
      }

      state.scannerDiagnostics.lastScannerErrorName = errorOrName.name || "Error";
      state.scannerDiagnostics.lastScannerErrorMessage = errorOrName.message || fallbackMessage || String(errorOrName);
      updateScannerDiagnostics();
    }

    async function waitForZXingBrowser() {
      if (window.ZXingBrowser?.BrowserMultiFormatReader) return true;
      if (window.ZXingBrowserLoadPromise) {
        const loaded = await Promise.race([
          window.ZXingBrowserLoadPromise,
          new Promise((resolve) => window.setTimeout(() => resolve(false), 5000))
        ]);
        if (!loaded && !window.ZXingBrowser?.BrowserMultiFormatReader && !window.ZXingBrowserLoadError) {
          window.ZXingBrowserLoadError = "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
        }
      }
      updateScannerDiagnostics();
      return Boolean(window.ZXingBrowser?.BrowserMultiFormatReader);
    }

    async function testCameraPermission() {
      const status = document.querySelector("#scannerStatus");
      updateScannerDiagnostics();

      if (!navigator.mediaDevices?.getUserMedia) {
        const message = "此瀏覽器不支援相機存取，請改用 Safari 或手動輸入條碼。";
        if (status) status.textContent = message;
        setScannerError({ name: "NotSupportedError", message });
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        stream.getTracks().forEach((track) => track.stop());
        if (status) status.textContent = "相機權限已允許";
        setScannerError("");
      } catch (error) {
        if (status) status.textContent = `${error?.name || "Error"}: ${error?.message || "相機權限測試失敗"}`;
        setScannerError(error, "相機權限測試失敗");
      }
    }

    async function startScanner() {
      const status = document.querySelector("#scannerStatus");
      const video = document.querySelector("#scannerVideo");
      if (!status || !video) return;

      updateScannerDiagnostics();

      if (!window.isSecureContext) {
        const message = "相機需要 HTTPS 網址。請用 GitHub Pages / Vercel / Netlify 測試，不能用普通 http 網址。";
        status.textContent = message;
        setScannerError(message);
        return;
      }

      if (!navigator.mediaDevices?.getUserMedia) {
        const message = "未能開啟相機，請使用手動輸入條碼。";
        status.textContent = message;
        setScannerError(message);
        return;
      }

      const zxingLoaded = await waitForZXingBrowser();
      if (!zxingLoaded) {
        const message = "條碼掃描程式未能載入，請檢查網絡或重新整理頁面。";
        if (!window.ZXingBrowserLoadError) window.ZXingBrowserLoadError = message;
        status.textContent = message;
        setScannerError(message);
        return;
      }

      try {
        status.textContent = "正在尋找條碼...";
        setScannerError("");
        const reader = new ZXingBrowser.BrowserMultiFormatReader();
        const constraints = {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        const controls = await reader.decodeFromConstraints(constraints, video, (result) => {
          if (!result) return;
          const barcode = cleanBarcode(result.getText());
          if (!barcode) return;
          state.scannerDiagnostics.lastScannedBarcode = barcode;
          setScannerError("");
          status.textContent = `已掃描條碼: ${barcode}`;
          stopScanner();
          showToast(`已掃描: ${barcode}`);
          handleBarcode(barcode);
        });

        state.scanner = reader;
        state.scannerControls = controls;
        updateScannerDiagnostics();
      } catch (error) {
        status.textContent = "未能開啟相機，請使用手動輸入條碼。";
        setScannerError(error, "未能開啟相機或讀取條碼。");
      }
    }

    function stopScanner() {
      try {
        if (state.scannerControls?.stop) state.scannerControls.stop();
        if (state.scanner?.reset) state.scanner.reset();
      } catch (error) {
        // Best effort cleanup only.
      }
      state.scanner = null;
      state.scannerControls = null;

      const video = document.querySelector("#scannerVideo");
      const stream = video?.srcObject;
      if (stream?.getTracks) {
        stream.getTracks().forEach((track) => track.stop());
        video.srcObject = null;
      }
    }

    function renderManualBarcode(prefill = "") {
      setView(`
        <section class="section">

          <form class="field-grid" data-form="manual-barcode">

              條碼

            </label>
            <div class="button-row">
              <button class="btn-primary" type="submit">尋找產品</button>
              <button class="btn-plain" type="button" data-action="show-home">取消</button>
            </div>
          </form>
        </section>
      `);
    }

        renderProductDetail(product.id);

    function renderUnitOptions(selected) {
      return UNITS.map((unit) => `<option value="${unit}"${unit === selected ? " selected" : ""}>${unit}</option>`).join("");
    }

    function renderDealTypeOptions(selected) {
      return DEAL_TYPES.map(([value, label]) => `<option value="${value}"${value === selected ? " selected" : ""}>${label}</option>`).join("");
    }

    function renderOptions(values, selected, labeler = (value) => value) {
      return values.map((value) => `<option value="${escapeHtml(value)}"${value === selected ? " selected" : ""}>${escapeHtml(labeler(value))}</option>`).join("");
    }

    function renderStoreTypeLabel(value) {
      return {
        "Physical store": "實體店",
        "Online store": "網店",
        Both: "兩者"
      }[value] || value || "實體店";
    }

    function updateDealFieldVisibility() {
      const dealType = document.querySelector('[name="dealType"]')?.value || "normal";
      const promoFields = document.querySelector("#promoFields");
      if (!promoFields) return;

      const visibleFields = {
        normal: ["price"],
        b1g1: ["price"],
        bundle: ["total", "items"],
        "second-half": ["price"],
        percentage: ["price", "percentage"],
        fixed: ["price", "fixed"],
        custom: ["total", "items"]
      }[dealType] || [];

      document.querySelectorAll("[data-deal-field]").forEach((field) => {
        const visible = visibleFields.includes(field.dataset.dealField);
        field.hidden = !visible;
        const input = field.querySelector("input");
        if (input) input.required = visible && ["price", "total", "items", "percentage", "fixed"].includes(field.dataset.dealField);
      });
      document.querySelectorAll("[data-promo-help]").forEach((help) => {
        help.hidden = help.dataset.promoHelp !== dealType;
      });
      promoFields.hidden = !visibleFields.some((field) => ["total", "items", "percentage", "fixed"].includes(field));
    }

    function saveProductForm(form) {
      const formData = new FormData(form);
      const productId = form.dataset.productId;
      const barcode = cleanBarcode(formData.get("barcode"));
      const standardQuantity = Number(formData.get("standardQuantity"));

      if (!barcode || !formData.get("name") || !formData.get("brand") || !Number.isFinite(standardQuantity) || standardQuantity <= 0) {
        showToast("請填寫所有必填產品資料。");
        return;
      }

      const existingBarcodeProduct = findProductByBarcode(barcode);
      if (existingBarcodeProduct && existingBarcodeProduct.id !== productId) {
        showToast("此條碼已經有產品。");
        renderProductDetail(existingBarcodeProduct.id);
        return;
      }

      const timestamp = nowIso();
      const payload = {
        barcode,
        brand: String(formData.get("brand") || "").trim(),
        name: String(formData.get("name") || "").trim(),
        variant: String(formData.get("variant") || "").trim(),
        standardQuantity,
        unit: String(formData.get("unit") || "ml"),
        category: String(formData.get("category") || "").trim(),
        notes: String(formData.get("notes") || "").trim(),
        updatedAt: timestamp
      };

      if (productId) {
        const index = state.data.products.findIndex((product) => product.id === productId);
        if (index === -1) return;
        state.data.products[index] = { ...state.data.products[index], ...payload };
        state.data.observations.forEach((observation) => {
          if (observation.productId === productId) observation.barcode = barcode;
        });
        saveData();
        showToast("產品已更新。");
        renderProductDetail(productId);
        return;
      }

      const product = {
        id: uid("product"),
        ...payload,
        createdAt: timestamp
      };
      state.data.products.push(product);
      saveData();
      showToast("產品已新增，請加入第一筆價格。");
      renderObservationForm(product.id);
    }

    function validateLogoFile(file) {
      if (!file || !file.size) return "";
      const extension = file.name.split(".").pop().toLowerCase();
      const isSvg = extension === "svg";
      if (!LOGO_TYPES.includes(file.type) && !isSvg) return "Logo 檔案格式不支援。請使用 PNG、JPG、WEBP 或 SVG。";
      if (file.size > MAX_LOGO_BYTES) return "Logo 檔案太大。請使用 1MB 或以下的圖片。";
      return "";
    }

    function handleLogoFileChange(input) {
      const file = input.files?.[0];
      revokePendingLogoPreview();
      if (!file) {
        updateLogoPreview(null);
        return;
      }

      const error = validateLogoFile(file);
      if (error) {
        input.value = "";
        showToast(error);
        updateLogoPreview(null);
        return;
      }

      state.pendingLogoFile = file;
      state.pendingLogoPreviewUrl = URL.createObjectURL(file);
      updateLogoPreview(file);
    }

    function updateLogoPreview(file) {
      const preview = document.querySelector("#logoPreview");
      if (!preview) return;
      const storeId = document.querySelector("[data-form='store']")?.dataset.storeId || "";
      const store = findStore(storeId) || {};
      const name = document.querySelector("[name='displayName']")?.value || document.querySelector("[name='storeName']")?.value || storeDisplayName(store) || "店舖";
      const logo = file && state.pendingLogoPreviewUrl
        ? `<span class="store-logo large" aria-hidden="true"><span>${escapeHtml(storeInitials(name))}</span><img src="${escapeHtml(state.pendingLogoPreviewUrl)}" alt=""></span>`
        : renderStoreLogoShell({ ...store, displayName: name, storeName: name }, "large");

      preview.innerHTML = `
        ${logo}
        <span class="helper">${file ? `已選擇：${escapeHtml(file.name)}` : "支援 PNG、JPG、WEBP、SVG，最多 1MB。JSON 備份不包含 Logo 圖片檔。"}</span>
      `;
      hydrateStoreLogos(preview);
    }

    async function saveStoreForm(form) {
      const formData = new FormData(form);
      const storeId = form.dataset.storeId;
      const storeName = String(formData.get("storeName") || "").trim();
      const displayName = String(formData.get("displayName") || "").trim() || storeName;

      if (!storeName) {
        showToast("請輸入店舖名稱。");
        return;
      }

      const duplicate = state.data.stores.find((store) =>
        store.storeId !== storeId &&
        (normalizeStoreName(store.storeName) === normalizeStoreName(storeName) ||
          normalizeStoreName(store.displayName) === normalizeStoreName(displayName))
      );
      if (duplicate) {
        showToast("已有相同名稱的店舖。");
        return;
      }

      const timestamp = nowIso();
      const existing = storeId ? findStore(storeId) : null;
      const store = {
        storeId: existing?.storeId || uid("store"),
        storeName,
        displayName,
        countryOrRegion: String(formData.get("countryOrRegion") || "Hong Kong"),
        storeType: String(formData.get("storeType") || "Physical store"),
        defaultCurrency: String(formData.get("defaultCurrency") || "HKD"),
        logoKey: existing?.logoKey || "",
        notes: String(formData.get("notes") || "").trim(),
        createdAt: existing?.createdAt || timestamp,
        updatedAt: timestamp
      };

      const selectedFile = state.pendingLogoFile;
      if (selectedFile) {
        const error = validateLogoFile(selectedFile);
        if (error) {
          showToast(error);
          return;
        }

        const logoKey = store.logoKey || uid("logo");
        try {
          await saveLogoBlob(logoKey, selectedFile);
          revokeLogoObjectUrl(logoKey);
          store.logoKey = logoKey;
        } catch (error) {
          showToast("Logo 未能儲存，但店舖文字資料仍會儲存。");
          store.logoKey = existing?.logoKey || "";
        }
      }

      const index = state.data.stores.findIndex((item) => item.storeId === store.storeId);
      if (index >= 0) {
        state.data.stores[index] = { ...state.data.stores[index], ...store };
      } else {
        state.data.stores.push(store);
      }

      revokePendingLogoPreview();
      saveData();
      showToast("店舖已儲存。");
      renderStoreManagement();
    }

    function countStoreObservations(store) {
      if (!store) return 0;
      const names = [store.storeName, store.displayName].map(normalizeStoreName).filter(Boolean);
      return state.data.observations.filter((observation) =>
        observation.storeId === store.storeId ||
        names.includes(normalizeStoreName(observation.storeNameSnapshot || observation.store))
      ).length;
    }

    async function removeStoreLogo(storeId) {
      if (!storeId) {
        revokePendingLogoPreview();
        const input = document.querySelector("[name='logoFile']");
        if (input) input.value = "";
        updateLogoPreview(null);
        showToast("已清除已選 Logo。");
        return;
      }

      const store = findStore(storeId);
      if (!store?.logoKey) {
        showToast("此店舖未有 Logo。");
        return;
      }

      const logoKey = store.logoKey;
      try {
        await deleteLogoBlob(logoKey);
      } catch (error) {
        showToast("Logo 圖片未能刪除，請稍後再試。");
        return;
      }
      revokeLogoObjectUrl(logoKey);
      store.logoKey = "";
      store.updatedAt = nowIso();
      saveData();
      showToast("Logo 已移除。");
      renderStoreForm(store);
    }

    async function deleteStore(storeId) {
      const store = findStore(storeId);
      if (!store) return;
      const usedCount = countStoreObservations(store);
      const message = usedCount
        ? `此店舖已有 ${usedCount} 筆價格記錄。刪除店舖不會刪除價格記錄，舊記錄會繼續顯示原本店舖文字。確定刪除？`
        : "確定刪除此店舖？";
      if (!window.confirm(message)) return;

      const logoKey = store.logoKey;
      state.data.stores = state.data.stores.filter((item) => item.storeId !== storeId);
      saveData();
      if (logoKey) {
        try {
          await deleteLogoBlob(logoKey);
        } catch (error) {
          // Text data is already deleted; stale logo blobs are harmless and can be replaced later.
        }
        revokeLogoObjectUrl(logoKey);
      }
      showToast("店舖已刪除，價格記錄已保留。");
      renderStoreManagement();
    }

            ${renderStat("歷史最高", formatUnitPrice(stats.highest, stats.unitLabel))}

            <button class="btn-secondary" type="button" data-action="show-scanner">再掃描</button>
          </div>
          <div class="button-row">

            <button class="btn-danger" type="button" data-action="delete-product" data-product-id="${escapeHtml(product.id)}">刪除產品</button>
          </div>

        <section class="section">

        </section>

    }

    function renderStat(label, value) {
      return `
        <div class="stat">
          <span class="stat-label">${escapeHtml(label)}</span>
          <span class="stat-value">${escapeHtml(value)}</span>
        </div>
      `;
    }

    function renderStatHtml(label, valueHtml) {
      return `
        <div class="stat">
          <span class="stat-label">${escapeHtml(label)}</span>
          <span class="stat-value">${valueHtml}</span>
        </div>
      `;
    }

    function renderStatusBadge(status) {
      const map = {
        new: ["新記錄", "status-new"],
        cheap: ["抵買", "status-cheap"],
        normal: ["普通", "status-normal"],
        expensive: ["偏貴", "status-expensive"]
      };
      const [label, className] = map[status] || map.new;
      return `<span class="status ${className}">${label}</span>`;
    }

    function renderStatusText(stats) {
      const label = {
        new: "新記錄",
        cheap: "抵買",
        normal: "普通",
        expensive: "偏貴"
      }[stats.status] || "新記錄";
      return `${label}: ${stats.reason}`;
    }

    function renderObservationCard(product, observation) {
      const unit = calculateUnitPrice(observation);
      const displayedPrice = getDisplayedPrice(observation);
      const effectiveItemPrice = calculateEffectiveItemPrice(observation);
      const dealLabel = getDealTypeLabel(getDealType(observation));
      return `
        <article class="card history-item">
          <div class="history-main">
            <strong>${escapeHtml(formatDate(observation.date))} · ${renderStoreInline(observation)}</strong>
            <strong>${money(displayedPrice)}</strong>
          </div>
          <span>${escapeHtml(observation.quantity)} ${escapeHtml(observation.unit)} · ${escapeHtml(dealLabel)}</span>
          <span class="helper">單件原價: ${money(displayedPrice)}</span>
          <span class="helper">優惠後每件價: ${money(effectiveItemPrice)}</span>
          <span class="helper">優惠後單位價: ${formatUnitPrice(unit.value, unit.label)}</span>
          ${observation.promotionNotes ? `<span class="helper">優惠備註: ${escapeHtml(observation.promotionNotes)}</span>` : ""}
          ${observation.paymentNotes ? `<span class="helper">信用卡／付款備註: ${escapeHtml(observation.paymentNotes)}</span>` : ""}
          ${observation.generalNotes ? `<span class="helper">一般備註: ${escapeHtml(observation.generalNotes)}</span>` : ""}
          <div class="compact-actions">

            <button class="btn-danger" type="button" data-action="delete-observation" data-product-id="${escapeHtml(product.id)}" data-observation-id="${escapeHtml(observation.id)}">刪除</button>
          </div>
        </article>
      `;
    }

    function getStoreUsage(store) {
      if (!store) return { count: 0, latestDate: "" };
      const names = [store.storeName, store.displayName].map(normalizeStoreName).filter(Boolean);
      const matches = state.data.observations.filter((observation) =>
        observation.storeId === store.storeId ||
        names.includes(normalizeStoreName(observation.storeNameSnapshot || observation.store))
      );
      return {
        count: matches.length,
        latestDate: matches.map((item) => item.date || item.createdAt || "").sort().at(-1) || ""
      };
    }

    function getCommonStoreChoices(selectedStoreId = "") {
      return [...state.data.stores].sort((a, b) => {
        if (a.storeId === selectedStoreId) return -1;
        if (b.storeId === selectedStoreId) return 1;
        const usageA = getStoreUsage(a);
        const usageB = getStoreUsage(b);
        if (usageA.count !== usageB.count) return usageB.count - usageA.count;
        const latestDiff = String(usageB.latestDate).localeCompare(String(usageA.latestDate));
        if (latestDiff !== 0) return latestDiff;
        return storeDisplayName(a).localeCompare(storeDisplayName(b), "zh-Hant");
      });
    }

    function renderObservationStoreChoice(store, selectedStoreId) {
      const name = storeDisplayName(store);
      return `
        <button class="store-choice${store.storeId === selectedStoreId ? " is-selected" : ""}" type="button" data-action="select-observation-store" data-store-id="${escapeHtml(store.storeId)}" data-store-name="${escapeHtml(name.toLowerCase())}">
          ${renderStoreLogoShell(store, "small")}
          <span class="store-name">${escapeHtml(name)}</span>
        </button>
      `;
    }

    function renderSelectedObservationStore(store, fallbackName = "") {
      if (store) return renderStoreInline(store);
      const cleanName = String(fallbackName || "").trim();
      if (!cleanName) return `<span class="muted">未選擇店舖</span>`;
      return renderStoreInline({ storeName: cleanName, displayName: cleanName });
    }

    function selectObservationStore(storeId) {
      const store = findStore(storeId);
      if (!store) return;
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const storeIdInput = form.querySelector('[name="storeId"]');
      const storeInput = form.querySelector('[name="store"]');
      if (storeIdInput) storeIdInput.value = store.storeId;
      if (storeInput) storeInput.value = storeDisplayName(store);
      form.querySelectorAll(".store-choice").forEach((button) => {
        button.classList.toggle("is-selected", button.dataset.storeId === store.storeId);
      });
      const selected = form.querySelector("#selectedObservationStore");
      if (selected) {
        selected.innerHTML = `
          <span class="helper">已選擇</span>
          ${renderStoreInline(store)}
        `;
        hydrateStoreLogos(selected);
      }
      const manual = form.querySelector("#manualStoreEntry");
      if (manual) manual.hidden = true;
      updateObservationPreview();
    }

    function showManualStoreInput() {
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const manual = form.querySelector("#manualStoreEntry");
      const storeInput = form.querySelector('[name="store"]');
      const storeIdInput = form.querySelector('[name="storeId"]');
      if (manual) manual.hidden = false;
      if (storeIdInput) storeIdInput.value = "";
      form.querySelectorAll(".store-choice").forEach((button) => button.classList.remove("is-selected"));
      if (storeInput) {
        storeInput.focus();
        storeInput.select();
      }
      handleManualStoreInput();
    }

    function handleManualStoreInput() {
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const storeInput = form.querySelector('[name="store"]');
      const storeIdInput = form.querySelector('[name="storeId"]');
      if (!storeInput) return;
      const matchingStore = findStoreByName(storeInput.value);

    function saveObservationForm(form) {
      const formData = new FormData(form);
      const productId = form.dataset.productId;
      const observationId = form.dataset.observationId;
      const product = findProduct(productId);
      const quantity = Number(formData.get("quantity"));
      const dealType = normalizeDealType(formData.get("dealType"));
      const displayedPriceText = String(formData.get("price") || "").trim();
      const totalAmountPaidText = String(formData.get("totalAmountPaid") || "").trim();
      const itemsReceivedText = String(formData.get("itemsReceived") || "").trim();
      const discountPercentageText = String(formData.get("discountPercentage") || "").trim();
      const discountAmountText = String(formData.get("discountAmount") || "").trim();
      const typedStoreName = String(formData.get("store") || "").trim();
      const selectedStoreId = String(formData.get("storeId") || "").trim();
      const inputDisplayedPrice = displayedPriceText ? Number(displayedPriceText) : Number.NaN;
      const inputTotalAmountPaid = totalAmountPaidText ? Number(totalAmountPaidText) : Number.NaN;
      const inputItemsReceived = itemsReceivedText ? Number(itemsReceivedText) : Number.NaN;
      const discountPercentage = discountPercentageText ? Number(discountPercentageText) : null;
      const discountAmount = discountAmountText ? Number(discountAmountText) : null;
      const needsDisplayedPrice = ["normal", "b1g1", "second-half", "percentage", "fixed"].includes(dealType);
      const needsTotalAndItems = ["bundle", "custom"].includes(dealType);

      let displayedPrice = inputDisplayedPrice;
      let totalAmountPaid = Number.isFinite(inputTotalAmountPaid) ? inputTotalAmountPaid : inputDisplayedPrice;
      let itemsReceived = Number.isFinite(inputItemsReceived) ? inputItemsReceived : 1;

      if (dealType === "b1g1") {
        totalAmountPaid = inputDisplayedPrice;
        itemsReceived = 2;
      }

      if (dealType === "second-half") {
        totalAmountPaid = inputDisplayedPrice * 1.5;
        itemsReceived = 2;
      }

      if (needsTotalAndItems && !Number.isFinite(displayedPrice) && Number.isFinite(inputTotalAmountPaid)) {
        displayedPrice = inputTotalAmountPaid;
      }

      if (!product) {
        showToast("找不到產品。");
        renderHome();
        return;
      }

      if (!typedStoreName || !Number.isFinite(quantity) || quantity <= 0 || !formData.get("date")) {
        showToast("請填寫所有必填價格資料。");
        return;
      }

      if (needsDisplayedPrice && (!Number.isFinite(displayedPrice) || displayedPrice <= 0)) {
        showToast("請輸入單件原價。");
        return;
      }

      if (needsTotalAndItems && (!Number.isFinite(totalAmountPaid) || totalAmountPaid <= 0 || !Number.isFinite(itemsReceived) || itemsReceived <= 0)) {
        showToast("套裝價或自訂優惠需要優惠總價及實際件數。");
        return;
      }

      if (dealType === "percentage" && (!Number.isFinite(discountPercentage) || discountPercentage < 0 || discountPercentage > 100)) {
        showToast("請輸入 0 至 100 的折扣百分比。");
        return;
      }

      if (dealType === "fixed" && (!Number.isFinite(discountAmount) || discountAmount < 0)) {
        showToast("請輸入固定折扣金額。");
        return;
      }

      const effectiveItemPrice = calculateEffectiveItemPrice({
        price: displayedPrice,
        displayedPrice,
        dealType,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount
      });
      if (!Number.isFinite(effectiveItemPrice) || effectiveItemPrice <= 0) {
        showToast("優惠後價格必須大於 0。");
        return;
      }

      const timestamp = nowIso();
      const selectedStore = findStore(selectedStoreId) || findStoreByName(typedStoreName) || ensureStoreForObservation(typedStoreName);
      const storeNameSnapshot = selectedStore ? storeDisplayName(selectedStore) : typedStoreName;
      const payload = {
        productId,
        barcode: product.barcode,
        store: storeNameSnapshot,
        storeId: selectedStore?.storeId || "",
        storeNameSnapshot,
        price: displayedPrice,
        displayedPrice,
        dealType,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount,
        quantity,
        unit: String(formData.get("unit") || product.unit),
        date: String(formData.get("date") || today()),
        promotionNotes: String(formData.get("promotionNotes") || "").trim(),
        paymentNotes: String(formData.get("paymentNotes") || "").trim(),
        generalNotes: String(formData.get("generalNotes") || "").trim(),
        updatedAt: timestamp
      };

      if (observationId) {
        const index = state.data.observations.findIndex((observation) => observation.id === observationId);
        if (index === -1) return;
        state.data.observations[index] = { ...state.data.observations[index], ...payload };
      } else {
        state.data.observations.push({
          id: uid("observation"),
          ...payload,
          createdAt: timestamp
        });
      }

      product.updatedAt = timestamp;
      saveData();
      showToast("價格記錄已儲存。");
      renderProductDetail(productId);
    }

    function normalizeDealType(value) {
      const dealType = String(value || "normal");
      return DEAL_TYPES.some(([type]) => type === dealType) ? dealType : "normal";
    }

    function getDealType(observation) {
      return normalizeDealType(observation.dealType);
    }

    function getDealTypeLabel(dealType) {
      return DEAL_TYPES.find(([value]) => value === dealType)?.[1] || "普通價";
    }

    function getDisplayedPrice(observation) {
      const displayedPrice = Number(observation.displayedPrice);
      if (Number.isFinite(displayedPrice) && displayedPrice > 0) return displayedPrice;
      return Number(observation.price);
    }

    function getTotalAmountPaid(observation, displayedPrice = getDisplayedPrice(observation)) {
      const totalAmountPaid = Number(observation.totalAmountPaid);
      if (Number.isFinite(totalAmountPaid) && totalAmountPaid > 0) return totalAmountPaid;
      return displayedPrice;
    }

    function getItemsReceived(observation) {
      const itemsReceived = Number(observation.itemsReceived);
      if (Number.isFinite(itemsReceived) && itemsReceived > 0) return itemsReceived;
      return 1;
    }

    function getDiscountPercentage(observation) {
      if (observation.discountPercentage === null || observation.discountPercentage === undefined || observation.discountPercentage === "") return Number.NaN;
      const discountPercentage = Number(observation.discountPercentage);
      return Number.isFinite(discountPercentage) ? discountPercentage : Number.NaN;
    }

    function getDiscountAmount(observation) {
      if (observation.discountAmount === null || observation.discountAmount === undefined || observation.discountAmount === "") return Number.NaN;
      const discountAmount = Number(observation.discountAmount);
      return Number.isFinite(discountAmount) ? discountAmount : Number.NaN;
    }

    function calculateEffectiveItemPrice(observation) {
      const displayedPrice = getDisplayedPrice(observation);
      const dealType = getDealType(observation);
      const totalAmountPaid = getTotalAmountPaid(observation, displayedPrice);
      const itemsReceived = getItemsReceived(observation);
      const discountPercentage = getDiscountPercentage(observation);
      const discountAmount = getDiscountAmount(observation);

      if (!Number.isFinite(displayedPrice) || displayedPrice <= 0) return Number.NaN;

      if (dealType === "b1g1") return totalAmountPaid / 2;
      if (dealType === "bundle") return totalAmountPaid / itemsReceived;
      if (dealType === "second-half") return (displayedPrice * 1.5) / 2;
      if (dealType === "percentage") return displayedPrice * (1 - discountPercentage / 100);
      if (dealType === "fixed") return displayedPrice - discountAmount;
      if (dealType === "custom") return totalAmountPaid / itemsReceived;
      return displayedPrice;
    }

    function calculateUnitPrice(observation) {
      const price = calculateEffectiveItemPrice(observation);
      const quantity = Number(observation.quantity);
      const unit = observation.unit;

      if (!Number.isFinite(price) || !Number.isFinite(quantity) || quantity <= 0) {
        return { value: Number.NaN, label: "" };
      }

      if (unit === "ml") return { value: (price / quantity) * 100, label: "每 100ml" };
      if (unit === "L") return { value: (price / (quantity * 1000)) * 100, label: "每 100ml" };
      if (unit === "g") return { value: (price / quantity) * 100, label: "每 100g" };
      if (unit === "kg") return { value: (price / (quantity * 1000)) * 100, label: "每 100g" };
      if (unit === "pcs") return { value: price / quantity, label: "每 pc" };
      if (unit === "pack") return { value: price / quantity, label: "每 pack" };
      return { value: price / quantity, label: `每 ${unit || "單位"}` };
    }

    function formatUnitPrice(value, label) {
      if (!Number.isFinite(value)) return "未有資料";
      return `${money(value)} ${label || ""}`.trim();
    }

    function getStats(productId) {
      const observations = getProductObservations(productId);
      const latest = observations[0] || null;
      const unitPrices = observations
        .map((observation) => ({ observation, unit: calculateUnitPrice(observation) }))
        .filter((entry) => Number.isFinite(entry.unit.value));

      const values = unitPrices.map((entry) => entry.unit.value);
      const latestUnit = latest ? calculateUnitPrice(latest) : { value: Number.NaN, label: unitPrices[0]?.unit.label || "" };
      const lowest = values.length ? Math.min(...values) : Number.NaN;
      const highest = values.length ? Math.max(...values) : Number.NaN;
      const average = values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : Number.NaN;
      const status = getPriceStatus(observations.length, latestUnit.value, lowest, average);

      return {
        latest,
        latestUnitPrice: latestUnit.value,
        unitLabel: latestUnit.label || unitPrices[0]?.unit.label || "",
        lowest,
        highest,
        average,
        status: status.status,
        reason: status.reason
      };
    }

    function getPriceStatus(count, latestUnitPrice, lowest, average) {
      if (count <= 1 || !Number.isFinite(latestUnitPrice)) {
        return { status: "new", reason: "暫時只有一筆紀錄" };
      }

      if (Number.isFinite(lowest) && latestUnitPrice <= lowest * 1.1) {
        return { status: "cheap", reason: "接近歷史最低價" };
      }

      if (Number.isFinite(average) && latestUnitPrice > average * 1.15) {
        return { status: "expensive", reason: "比平時價格高" };
      }

      return { status: "normal", reason: "大約等於平時價格" };
    }

    function deleteProduct(productId) {
      const product = findProduct(productId);
      if (!product) return;
      const ok = window.confirm("刪除產品會同時刪除相關價格記錄。確定刪除？");
      if (!ok) return;

      state.data.products = state.data.products.filter((item) => item.id !== productId);
      state.data.observations = state.data.observations.filter((item) => item.productId !== productId);
      saveData();
      showToast("產品已刪除。");
      renderHome();
    }

    function deleteObservation(productId, observationId) {
      const ok = window.confirm("確定刪除此價格記錄？");
      if (!ok) return;
      state.data.observations = state.data.observations.filter((item) => item.id !== observationId);
      const product = findProduct(productId);
      if (product) product.updatedAt = nowIso();
      saveData();
      showToast("價格記錄已刪除。");
      renderProductDetail(productId);
    }

    function exportBackup() {
      const payload = JSON.stringify(state.data, null, 2);
      const textarea = document.querySelector("#backupJson");
      if (textarea) textarea.value = payload;

      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `barcode-price-backup-${today()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("已匯出備份。");
    }

    async function copyBackup() {
      const textarea = document.querySelector("#backupJson");
      const payload = textarea?.value.trim() || JSON.stringify(state.data, null, 2);
      if (textarea && !textarea.value.trim()) textarea.value = payload;

      try {
        await navigator.clipboard.writeText(payload);
        showToast("已複製 JSON。");
      } catch (error) {
        if (textarea) {
          textarea.focus();
          textarea.select();
        }
        showToast("請手動複製文字框內容。");
      }
    }

    function importBackup() {
      const textarea = document.querySelector("#backupJson");
      const raw = textarea?.value.trim();
      if (!raw) {
        showToast("請先貼上 JSON 備份。");
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (error) {
        showToast("JSON 格式不正確。");
        return;
      }

      if (!Array.isArray(parsed.products) || !Array.isArray(parsed.observations)) {
        showToast("備份內容缺少 products 或 observations。");
        return;
      }

      state.pendingImport = {
        products: parsed.products,
        observations: parsed.observations,
        stores: Array.isArray(parsed.stores) ? parsed.stores : []
      };

      const warning = document.querySelector("#importWarning");
      if (warning) {
        warning.innerHTML = `
          <div class="notice danger-note">
            匯入會覆蓋現有本機資料。備份內有 ${parsed.products.length} 個產品、${parsed.observations.length} 筆價格記錄及 ${Array.isArray(parsed.stores) ? parsed.stores.length : 0} 間店舖。Logo 圖片檔不會由 JSON 備份還原。
          </div>
          <div class="button-row">
            <button class="btn-danger" type="button" data-action="confirm-import-json">確認匯入</button>
            <button class="btn-plain" type="button" data-action="cancel-import-json">取消匯入</button>
          </div>
        `;
      }
    }

    function confirmImportBackup() {
      if (!state.pendingImport) {
        showToast("請先貼上有效 JSON 備份。");
        return;
      }

      state.data = state.pendingImport;
      state.pendingImport = null;
      saveData();
      showToast("備份已匯入。");
      renderHome();
    }

    function cancelImportBackup() {
      state.pendingImport = null;
      const warning = document.querySelector("#importWarning");
      if (warning) warning.innerHTML = "";
      showToast("已取消匯入。");
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      if (!window.isSecureContext) return;
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    }
  </script>
</body>
</html>
