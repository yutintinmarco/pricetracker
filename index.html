    function updateProductImagePreview({ status = "", statusClass = "" } = {}) {
      const preview = document.querySelector("#productImagePreview");
      const statusElement = document.querySelector("#productImageStatus");
      const pickerText = document.querySelector("#productImagePickerText");
      const removeButton = document.querySelector("#removeProductImageButton");
      if (!preview) return;

      const form = document.querySelector("[data-form='product']");
      const productId = form?.dataset.productId || "";
      const existing = findProduct(productId) || {};
      const draft = {
        ...existing,
        brand: form?.querySelector('[name="brand"]')?.value || existing.brand || "",
        name: form?.querySelector('[name="name"]')?.value || existing.name || "",
        productImageKey: state.removeProductImageOnSave ? "" : existing.productImageKey || existing.imageKey || ""
      };
      const hasPendingImage = Boolean(state.pendingProductImageBlob && state.pendingProductImagePreviewUrl);
      const hasExistingImage = Boolean(draft.productImageKey);
      const hasVisibleImage = hasPendingImage || hasExistingImage;
      const image = hasPendingImage
        ? `<span class="product-image preview has-loaded-image" data-action="view-product-image" role="button" tabindex="0" aria-label="查看產品圖片"><span class="product-image-fallback">${escapeHtml(productInitials(draft))}</span><img src="${escapeHtml(state.pendingProductImagePreviewUrl)}" alt=""></span>`
        : renderProductImageShell(draft, "preview");

      preview.innerHTML = image;
      if (statusElement) {
        statusElement.textContent = status || (hasVisibleImage ? "已加入產品圖片" : "未有產品圖片");
        statusElement.className = `product-image-upload-status${statusClass ? ` ${statusClass}` : ""}`;
      }
      if (pickerText) pickerText.textContent = hasVisibleImage ? "更換圖片" : "加入圖片";
      if (removeButton) removeButton.hidden = !hasVisibleImage;
      hydrateProductImages(preview);
    }

    function removeProductImage(productId) {
      state.productImageProcessToken += 1;
      state.productImageProcessing = false;
      revokePendingProductImagePreview();
      state.removeProductImageOnSave = true;
      const input = document.querySelector("[name='productImageFile']");
      if (input) input.value = "";
      setProductImageProcessing(false);
      updateProductImagePreview({ status: "未有產品圖片" });
      showToast("已標記移除產品圖片，儲存產品後生效。");
    }

    async function saveStoreForm(form) {
      const formData = new FormData(form);
      const storeId = form.dataset.storeId;
      const storeName = String(formData.get("storeName") || "").trim();
      const displayName = String(formData.get("displayName") || "").trim() || storeName;

      if (!storeName) {
        showToast("請輸入店舖名稱。");
        return;
      }

      const duplicate = state.data.stores.find((store) =>
        store.storeId !== storeId &&
        (normalizeStoreName(store.storeName) === normalizeStoreName(storeName) ||
          normalizeStoreName(store.displayName) === normalizeStoreName(displayName))
      );
      if (duplicate) {
        showToast("已有相同名稱的店舖。");
        return;
      }

      const timestamp = nowIso();
      const existing = storeId ? findStore(storeId) : null;
      const store = {
        storeId: existing?.storeId || uid("store"),
        storeName,
        displayName,
        countryOrRegion: String(formData.get("countryOrRegion") || "Hong Kong"),
        storeType: String(formData.get("storeType") || "Physical store"),
        defaultCurrency: String(formData.get("defaultCurrency") || "HKD"),
        logoKey: existing?.logoKey || "",
        logoUpdatedAt: existing?.logoUpdatedAt || "",
        notes: String(formData.get("notes") || "").trim(),
        createdAt: existing?.createdAt || timestamp,
        updatedAt: timestamp
      };

      const selectedFile = state.pendingLogoFile;
      const oldLogoKey = existing?.logoKey || "";
      let shouldDeleteOldLogo = false;

      if (selectedFile) {
        const error = validateLogoFile(selectedFile);
        if (error) {
          showToast(error);
          return;
        }

        const logoKey = uid("logo");
        try {
          await saveLogoBlob(logoKey, selectedFile);
          revokeLogoObjectUrl(logoKey);
          store.logoKey = logoKey;
          store.logoUpdatedAt = timestamp;
          shouldDeleteOldLogo = Boolean(oldLogoKey && oldLogoKey !== logoKey);
        } catch (error) {
          showToast("Logo 未能儲存，但店舖文字資料仍會儲存。");
          store.logoKey = existing?.logoKey || "";
          store.logoUpdatedAt = existing?.logoUpdatedAt || "";
        }
      }

      const index = state.data.stores.findIndex((item) => item.storeId === store.storeId);
      if (index >= 0) {
        state.data.stores[index] = { ...state.data.stores[index], ...store };
      } else {
        state.data.stores.push(store);
      }

      revokePendingLogoPreview();
      saveData();

      if (shouldDeleteOldLogo) {
        try {
          await deleteLogoBlob(oldLogoKey);
        } catch (error) {
          // The Cloud image queue already tracks the removed logo.
        }
        revokeLogoObjectUrl(oldLogoKey);
      }

      showToast("店舖已儲存。");
      renderStoreManagement();
    }

    function countStoreObservations(store) {
      if (!store) return 0;
      const names = [store.storeName, store.displayName].map(normalizeStoreName).filter(Boolean);
      return state.data.observations.filter((observation) =>
        observation.storeId === store.storeId ||
        names.includes(normalizeStoreName(observation.storeNameSnapshot || observation.store))
      ).length;
    }

    async function removeStoreLogo(storeId) {
      if (!storeId) {
        revokePendingLogoPreview();
        const input = document.querySelector("[name='logoFile']");
        if (input) input.value = "";
        updateLogoPreview(null);
        showToast("已清除已選圖片。");
        return;
      }

      const store = findStore(storeId);
      if (!store?.logoKey) {
        showToast("此店舖未有 Logo。");
        return;
      }

      const logoKey = store.logoKey;
      try {
        await deleteLogoBlob(logoKey);
      } catch (error) {
        showToast("Logo 圖片未能刪除，請稍後再試。");
        return;
      }
      revokeLogoObjectUrl(logoKey);
      store.logoKey = "";
      store.logoUpdatedAt = "";
      store.updatedAt = nowIso();
      saveData();
      showToast("店舖 Logo 已移除。");
      renderStoreForm(store);
    }

    async function deleteStore(storeId) {
      const store = findStore(storeId);
      if (!store) return;
      const usedCount = countStoreObservations(store);
      const message = usedCount
        ? `此店舖已有 ${usedCount} 筆價格記錄。刪除店舖不會刪除價格記錄，舊記錄會繼續顯示原本店舖文字。確定刪除？`
        : "確定刪除此店舖？";
      if (!(await showNativeConfirm({
        title: "刪除店舖？",
        message,
        confirmLabel: "刪除"
      }))) return;

      const logoKey = store.logoKey;
      state.data.stores = state.data.stores.filter((item) => item.storeId !== storeId);
      saveData();
      if (logoKey) {
        try {
          await deleteLogoBlob(logoKey);
        } catch (error) {
          // Text data is already deleted; stale logo blobs are harmless and can be replaced later.
        }
        revokeLogoObjectUrl(logoKey);
      }
      showToast("店舖已刪除，價格記錄已保留。");
      renderStoreManagement();
    }

    function formatProductSpecification(product) {
      const quantity = Number(product?.standardQuantity);
      const capacityLabel = getCapacityUnit(product?.unit)?.label || product?.unit || "";
      const salesUnit = getSalesUnitLabel(product);
      if (!Number.isFinite(quantity) || quantity <= 0) return salesUnit;
      return `${quantity} ${capacityLabel}／${salesUnit}`;
    }

    function getSalesUnitLabel(product) {
      return String(product?.salesUnit || defaultSalesUnitForCapacityUnit(product?.unit)).trim() || "件";
    }

    function formatSalesUnitPrice(observation, product) {
      if (!observation) return "未有資料";
      const value = calculateEffectiveItemPriceOriginalCurrency(observation);
      if (!Number.isFinite(value)) return "未有資料";
      return `${moneyWithCurrency(value, getObservationCurrency(observation))}／${getSalesUnitLabel(product)}`;
    }

    function formatCurrentHKDEquivalent(observation, product) {
      if (!observation || getObservationCurrency(observation) === "HKD") return "";
      const comparison = calculateComparisonPrice(observation, product);
      return Number.isFinite(comparison.value)
        ? `折合 ${formatUnitPrice(comparison.value, comparison.label)}`
        : `尚未設定 ${getObservationCurrency(observation)} 匯率`;
    }

    function formatBundleSummary(observation, product) {
      if (!observation) return "";
      const items = getItemsReceived(observation);
      const dealType = getDealType(observation);
      if (items <= 1 && dealType === "normal") return "";
      const total = getTotalAmountPaid(observation);
      if (!Number.isFinite(total)) return "";
      return `${moneyWithCurrency(total, getObservationCurrency(observation))}／${items} ${getSalesUnitLabel(product)}`;
    }

    function formatProductCapacityLine(product) {
      const quantity = Number(product?.standardQuantity);
      const quantityText = Number.isFinite(quantity)
        ? Number.isInteger(quantity)
          ? String(quantity)
          : String(Number(quantity.toFixed(2)))
        : "";
      const unitLabel = getCapacityUnit(product?.unit)?.label || product?.unit || "";
      const salesUnit = getSalesUnitLabel(product);
      return [salesUnit ? `每${salesUnit}` : "", quantityText, unitLabel]
        .filter(Boolean)
        .join(" ");
    }

    function isObservationComparableToProduct(observation, product = findProduct(observation?.productId)) {
      if (!observation || !product) return true;
      const productQuantity = Number(product.standardQuantity);
      const observationQuantity = Number(observation.quantity);
      const productUnit = String(product.unit || "").trim();
      const observationUnit = String(observation.unit || productUnit).trim();

      const quantityMatches = !Number.isFinite(productQuantity) || productQuantity <= 0 ||
        !Number.isFinite(observationQuantity) || observationQuantity <= 0 ||
        Math.abs(productQuantity - observationQuantity) < 0.000001;
      const unitMatches = !productUnit || !observationUnit || productUnit === observationUnit;
      return quantityMatches && unitMatches;
    }

    function getComparisonPriceLabel(product) {
      return `／${getSalesUnitLabel(product)}`;
    }

    function calculateComparisonPrice(observation, product = findProduct(observation?.productId)) {
      return {
        value: calculateHKDEffectiveItemPrice(observation),
        label: getComparisonPriceLabel(product)
      };
    }


    function parsePriceAnalysisDate(value) {
      const text = String(value || "");
      const match = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      const date = new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function priceAnalysisCutoffDate(value) {
      const target = parsePriceAnalysisDate(value) || parsePriceAnalysisDate(today()) || new Date();
      const cutoff = new Date(target.getTime());
      cutoff.setUTCFullYear(cutoff.getUTCFullYear() - PRICE_ANALYSIS_WINDOW_YEARS);
      return cutoff;
    }

    function observationAnalysisTimestamp(observation) {
      return String(observation?.updatedAt || observation?.createdAt || observation?.date || "");
    }

    function observationAnalysisStoreKey(observation) {
      return cleanString(observation?.storeId) || normalizeStoreName(getObservationStoreName(observation)) || "unknown-store";
    }

    function observationAnalysisDuplicateKey(observation) {
      return `${cleanString(observation?.date)}|${observationAnalysisStoreKey(observation)}`;
    }

    function medianOf(values) {
      const sorted = values.filter(Number.isFinite).sort((a, b) => a - b);
      if (!sorted.length) return Number.NaN;
      const middle = Math.floor(sorted.length / 2);
      return sorted.length % 2 ? sorted[middle] : (sorted[middle - 1] + sorted[middle]) / 2;
    }

    function quantileOf(values, quantile) {
      const sorted = values.filter(Number.isFinite).sort((a, b) => a - b);
      if (!sorted.length) return Number.NaN;
      if (sorted.length === 1) return sorted[0];
      const position = Math.max(0, Math.min(1, quantile)) * (sorted.length - 1);
      const lower = Math.floor(position);
      const upper = Math.ceil(position);
      if (lower === upper) return sorted[lower];
      const weight = position - lower;
      return sorted[lower] * (1 - weight) + sorted[upper] * weight;
    }

    function dedupeAnalysisEntries(entries) {
      const sorted = [...entries].sort((a, b) => {
        const dateDiff = String(b.observation.date || "").localeCompare(String(a.observation.date || ""));
        if (dateDiff !== 0) return dateDiff;
        return observationAnalysisTimestamp(b.observation).localeCompare(observationAnalysisTimestamp(a.observation));
      });
      const seen = new Set();
      return sorted.filter((entry) => {
        const key = observationAnalysisDuplicateKey(entry.observation);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function buildPriceAnalysisEntries(product, observations) {
      return observations.map((observation) => ({
        observation,
        unit: calculateComparisonPrice(observation, product),
        nature: getPriceNature(observation),
        comparable: isObservationComparableToProduct(observation, product)
      })).filter((entry) => entry.comparable && Number.isFinite(entry.unit.value));
    }

    function isEntryWithinAnalysisWindow(entry, targetDate) {
      const entryDate = parsePriceAnalysisDate(entry?.observation?.date);
      const target = parsePriceAnalysisDate(targetDate);
      if (!entryDate || !target) return false;
      const cutoff = priceAnalysisCutoffDate(targetDate);
      return entryDate >= cutoff && entryDate <= target;
    }

    function calculatePricePercentile(value, baselineValues) {
      const values = baselineValues.filter(Number.isFinite);
      if (!Number.isFinite(value) || !values.length) return Number.NaN;
      const tolerance = Math.max(0.005, Math.abs(value) * 0.0005);
      let below = 0;
      let equal = 0;
      values.forEach((item) => {
        if (item < value - tolerance) below += 1;
        else if (Math.abs(item - value) <= tolerance) equal += 1;
      });
      return ((below + equal / 2) / values.length) * 100;
    }

    function formatPricePercentile(percentile) {
      if (!Number.isFinite(percentile)) return "未有足夠資料";
      if (percentile < 49.5) return `Bottom ${Math.max(1, Math.round(percentile))}%`;
      if (percentile > 50.5) return `Top ${Math.max(1, Math.round(100 - percentile))}%`;
      return "中間位置";
    }


    function classifyAdvancedPrice({ latest, baselineEntries, median, percentile, stableRangePct }) {
      if (!latest) {
        return {
          key: "unavailable",
          label: "未有分析",
          tone: "is-neutral",
          reason: "最新記錄未有有效比較價格"
        };
      }

      if (latest.nature === "excluded") {
        return {
          key: "excluded",
          label: "已排除分析",
          tone: "is-neutral",
          reason: "呢筆記錄由你設定為暫時排除分析"
        };
      }

      const totalPoints = baselineEntries.length + 1;

      if (!Number.isFinite(median) || totalPoints <= 2) {
        return {
          key: "insufficient",
          label: "資料不足",
          tone: "is-neutral",
          reason: `目前只有 ${totalPoints} 個有效價格點`
        };
      }

      const differencePct = median > 0
        ? ((latest.unit.value - median) / median) * 100
        : Number.NaN;

      if (totalPoints <= 4) {
        if (
          Number.isFinite(differencePct) &&
          differencePct <= -PRICE_ANALYSIS_CHEAP_DIFF_PCT
        ) {
          return {
            key: "lower",
            label: "初步偏低",
            tone: "is-lower",
            provisional: true,
            reason: `只有 ${totalPoints} 個有效價格點；目前比五年中位數低 ${Math.abs(differencePct).toFixed(1)}%`
          };
        }

        if (
          Number.isFinite(differencePct) &&
          differencePct >= PRICE_ANALYSIS_CHEAP_DIFF_PCT
        ) {
          return {
            key: "higher",
            label: "初步偏高",
            tone: "is-higher",
            provisional: true,
            reason: `只有 ${totalPoints} 個有效價格點；目前比五年中位數高 ${differencePct.toFixed(1)}%`
          };
        }

        return {
          key: "normal",
          label: "初步一般",
          tone: "is-neutral",
          provisional: true,
          reason: `只有 ${totalPoints} 個有效價格點；暫未見明顯高低`
        };
      }

      const stable =
        Number.isFinite(stableRangePct) &&
        stableRangePct <= PRICE_ANALYSIS_STABLE_RANGE_PCT;

      if (
        stable &&
        Number.isFinite(differencePct) &&
        Math.abs(differencePct) <= PRICE_ANALYSIS_STABLE_RANGE_PCT
      ) {
        if (differencePct <= -0.95) {
          return {
            key: "slightly-low",
            label: "略低",
            tone: "is-lower",
            reason: `價格穩定；目前比中位數低 ${Math.abs(differencePct).toFixed(1)}%`
          };
        }

        if (differencePct >= 0.95) {
          return {
            key: "slightly-high",
            label: "略高",
            tone: "is-higher",
            reason: `價格穩定；目前比中位數高 ${differencePct.toFixed(1)}%`
          };
        }

        return {
          key: "normal",
          label: "一般價",
          tone: "is-neutral",
          reason: "價格非常穩定，與五年中位數相若"
        };
      }

      if (Number.isFinite(percentile) && Number.isFinite(differencePct)) {
        if (
          percentile <= PRICE_ANALYSIS_SUPER_CHEAP_PERCENTILE &&
          differencePct <= -PRICE_ANALYSIS_SUPER_CHEAP_DIFF_PCT
        ) {
          return {
            key: "super-cheap",
            label: "超抵買",
            tone: "is-lower",
            reason: `Bottom 5% 且比五年中位數低 ${Math.abs(differencePct).toFixed(1)}%`
          };
        }

        if (
          percentile <= PRICE_ANALYSIS_CHEAP_PERCENTILE &&
          differencePct <= -PRICE_ANALYSIS_CHEAP_DIFF_PCT
        ) {
          return {
            key: "cheap",
            label: "抵買",
            tone: "is-lower",
            reason: `Bottom 20% 且比五年中位數低 ${Math.abs(differencePct).toFixed(1)}%`
          };
        }

        if (
          percentile >= 100 - PRICE_ANALYSIS_SUPER_CHEAP_PERCENTILE &&
          differencePct >= PRICE_ANALYSIS_SUPER_CHEAP_DIFF_PCT
        ) {
          return {
            key: "very-expensive",
            label: "非常貴",
            tone: "is-higher",
            reason: `Top 5% 且比五年中位數高 ${differencePct.toFixed(1)}%`
          };
        }

        if (
          percentile >= 100 - PRICE_ANALYSIS_CHEAP_PERCENTILE &&
          differencePct >= PRICE_ANALYSIS_CHEAP_DIFF_PCT
        ) {
          return {
            key: "expensive",
            label: "偏貴",
            tone: "is-higher",
            reason: `Top 20% 且比五年中位數高 ${differencePct.toFixed(1)}%`
          };
        }
      }

      return {
        key: "normal",
        label: "一般價",
        tone: "is-neutral",
        reason: Number.isFinite(differencePct)
          ? `與五年中位數相差 ${Math.abs(differencePct).toFixed(1)}%`
          : "未見明顯高低"
      };
    }

    function getAnalysisConfidence(baselineEntries, latest) {
      const totalPoints = baselineEntries.length + (latest && latest.nature !== "excluded" ? 1 : 0);
      const observations = [...baselineEntries, ...(latest && latest.nature !== "excluded" ? [latest] : [])];
      const stores = new Set(observations.map((entry) => observationAnalysisStoreKey(entry.observation)).filter(Boolean));
      const dates = observations.map((entry) => parsePriceAnalysisDate(entry.observation.date)).filter(Boolean).sort((a, b) => a - b);
      const spanDays = dates.length > 1 ? Math.round((dates.at(-1) - dates[0]) / 86400000) : 0;
      const key = totalPoints >= 10 ? "high" : totalPoints >= 5 ? "medium" : "low";
      const label = { low: "低", medium: "中", high: "高" }[key];
      const spanText = spanDays >= 365 ? `跨約 ${(spanDays / 365.25).toFixed(1)} 年` : spanDays ? `跨 ${spanDays} 日` : "同一日";
      return {
        key,
        label,
        totalPoints,
        storeCount: stores.size,
        spanDays,
        meta: `${totalPoints} 個有效價格點 · ${stores.size} 間店舖 · ${spanText}`
      };
    }

    function getHistoricalLowStatus(latest, allEligibleEntries) {
      if (!latest || latest.nature === "excluded") return { key: "", label: "" };
      const prior = allEligibleEntries.filter((entry) => entry.observation.id !== latest.observation.id);
      if (!prior.length) return { key: "", label: "" };
      const priorLow = Math.min(...prior.map((entry) => entry.unit.value));
      const tolerance = Math.max(0.005, Math.abs(priorLow) * 0.001);
      if (latest.unit.value < priorLow - tolerance) return { key: "new-low", label: "創歷史新低" };
      if (Math.abs(latest.unit.value - priorLow) <= tolerance) return { key: "ties-low", label: "追平歷史最低" };
      return { key: "", label: "" };
    }

    function getProductPriceAnalysis(productId) {
      const product = findProduct(productId);
      const observations = getProductObservations(productId);
      const specComparableObservations = observations.filter((observation) => isObservationComparableToProduct(observation, product));
      const rawEntries = buildPriceAnalysisEntries(product, specComparableObservations);
      const latestObservation = observations[0] || null;
      const latest = latestObservation ? rawEntries.find((entry) => entry.observation.id === latestObservation.id) || null : null;
      const targetDate = latest?.observation?.date || latestObservation?.date || today();
      const dedupedEntries = dedupeAnalysisEntries(rawEntries);
      const allEligibleEntries = dedupedEntries.filter((entry) => entry.nature !== "excluded");
      const windowEntries = allEligibleEntries.filter((entry) => isEntryWithinAnalysisWindow(entry, targetDate));
      const baselineEntries = windowEntries.filter((entry) => entry.observation.id !== latest?.observation?.id && isNormalBaselineObservation(entry.observation));
      const baselineValues = baselineEntries.map((entry) => entry.unit.value);
      const median = medianOf(baselineValues);
      const percentile = latest ? calculatePricePercentile(latest.unit.value, baselineValues) : Number.NaN;
      const differenceFromMedianPct = latest && Number.isFinite(median) && median > 0 ? ((latest.unit.value - median) / median) * 100 : Number.NaN;
      const robustLow = baselineValues.length >= 5 ? quantileOf(baselineValues, 0.10) : (baselineValues.length ? Math.min(...baselineValues) : Number.NaN);
      const robustHigh = baselineValues.length >= 5 ? quantileOf(baselineValues, 0.90) : (baselineValues.length ? Math.max(...baselineValues) : Number.NaN);
      const stableRangePct = Number.isFinite(median) && median > 0 && Number.isFinite(robustLow) && Number.isFinite(robustHigh) ? ((robustHigh - robustLow) / median) * 100 : Number.NaN;
      const classification = classifyAdvancedPrice({ latest, baselineEntries, median, percentile, stableRangePct });
      const confidence = getAnalysisConfidence(baselineEntries, latest);
      const historicalLowStatus = getHistoricalLowStatus(latest, allEligibleEntries);
      const historicalLowest = allEligibleEntries.reduce((best, entry) => !best || entry.unit.value < best.unit.value ? entry : best, null);
      const historicalHighest = allEligibleEntries.reduce((best, entry) => !best || entry.unit.value > best.unit.value ? entry : best, null);
      const windowLowest = windowEntries.reduce((best, entry) => !best || entry.unit.value < best.unit.value ? entry : best, null);
      const windowHighest = windowEntries.reduce((best, entry) => !best || entry.unit.value > best.unit.value ? entry : best, null);
      const chronologicalEntries = [...windowEntries].sort((a, b) => String(a.observation.date || "").localeCompare(String(b.observation.date || "")));
      const previous = allEligibleEntries.find((entry) => entry.observation.id !== latest?.observation?.id) || null;
      const average = windowEntries.length ? windowEntries.reduce((sum, entry) => sum + entry.unit.value, 0) / windowEntries.length : Number.NaN;
      const specMismatchCount = Math.max(0, observations.length - specComparableObservations.length);
      const invalidPriceCount = Math.max(0, specComparableObservations.length - rawEntries.length);
      const duplicateCount = Math.max(0, rawEntries.length - dedupedEntries.length);
      const excludedByNatureCount = dedupedEntries.filter((entry) => entry.nature === "excluded").length;
      const clearanceCount = windowEntries.filter((entry) => entry.nature === "clearance").length;
      const anomaly = latest && latest.nature === "standard" ? detectPriceAnomaly(productId, latest.observation, latest.observation.id) : null;
      const historyAnalysisById = buildObservationHistoryAnalysisMap(
        product,
        observations
      );

      return {
        historyAnalysisById,
        entries: windowEntries,
        chronologicalEntries,
        latest,
        previous,
        lowest: windowLowest,
        highest: windowHighest,
        historicalLowest,
        historicalHighest,
        average,
        median,
        percentile,
        percentileText: formatPricePercentile(percentile),
        differenceFromMedianPct,
        stableRangePct,
        stable: Number.isFinite(stableRangePct) && stableRangePct <= PRICE_ANALYSIS_STABLE_RANGE_PCT,
        classification,
        confidence,
        historicalLowStatus,
        baselineEntries,
        baselineCount: baselineEntries.length,
        clearanceCount,
        anomaly,
        unitLabel: getComparisonPriceLabel(product),
        salesUnit: getSalesUnitLabel(product),
        totalObservationCount: observations.length,
        excludedCount: specMismatchCount + invalidPriceCount + duplicateCount + excludedByNatureCount,
        specMismatchCount,
        invalidPriceCount,
        duplicateCount,
        excludedByNatureCount,
        targetDate
      };
    }

    function samplePriceAnalysisEntries(entries, maximum = 60) {
      if (!Array.isArray(entries) || entries.length <= maximum) return entries || [];
      const indexes = new Set([0, entries.length - 1]);
      const slots = Math.max(2, maximum - 2);
      for (let i = 0; i < slots; i += 1) {
        indexes.add(Math.round((i * (entries.length - 1)) / (slots - 1)));
      }

      let lowestIndex = 0;
      let highestIndex = 0;
      entries.forEach((entry, index) => {
        if (entry.unit.value < entries[lowestIndex].unit.value) lowestIndex = index;
        if (entry.unit.value > entries[highestIndex].unit.value) highestIndex = index;
      });
      indexes.add(lowestIndex);
      indexes.add(highestIndex);

      return [...indexes]
        .sort((a, b) => a - b)
        .map((index) => entries[index]);
    }

    function compactAnalysisDate(value) {
      const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return formatDate(value);
      return `${Number(match[2])}/${Number(match[3])}/${String(match[1]).slice(-2)}`;
    }

    function getPriceComparisonSummary(latest, previous, unitLabel) {
      if (!latest) {
        return {
          value: "未有資料",
          meta: "新增第一筆價格後即可比較",
          tone: "is-neutral"
        };
      }
      if (!previous) {
        return {
          value: "首次記錄",
          meta: compactAnalysisDate(latest.observation.date),
          tone: "is-neutral"
        };
      }

      const difference = latest.unit.value - previous.unit.value;
      const percent = previous.unit.value > 0
        ? (difference / previous.unit.value) * 100
        : Number.NaN;
      const absoluteDifference = Math.abs(difference);
      const effectivelyEqual = absoluteDifference < 0.005 || (Number.isFinite(percent) && Math.abs(percent) < 0.1);

      if (effectivelyEqual) {
        return {
          value: "同上次相若",
          meta: `上次 ${compactAnalysisDate(previous.observation.date)}`,
          tone: "is-neutral"
        };
      }

      const direction = difference < 0 ? "平" : "貴";
      const percentText = Number.isFinite(percent) ? `（${Math.abs(percent).toFixed(1)}%）` : "";
      return {
        value: `${direction} ${formatUnitPrice(absoluteDifference, unitLabel)}`,
        meta: `${percentText} · 上次 ${compactAnalysisDate(previous.observation.date)}`.replace(/^ · /, ""),
        tone: difference < 0 ? "is-lower" : "is-higher"
      };
    }

    function getDistanceFromLowSummary(analysis) {
      const latestValue = analysis.latest?.unit.value;
      const lowestValue = analysis.lowest?.unit.value;
      if (!Number.isFinite(latestValue) || !Number.isFinite(lowestValue)) {
        return { value: "未有資料", meta: "", tone: "is-neutral" };
      }

      const difference = latestValue - lowestValue;
      const percent = lowestValue > 0 ? (difference / lowestValue) * 100 : Number.NaN;
      if (difference < 0.005 || (Number.isFinite(percent) && percent < 0.1)) {
        return { value: "已是歷史最低", meta: formatUnitPrice(lowestValue, analysis.unitLabel), tone: "is-lower" };
      }

      return {
        value: `高 ${formatUnitPrice(difference, analysis.unitLabel)}`,
        meta: Number.isFinite(percent) ? `較最低價高 ${percent.toFixed(1)}%` : "",
        tone: "is-higher"
      };
    }

    function renderPriceAnalysisMetric(label, value, meta = "", tone = "") {
      return `
        <div class="price-analysis-metric">
          <span class="price-analysis-metric-label">${escapeHtml(label)}</span>
          <span class="price-analysis-metric-value ${escapeHtml(tone)}">${escapeHtml(value)}</span>
          ${meta ? `<span class="price-analysis-metric-meta">${escapeHtml(meta)}</span>` : ""}
        </div>
      `;
    }

    function renderPriceTrendChart(analysis) {
      const entries = samplePriceAnalysisEntries(analysis.chronologicalEntries);
      if (entries.length < 3) {
        const remaining = Math.max(0, 3 - entries.length);
        return `
          <div class="price-analysis-prompt">
            <div>
              <strong>${entries.length ? `再記錄 ${remaining} 次` : "開始記錄價格"}</strong>
              <span>${entries.length ? "即可顯示價格走勢圖" : "有 3 筆同產品價格後會自動顯示走勢"}</span>
            </div>
          </div>
        `;
      }

      const width = 320;
      const height = 106;
      const horizontalPadding = 8;
      const verticalPadding = 10;
      const values = entries.map((entry) => entry.unit.value);
      const minimum = Number.isFinite(analysis.lowest?.unit.value)
        ? analysis.lowest.unit.value
        : Math.min(...values);
      const maximum = Number.isFinite(analysis.highest?.unit.value)
        ? analysis.highest.unit.value
        : Math.max(...values);
      const range = maximum - minimum;
      const baseline = height - verticalPadding;
      const points = entries.map((entry, index) => {
        const x = entries.length === 1
          ? width / 2
          : horizontalPadding + (index * (width - horizontalPadding * 2)) / (entries.length - 1);
        const y = range <= 0
          ? height / 2
          : verticalPadding + ((maximum - entry.unit.value) / range) * (height - verticalPadding * 2);
        return { x, y, entry };
      });
      const linePath = points.map((point, index) => `${index ? "L" : "M"}${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const areaPath = `${linePath} L${points.at(-1).x.toFixed(2)} ${baseline.toFixed(2)} L${points[0].x.toFixed(2)} ${baseline.toFixed(2)} Z`;
      const showDots = points.length <= 16;
      const firstDate = compactAnalysisDate(entries[0].observation.date);
      const lastDate = compactAnalysisDate(entries.at(-1).observation.date);

      return `
        <div class="price-chart-shell">
          <div class="price-chart-scale">
            <span>高 ${escapeHtml(formatUnitPrice(maximum, analysis.unitLabel))}</span>
            <span>低 ${escapeHtml(formatUnitPrice(minimum, analysis.unitLabel))}</span>
          </div>
          <svg class="price-chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${escapeHtml(`由 ${firstDate} 至 ${lastDate} 的價格走勢`)}">
            <line class="price-chart-grid" x1="${horizontalPadding}" y1="${verticalPadding}" x2="${width - horizontalPadding}" y2="${verticalPadding}"></line>
            <line class="price-chart-grid" x1="${horizontalPadding}" y1="${height / 2}" x2="${width - horizontalPadding}" y2="${height / 2}"></line>
            <line class="price-chart-grid" x1="${horizontalPadding}" y1="${baseline}" x2="${width - horizontalPadding}" y2="${baseline}"></line>
            <path class="price-chart-area" d="${areaPath}"></path>
            <path class="price-chart-line" d="${linePath}"></path>
            ${showDots ? points.map((point, index) => `<circle class="price-chart-dot${index === points.length - 1 ? " is-latest" : ""}" cx="${point.x.toFixed(2)}" cy="${point.y.toFixed(2)}" r="${index === points.length - 1 ? 4 : 3}"></circle>`).join("") : `<circle class="price-chart-dot is-latest" cx="${points.at(-1).x.toFixed(2)}" cy="${points.at(-1).y.toFixed(2)}" r="4"></circle>`}
          </svg>
          <div class="price-chart-axis">
            <span>${escapeHtml(firstDate)}</span>
            <span>${escapeHtml(lastDate)}</span>
          </div>
        </div>
      `;
    }

    function getPriceAnalysisInsight(analysis) {
      if (!analysis.latest) return "新增有效價格記錄後，系統會按最近五年資料自動分析。";
      if (analysis.latest.nature === "excluded") return "呢筆記錄由你設定為暫時排除分析；原始價錢仍然保留喺歷史記錄。";
      const parts = [analysis.classification.reason];
      if (analysis.stable && Number.isFinite(analysis.stableRangePct)) parts.push(`正常價格主要波幅約 ${analysis.stableRangePct.toFixed(1)}%，已啟動價格穩定保護`);
      if (analysis.latest.nature === "clearance") parts.push("清貨價可顯示抵買程度及歷史最低，但不納入日後正常中位數");
      if (analysis.anomaly) parts.push("此價格明顯偏離過往分布，建議確認價格性質");
      const excluded = [];
      if (analysis.specMismatchCount) excluded.push(`${analysis.specMismatchCount} 筆規格不同`);
      if (analysis.invalidPriceCount) excluded.push(`${analysis.invalidPriceCount} 筆缺少有效價格或匯率`);
      if (analysis.duplicateCount) excluded.push(`${analysis.duplicateCount} 筆同日同店重複`);
      if (analysis.excludedByNatureCount) excluded.push(`${analysis.excludedByNatureCount} 筆手動排除`);
      if (excluded.length) parts.push(`${excluded.join("、")}未納入分析`);
      return `${parts.join("；")}。`;
    }

    function renderPriceAnalysisTags(analysis) {
      const tags = [];
      if (analysis.historicalLowStatus.label) tags.push(`<span class="price-analysis-tag is-low">${escapeHtml(analysis.historicalLowStatus.label)}</span>`);
      if (analysis.latest?.nature === "clearance") tags.push(`<span class="price-analysis-tag is-clearance">清貨價</span>`);
      if (analysis.latest?.nature === "special-promotion") tags.push(`<span class="price-analysis-tag">特殊促銷</span>`);
      if (analysis.latest?.nature === "excluded") tags.push(`<span class="price-analysis-tag is-excluded">暫時排除分析</span>`);
      if (analysis.stable) tags.push(`<span class="price-analysis-tag">價格穩定</span>`);
      if (analysis.anomaly) tags.push(`<span class="price-analysis-tag is-warning">明顯偏離，請確認</span>`);
      return tags.length ? `<div class="price-analysis-tags">${tags.join("")}</div>` : "";
    }

    function observationMatchesHistoricalLow(observation, analysis) {
      if (!analysis?.historicalLowest || isAnalysisExcludedObservation(observation)) return false;
      const comparison = calculateComparisonPrice(observation, findProduct(observation.productId));
      if (!Number.isFinite(comparison.value)) return false;
      const low = analysis.historicalLowest.unit.value;
      return Math.abs(comparison.value - low) <= Math.max(0.005, Math.abs(low) * 0.001);
    }



    function buildObservationHistoryAnalysisMap(product, allObservations) {
      const resultMap = new Map();
      if (!product) return resultMap;

      const rawEntries = buildPriceAnalysisEntries(product, allObservations);
      const dedupedEntries = dedupeAnalysisEntries(rawEntries);
      const entryById = new Map(
        dedupedEntries.map((entry) => [entry.observation.id, entry])
      );

      const eligibleEntries = dedupedEntries.filter(
        (entry) => entry.nature !== "excluded"
      );

      const fullHistoryLowest = eligibleEntries.length
        ? Math.min(...eligibleEntries.map((entry) => entry.unit.value))
        : Number.NaN;

      const lowTolerance = Number.isFinite(fullHistoryLowest)
        ? Math.max(0.005, Math.abs(fullHistoryLowest) * 0.001)
        : 0.005;

      const tiedLowestEntries = eligibleEntries
        .filter(
          (entry) =>
            Number.isFinite(fullHistoryLowest) &&
            Math.abs(entry.unit.value - fullHistoryLowest) <= lowTolerance
        )
        .sort((a, b) => {
          const dateDiff = String(a.observation.date || "").localeCompare(
            String(b.observation.date || "")
          );
          if (dateDiff !== 0) return dateDiff;

          return observationAnalysisTimestamp(a.observation).localeCompare(
            observationAnalysisTimestamp(b.observation)
          );
        });

      const firstHistoricalLowId =
        tiedLowestEntries[0]?.observation?.id || "";

      for (const observation of allObservations) {
        if (!isObservationComparableToProduct(observation, product)) {
          resultMap.set(observation.id, {
            classification: {
              key: "unmatched",
              label: "規格不同",
              tone: "is-higher",
              reason: "容量或單位與產品規格不同"
            },
            historicalLow: false,
            historicalLowLabel: ""
          });
          continue;
        }

        const target = entryById.get(observation.id);

        if (!target) {
          resultMap.set(observation.id, {
            classification: {
              key: "duplicate",
              label: "重複記錄",
              tone: "is-neutral",
              reason: "同日同店只採用最後更新嗰筆作分析"
            },
            historicalLow: false,
            historicalLowLabel: ""
          });
          continue;
        }

        if (target.nature === "excluded") {
          resultMap.set(observation.id, {
            classification: {
              key: "excluded",
              label: "已排除分析",
              tone: "is-neutral",
              reason: "呢筆記錄由你設定為暫時排除分析"
            },
            historicalLow: false,
            historicalLowLabel: ""
          });
          continue;
        }

        const targetDate = parsePriceAnalysisDate(observation.date);

        const priorEntries = dedupedEntries.filter((entry) => {
          if (entry.observation.id === observation.id) return false;

          const entryDate = parsePriceAnalysisDate(entry.observation.date);
          if (!entryDate || !targetDate || entryDate > targetDate) return false;

          return isEntryWithinAnalysisWindow(entry, observation.date);
        });

        const baselineEntries = priorEntries.filter((entry) =>
          isNormalBaselineObservation(entry.observation)
        );

        const baselineValues = baselineEntries.map(
          (entry) => entry.unit.value
        );

        const median = medianOf(baselineValues);
        const percentile = calculatePricePercentile(
          target.unit.value,
          baselineValues
        );

        const robustLow = baselineValues.length >= 5
          ? quantileOf(baselineValues, 0.10)
          : (
              baselineValues.length
                ? Math.min(...baselineValues)
                : Number.NaN
            );

        const robustHigh = baselineValues.length >= 5
          ? quantileOf(baselineValues, 0.90)
          : (
              baselineValues.length
                ? Math.max(...baselineValues)
                : Number.NaN
            );

        const stableRangePct =
          Number.isFinite(median) &&
          median > 0 &&
          Number.isFinite(robustLow) &&
          Number.isFinite(robustHigh)
            ? ((robustHigh - robustLow) / median) * 100
            : Number.NaN;

        const classification = classifyAdvancedPrice({
          latest: target,
          baselineEntries,
          median,
          percentile,
          stableRangePct
        });

        const historicalLow =
          Number.isFinite(fullHistoryLowest) &&
          Math.abs(target.unit.value - fullHistoryLowest) <= lowTolerance;

        resultMap.set(observation.id, {
          classification,
          historicalLow,
          historicalLowLabel: historicalLow
            ? (
                observation.id === firstHistoricalLowId
                  ? "歷史最低"
                  : "追平最低"
              )
            : "",
          baselineCount: baselineEntries.length
        });
      }

      return resultMap;
    }

    function getObservationAdvancedClassification(
      product,

      if (!product || !targetObservation) {

            label: "未能分析",
            tone: "is-neutral",
            reason: "未有足夠資料"
          },
          historicalLow: false,
          historicalLowLabel: ""
        };
      }

      return (
        buildObservationHistoryAnalysisMap(
          product,

            label: "未能分析",
            tone: "is-neutral",
            reason: "未能建立分析"
          },
          historicalLow: false,

    }

    function getStoreUsage(store) {
      if (!store) return { count: 0, latestDate: "" };
      const names = [store.storeName, store.displayName].map(normalizeStoreName).filter(Boolean);
      const matches = state.data.observations.filter((observation) =>
        observation.storeId === store.storeId ||
        names.includes(normalizeStoreName(observation.storeNameSnapshot || observation.store))
      );
      return {
        count: matches.length,
        latestDate: matches.map((item) => item.date || item.createdAt || "").sort().at(-1) || ""
      };
    }

    function getCommonStoreChoices(selectedStoreId = "") {
      return [...state.data.stores].sort((a, b) => {
        if (a.storeId === selectedStoreId) return -1;
        if (b.storeId === selectedStoreId) return 1;
        const usageA = getStoreUsage(a);
        const usageB = getStoreUsage(b);
        if (usageA.count !== usageB.count) return usageB.count - usageA.count;
        const latestDiff = String(usageB.latestDate).localeCompare(String(usageA.latestDate));
        if (latestDiff !== 0) return latestDiff;
        return storeDisplayName(a).localeCompare(storeDisplayName(b), "zh-Hant");
      });
    }

    function getRecentObservationStores(
      selectedStoreId = "",
      limit = 2
    ) {
      const storesById = new Map(
        state.data.stores.map((store) => [store.storeId, store])
      );
      const seen = new Set();
      const recent = [];

      const orderedObservations = [...state.data.observations].sort(
        (a, b) => {
          const timeA = String(
            a.updatedAt || a.date || a.createdAt || ""
          );
          const timeB = String(
            b.updatedAt || b.date || b.createdAt || ""
          );
          return timeB.localeCompare(timeA);
        }
      );

      for (const observation of orderedObservations) {
        const store =
          storesById.get(observation.storeId) ||
          findStoreByName(getObservationStoreName(observation));
        if (!store || seen.has(store.storeId)) continue;
        seen.add(store.storeId);
        recent.push(store);
        if (recent.length >= limit) break;
      }

      if (selectedStoreId && !seen.has(selectedStoreId)) {
        const selected = findStore(selectedStoreId);
        if (selected) recent.unshift(selected);
      }

      for (const store of getCommonStoreChoices(selectedStoreId)) {
        if (recent.length >= limit) break;
        if (seen.has(store.storeId)) continue;
        seen.add(store.storeId);
        recent.push(store);
      }

      return recent.slice(0, limit);
    }

    function installObservationPickerViewportTracking(overlay) {
      state.observationPickerViewportCleanup?.();
      const viewport = window.visualViewport;
      const sync = () => {
        if (!overlay?.isConnected) return;
        const height = viewport?.height || window.innerHeight;
        const offsetTop = viewport?.offsetTop || 0;
        overlay.style.setProperty("--picker-visible-height", `${Math.max(280, height)}px`);
        overlay.style.setProperty("--picker-offset-top", `${Math.max(0, offsetTop)}px`);
      };
      sync();
      if (!viewport) {
        state.observationPickerViewportCleanup = () => {};
        return;
      }
      viewport.addEventListener("resize", sync);
      viewport.addEventListener("scroll", sync);
      state.observationPickerViewportCleanup = () => {
        viewport.removeEventListener("resize", sync);
        viewport.removeEventListener("scroll", sync);
      };
    }

    function getObservationPricingFromForm(formData) {
      const dealType = normalizeDealType(formData.get("dealType"));
      let priceNature = normalizePriceNature(formData.get("priceNature"));
      const displayedPriceText = String(formData.get("price") || "").trim();
      const totalAmountPaidText = String(formData.get("totalAmountPaid") || "").trim();
      const itemsReceivedText = String(formData.get("itemsReceived") || "").trim();
      const discountPercentageText = String(formData.get("discountPercentage") || "").trim();
      const discountAmountText = String(formData.get("discountAmount") || "").trim();
      const inputDisplayedPrice = displayedPriceText ? Number(displayedPriceText) : Number.NaN;
      const inputTotalAmountPaid = totalAmountPaidText ? Number(totalAmountPaidText) : Number.NaN;
      const inputItemsReceived = itemsReceivedText ? Number(itemsReceivedText) : Number.NaN;
      const discountPercentage = discountPercentageText ? Number(discountPercentageText) : null;
      const discountAmount = discountAmountText ? Number(discountAmountText) : null;
      const needsDisplayedPrice = ["normal", "b1g1", "second-half", "percentage", "fixed"].includes(dealType);
      const needsTotalAndItems = ["bundle", "custom"].includes(dealType);

      let displayedPrice = inputDisplayedPrice;
      let totalAmountPaid = Number.isFinite(inputTotalAmountPaid) ? inputTotalAmountPaid : inputDisplayedPrice;
      let itemsReceived = Number.isFinite(inputItemsReceived) ? inputItemsReceived : 1;

      if (dealType === "b1g1") {
        totalAmountPaid = inputDisplayedPrice;
        itemsReceived = 2;
      }

      if (dealType === "second-half") {
        totalAmountPaid = inputDisplayedPrice * 1.5;
        itemsReceived = 2;
      }

      if (needsTotalAndItems && !Number.isFinite(displayedPrice) && Number.isFinite(inputTotalAmountPaid)) {
        displayedPrice = inputTotalAmountPaid;
      }

      return {
        dealType,
        displayedPrice,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount,
        needsDisplayedPrice,
        needsTotalAndItems
      };
    }

    function updateObservationPreview() {
      const form = document.querySelector('[data-form="observation"]');
      const preview = document.querySelector("#observationPreview");
      if (!form || !preview) return;
      const formData = new FormData(form);
      const pricing = getObservationPricingFromForm(formData);
      const quantity = Number(formData.get("quantity"));
      const unit = String(formData.get("unit") || "");
      const currency = String(formData.get("currency") || "HKD").toUpperCase();
      const exchangeRateToHKD = getCurrentExchangeRateToHKD(currency);
      const previewObservation = {
        price: pricing.displayedPrice,
        displayedPrice: pricing.displayedPrice,
        dealType: pricing.dealType,
        totalAmountPaid: pricing.totalAmountPaid,
        itemsReceived: pricing.itemsReceived,
        discountPercentage: pricing.discountPercentage,
        discountAmount: pricing.discountAmount
      };
      const product = findProduct(form.dataset.productId);
      const salesUnit = getSalesUnitLabel(product);
      const effectiveItemPrice = calculateEffectiveItemPriceOriginalCurrency(previewObservation);
      const hkdItemPrice = Number.isFinite(exchangeRateToHKD) && exchangeRateToHKD > 0 ? effectiveItemPrice * exchangeRateToHKD : Number.NaN;
      const dealLabel = getDealTypeLabel(pricing.dealType);
      const itemsText = Number.isFinite(pricing.itemsReceived) && pricing.itemsReceived > 0
        ? `${Number(pricing.itemsReceived).toLocaleString("en-HK", { maximumFractionDigits: 2 })} ${salesUnit}`
        : `1 ${salesUnit}`;
      preview.innerHTML = `
        <div class="price-entry-hero">
          <div class="price-entry-hero-head">
            <p class="price-entry-hero-title">優惠後每${escapeHtml(salesUnit)}價</p>
            <span class="deal-summary-badge">${escapeHtml(dealLabel)}</span>
          </div>
          <div class="price-entry-effective">${Number.isFinite(effectiveItemPrice) && effectiveItemPrice > 0 ? `${escapeHtml(moneyWithCurrency(effectiveItemPrice, currency))}／${escapeHtml(salesUnit)}` : "等待輸入價格"}</div>
          <div class="price-entry-hkd">${Number.isFinite(hkdItemPrice) && hkdItemPrice > 0 ? `折合 ${escapeHtml(moneyWithCurrency(hkdItemPrice, "HKD"))}／${escapeHtml(salesUnit)}，價格分析會使用呢個金額` : currency === "HKD" ? "輸入後會自動計算單件價格" : "未設定目前匯率"}</div>
          <div class="deal-summary-card">

          </div>
        </div>
      `;

      const mismatchBox = document.querySelector("#specMismatchWarning");

          product &&
          Number.isFinite(quantity) &&
          quantity > 0 &&
          (quantity !== Number(product.standardQuantity) || unit !== product.unit)

        mismatchBox.innerHTML = specMismatch
          ? `<p class="notice danger-note">⚠ 呢次容量／單位（${escapeHtml(String(quantity))} ${escapeHtml(unit)}）同產品規格（${escapeHtml(String(product.standardQuantity))} ${escapeHtml(product.unit)}）唔同。不同容量應建立為另一個產品；呢筆記錄可以保留，但唔會納入最低價、平均價、走勢及抵買判斷。</p>`
          : "";
      }
    }

    async function saveObservationForm(form) {
      const formData = new FormData(form);
      const productId = form.dataset.productId;
      const observationId = form.dataset.observationId;
      const product = findProduct(productId);
      const quantity = Number(formData.get("quantity"));
      const dealType = normalizeDealType(formData.get("dealType"));
      let priceNature = normalizePriceNature(formData.get("priceNature"));
      const displayedPriceText = String(formData.get("price") || "").trim();
      const totalAmountPaidText = String(formData.get("totalAmountPaid") || "").trim();
      const itemsReceivedText = String(formData.get("itemsReceived") || "").trim();
      const discountPercentageText = String(formData.get("discountPercentage") || "").trim();
      const discountAmountText = String(formData.get("discountAmount") || "").trim();
      const typedStoreName = String(formData.get("store") || "").trim();
      const selectedStoreId = String(formData.get("storeId") || "").trim();
      const inputCountrySnapshot = String(formData.get("countryOrRegionSnapshot") || "").trim();
      const inputCurrency = (String(formData.get("currency") || "").trim() || "HKD").toUpperCase();
      const inputDisplayedPrice = displayedPriceText ? Number(displayedPriceText) : Number.NaN;
      const inputTotalAmountPaid = totalAmountPaidText ? Number(totalAmountPaidText) : Number.NaN;
      const inputItemsReceived = itemsReceivedText ? Number(itemsReceivedText) : Number.NaN;
      const discountPercentage = discountPercentageText ? Number(discountPercentageText) : null;
      const discountAmount = discountAmountText ? Number(discountAmountText) : null;
      const needsDisplayedPrice = ["normal", "b1g1", "second-half", "percentage", "fixed"].includes(dealType);
      const needsTotalAndItems = ["bundle", "custom"].includes(dealType);

      let displayedPrice = inputDisplayedPrice;
      let totalAmountPaid = Number.isFinite(inputTotalAmountPaid) ? inputTotalAmountPaid : inputDisplayedPrice;
      let itemsReceived = Number.isFinite(inputItemsReceived) ? inputItemsReceived : 1;

      if (dealType === "b1g1") {
        totalAmountPaid = inputDisplayedPrice;
        itemsReceived = 2;
      }

      if (dealType === "second-half") {
        totalAmountPaid = inputDisplayedPrice * 1.5;
        itemsReceived = 2;
      }

      if (needsTotalAndItems && !Number.isFinite(displayedPrice) && Number.isFinite(inputTotalAmountPaid)) {
        displayedPrice = inputTotalAmountPaid;
      }

      if (!product) {
        showToast("找不到產品。");
        renderHome();
        return;
      }

      if (!typedStoreName || !Number.isFinite(quantity) || quantity <= 0 || !formData.get("date")) {
        showToast("請填寫所有必填價格資料。");
        return;
      }

      if (needsDisplayedPrice && (!Number.isFinite(displayedPrice) || displayedPrice <= 0)) {
        showToast("請輸入單件原價。");
        return;
      }

      if (needsTotalAndItems && (!Number.isFinite(totalAmountPaid) || totalAmountPaid <= 0 || !Number.isFinite(itemsReceived) || itemsReceived <= 0)) {
        showToast("套裝價或自訂優惠需要優惠總價及實際件數。");
        return;
      }

      if (dealType === "percentage" && (!Number.isFinite(discountPercentage) || discountPercentage < 0 || discountPercentage > 100)) {
        showToast("請輸入 0 至 100 的折扣百分比。");
        return;
      }

      if (dealType === "fixed" && (!Number.isFinite(discountAmount) || discountAmount < 0)) {
        showToast("請輸入固定折扣金額。");
        return;
      }

      if (!getNormalizedSettings().currencies.some((currency) => currency.code === inputCurrency)) {
        showToast("請選擇有效貨幣。");
        return;
      }

      const effectiveItemPrice = calculateEffectiveItemPrice({
        price: displayedPrice,
        displayedPrice,
        dealType,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount
      });
      if (!Number.isFinite(effectiveItemPrice) || effectiveItemPrice <= 0) {
        showToast("優惠後價格必須大於 0。");
        return;
      }

      const observationUnit = String(formData.get("unit") || product.unit);
      const specificationMatches = isObservationComparableToProduct({ quantity, unit: observationUnit }, product);
      if (!specificationMatches) {
        const proceed = await showNativeConfirm({
          title: "規格與產品不同",
          message: `${quantity} ${observationUnit} 同此產品的 ${product.standardQuantity} ${product.unit} 不同。500 mL 與 1 L 應建立成兩個產品。仍然儲存的話，呢筆記錄會保留，但不會納入價格分析。`,
          confirmLabel: "仍然儲存"
        });
        if (!proceed) return;
      }

      const timestamp = nowIso();
      const selectedStore = findStore(selectedStoreId) || findStoreByName(typedStoreName) || ensureStoreForObservation(typedStoreName);
      const storeNameSnapshot = selectedStore ? storeDisplayName(selectedStore) : typedStoreName;
      const countryOrRegionSnapshot = selectedStore?.countryOrRegion || inputCountrySnapshot || "Hong Kong";
      const currency = inputCurrency || selectedStore?.defaultCurrency || "HKD";
      const currencySnapshot = currency;
      const existingObservation = observationId ? findObservation(observationId) : null;
      const existingCurrency = existingObservation ? getObservationCurrency(existingObservation) : "";
      const currentRate = getCurrentExchangeRateToHKD(currency);
      const exchangeRateToHKD = currency === "HKD"
        ? 1
        : existingObservation && existingCurrency === currency && Number.isFinite(getSnapshotExchangeRateToHKD(existingObservation))
          ? getSnapshotExchangeRateToHKD(existingObservation)
          : Number.isFinite(currentRate) ? currentRate : null;
      const payload = {
        productId,
        barcode: product.barcode,
        store: storeNameSnapshot,
        storeId: selectedStore?.storeId || "",
        storeNameSnapshot,
        countryOrRegionSnapshot,
        currency,
        currencySnapshot,
        exchangeRateToHKD,
        price: displayedPrice,
        displayedPrice,
        dealType,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount,
        quantity,
        unit: observationUnit,
        date: String(formData.get("date") || today()),
        taxIncluded: String(formData.get("taxIncluded") || "").trim(),
        locationNotes: String(formData.get("locationNotes") || "").trim(),
        promotionNotes: String(formData.get("promotionNotes") || "").trim(),
        priceNature,
        paymentNotes: String(formData.get("paymentNotes") || "").trim(),
        generalNotes: String(formData.get("generalNotes") || "").trim(),
        updatedAt: timestamp
      };

      const anomaly = detectPriceAnomaly(productId, {
        id: observationId || "",
        ...payload,
        createdAt: existingObservation?.createdAt || timestamp
      }, observationId || "");
      if (anomaly && priceNature === "standard") {
        const resolvedNature = await showPriceAnomalyChoice(anomaly);
        if (!resolvedNature) return;
        priceNature = resolvedNature;
        payload.priceNature = resolvedNature;
      }

      if (observationId) {
        const index = state.data.observations.findIndex((observation) => observation.id === observationId);
        if (index === -1) return;
        state.data.observations[index] = { ...state.data.observations[index], ...payload };
      } else {
        state.data.observations.push({
          id: uid("observation"),
          ...payload,
          createdAt: timestamp
        });
      }

      product.updatedAt = timestamp;
      saveData();
      showToast("價格記錄已儲存。");
      state.nextNavigationDirection = "back";
      renderProductDetail(productId);
    }


    function normalizePriceNature(value) {
      const nature = String(value || "standard");
      return PRICE_NATURE_TYPES.some(([key]) => key === nature) ? nature : "standard";
    }

    function getPriceNature(observation) {
      return normalizePriceNature(observation?.priceNature);
    }

    function getPriceNatureLabel(value) {
      const nature = normalizePriceNature(value);
      return PRICE_NATURE_TYPES.find(([key]) => key === nature)?.[1] || "一般價格／正常優惠";
    }

    function renderPriceNatureOptions(selected = "standard") {
      const current = normalizePriceNature(selected);
      return PRICE_NATURE_TYPES.map(([value, label]) =>
        `<option value="${escapeHtml(value)}"${value === current ? " selected" : ""}>${escapeHtml(label)}</option>`
      ).join("");
    }

    function isAnalysisExcludedObservation(observation) {
      return getPriceNature(observation) === "excluded";
    }

    function isClearanceObservation(observation) {
      return getPriceNature(observation) === "clearance";
    }

    function isNormalBaselineObservation(observation) {
      const nature = getPriceNature(observation);
      return nature === "standard" || nature === "special-promotion";
    }

    function normalizeDealType(value) {
      const dealType = String(value || "normal");
      return DEAL_TYPES.some(([type]) => type === dealType) ? dealType : "normal";
    }

    function getDealType(observation) {
      return normalizeDealType(observation.dealType);
    }

    function getDealTypeLabel(dealType) {
      return DEAL_TYPES.find(([value]) => value === dealType)?.[1] || "普通價";
    }

    function getDisplayedPrice(observation) {
      const displayedPrice = Number(observation.displayedPrice);
      if (Number.isFinite(displayedPrice) && displayedPrice > 0) return displayedPrice;
      return Number(observation.price);
    }

    function getTotalAmountPaid(observation, displayedPrice = getDisplayedPrice(observation)) {
      const totalAmountPaid = Number(observation.totalAmountPaid);
      if (Number.isFinite(totalAmountPaid) && totalAmountPaid > 0) return totalAmountPaid;
      return displayedPrice;
    }

    function getItemsReceived(observation) {
      const itemsReceived = Number(observation.itemsReceived);
      if (Number.isFinite(itemsReceived) && itemsReceived > 0) return itemsReceived;
      return 1;
    }

    function getDiscountPercentage(observation) {
      if (observation.discountPercentage === null || observation.discountPercentage === undefined || observation.discountPercentage === "") return Number.NaN;
      const discountPercentage = Number(observation.discountPercentage);
      return Number.isFinite(discountPercentage) ? discountPercentage : Number.NaN;
    }

    function getDiscountAmount(observation) {
      if (observation.discountAmount === null || observation.discountAmount === undefined || observation.discountAmount === "") return Number.NaN;
      const discountAmount = Number(observation.discountAmount);
      return Number.isFinite(discountAmount) ? discountAmount : Number.NaN;
    }

    function calculateEffectiveItemPrice(observation) {
      const displayedPrice = getDisplayedPrice(observation);
      const dealType = getDealType(observation);
      const totalAmountPaid = getTotalAmountPaid(observation, displayedPrice);
      const itemsReceived = getItemsReceived(observation);
      const discountPercentage = getDiscountPercentage(observation);
      const discountAmount = getDiscountAmount(observation);

      if (!Number.isFinite(displayedPrice) || displayedPrice <= 0) return Number.NaN;

      if (dealType === "b1g1") return totalAmountPaid / 2;
      if (dealType === "bundle") return totalAmountPaid / itemsReceived;
      if (dealType === "second-half") return (displayedPrice * 1.5) / 2;
      if (dealType === "percentage") return displayedPrice * (1 - discountPercentage / 100);
      if (dealType === "fixed") return displayedPrice - discountAmount;
      if (dealType === "custom") return totalAmountPaid / itemsReceived;
      return displayedPrice;
    }

    function calculateEffectiveItemPriceOriginalCurrency(observation) {
      return calculateEffectiveItemPrice(observation);
    }

    function calculateHKDEffectiveItemPrice(observation) {
      const originalPrice = calculateEffectiveItemPriceOriginalCurrency(observation);
      const currentRate = getCurrentExchangeRateToHKD(getObservationCurrency(observation));
      if (!Number.isFinite(originalPrice) || !Number.isFinite(currentRate)) return Number.NaN;
      return originalPrice * currentRate;
    }

    function formatUnitPrice(value, label) {
      if (!Number.isFinite(value)) return "未有資料";
      const safeLabel = String(label || "");
      return safeLabel.startsWith("／") || safeLabel.startsWith("/")
        ? `${money(value)}${safeLabel}`
        : `${money(value)} ${safeLabel}`.trim();
    }

    function getStats(productId) {
      const product = findProduct(productId);
      const observations = getProductObservations(productId);
      const latest = observations[0] || null;
      const analysis = getProductPriceAnalysis(productId);
      const latestComparison = latest && isObservationComparableToProduct(latest, product) ? calculateComparisonPrice(latest, product) : { value: Number.NaN, label: getComparisonPriceLabel(product) };
      return {
        latest,
        latestUnitPrice: latestComparison.value,
        unitLabel: analysis.unitLabel,
        lowest: analysis.lowest?.unit.value ?? Number.NaN,
        highest: analysis.highest?.unit.value ?? Number.NaN,
        average: analysis.average,
        comparableCount: analysis.entries.length,
        excludedCount: analysis.excludedCount,
        latestIsComparable: Boolean(analysis.latest),
        status: analysis.classification.key,
        reason: analysis.classification.reason,
        analysis
      };
    }

    function getPriceStatus(count, latestUnitPrice, lowest, average) {
      if (count <= 1 || !Number.isFinite(latestUnitPrice)) return { status: "insufficient", reason: "資料不足" };
      return { status: "normal", reason: "請使用進階價格分析" };
    }

    function detectPriceAnomaly(productId, candidateObservation, excludeObservationId = "") {
      const product = findProduct(productId);
      if (!product || !candidateObservation || !isObservationComparableToProduct(candidateObservation, product)) return null;
      const candidatePrice = calculateComparisonPrice(candidateObservation, product).value;
      if (!Number.isFinite(candidatePrice) || candidatePrice <= 0) return null;
      const targetDate = candidateObservation.date || today();
      const historical = buildPriceAnalysisEntries(product, getProductObservations(productId))
        .filter((entry) => entry.observation.id !== excludeObservationId)
        .filter((entry) => isNormalBaselineObservation(entry.observation))
        .filter((entry) => isEntryWithinAnalysisWindow(entry, targetDate));
      const baseline = dedupeAnalysisEntries(historical);
      if (baseline.length < PRICE_ANALYSIS_ANOMALY_MIN_BASELINE) return null;
      const values = baseline.map((entry) => entry.unit.value);
      const median = medianOf(values);
      if (!Number.isFinite(median) || median <= 0) return null;
      const differencePct = ((candidatePrice - median) / median) * 100;
      if (Math.abs(differencePct) < PRICE_ANALYSIS_ANOMALY_DIFF_PCT) return null;
      const hasNearbySupport = values.some((value) => Math.abs(value - candidatePrice) / Math.max(candidatePrice, 0.0001) * 100 <= PRICE_ANALYSIS_NEARBY_PCT);
      if (hasNearbySupport) return null;
      return {
        candidatePrice,
        median,
        differencePct,
        baselineCount: baseline.length,
        unitLabel: getComparisonPriceLabel(product)
      };
    }

                <button class="price-anomaly-option is-clearance" type="button" data-anomaly-choice="clearance"><strong>清貨價</strong><span>可顯示抵買程度及歷史最低，但唔會拉低日後正常基準。</span></button>
                <button class="price-anomaly-option" type="button" data-anomaly-choice="excluded"><strong>暫時排除分析</strong><span>保留原始記錄，但唔參與中位數、排名、走勢及歷史最低。</span></button>

    function formatFileSize(bytes) {
      const value = Number(bytes || 0);
      if (!Number.isFinite(value) || value <= 0) return "0 KB";
      if (value < 1024 * 1024) return `${Math.max(1, Math.round(value / 1024))} KB`;
      return `${(value / (1024 * 1024)).toFixed(value < 10 * 1024 * 1024 ? 1 : 0)} MB`;
    }

    function renderFullBackupStatus() {
      const status = state.fullBackupStatus || {};
      const pending = state.pendingFullImport;

      if (pending) {
        const summary = pending.summary || {};
        return `
          <div class="full-backup-status is-success">
            <span class="full-backup-status-title">完整 ZIP 已驗證，可以匯入</span>
            <span class="full-backup-status-detail">${Number(summary.products || 0)} 個產品 · ${Number(summary.observations || 0)} 筆價格 · ${Number(summary.stores || 0)} 間店舖</span>
            <span class="full-backup-status-detail">${Number(summary.productImages || 0)} 張產品圖片 · ${Number(summary.storeImages || 0)} 個 Logo · ${escapeHtml(formatFileSize(summary.totalImageBytes))}</span>
            <span class="full-backup-status-detail">Data checksum 及 ${Number(summary.totalImages || 0)} 張圖片 checksum 已通過。</span>
            ${Number(summary.extraImagesIgnored || 0) ? `<span class="full-backup-status-detail">另有 ${Number(summary.extraImagesIgnored || 0)} 張未被資料引用的圖片，匯入時會忽略。</span>` : ""}
            <div class="button-row">

          </div>
        `;
      }

      if (!status.message) return "";
      const kind = ["progress", "success", "error"].includes(status.kind)
        ? status.kind
        : "progress";
      const progress = Math.max(0, Math.min(100, Number(status.progress || 0)));
      return `
        <div class="full-backup-status is-${kind}">
          <span class="full-backup-status-title">${escapeHtml(status.message)}</span>
          ${status.detail ? `<span class="full-backup-status-detail">${escapeHtml(status.detail)}</span>` : ""}
          ${kind === "progress" ? `<div class="full-backup-progress" style="--full-backup-progress:${progress}%"><span></span></div>` : ""}

    function updateFullBackupPanel() {
      const host = document.querySelector("#fullBackupStatus");
      if (host) host.innerHTML = renderFullBackupStatus();

        .querySelectorAll('[data-action="export-full-zip"], [data-action="choose-full-zip"]')

    function setFullBackupStatus(kind = "", message = "", detail = "", progress = 0) {
      state.fullBackupStatus = { kind, message, detail, progress };
      updateFullBackupPanel();

    function applyDeferredCloudData() {
      const deferred = state.deferredCloudApply;
      state.deferredCloudApply = null;
      if (!deferred) return;
      state.data = dataService.replace(deferred.nextData, { persist: true });
      handleCloudDataApplied(deferred.context);
    }

    function finishFullBackupBusy({ discardDeferred = false } = {}) {
      state.fullBackupBusy = false;
      if (discardDeferred) state.deferredCloudApply = null;
      else applyDeferredCloudData();
      updateFullBackupPanel();
    }

    function fullBackupProgressMessage(progress = {}) {
      if (progress.phase === "collecting-images") {
        return {
          message: "正在收集完整備份圖片…",
          detail: `${Number(progress.current || 0)} / ${Number(progress.total || 0)}`
        };
      }
      if (progress.phase === "creating-zip") {
        return { message: "正在建立 ZIP 備份…", detail: "請保持 App 開啟。" };
      }
      if (progress.phase === "opening-zip") {
        return { message: "正在開啟 ZIP 備份…", detail: "正在檢查檔案結構。" };
      }
      if (progress.phase === "verifying-images") {
        return {
          message: "正在驗證完整備份…",
          detail: `圖片 ${Number(progress.current || 0)} / ${Number(progress.total || 0)}`
        };
      }
      return { message: "正在處理完整備份…", detail: "請保持 App 開啟。" };
    }

    let fullBackupInteractionLocked = false;

    async function runFullBackupInteraction(task) {
      if (state.fullBackupBusy || fullBackupInteractionLocked) return;
      fullBackupInteractionLocked = true;
      state.fullBackupBusy = true;
      updateFullBackupPanel();
      try {
        return await task();
      } finally {
        fullBackupInteractionLocked = false;
      }
    }

    async function exportFullBackup() {
      return runFullBackupInteraction(async () => {
        state.pendingFullImport = null;
        setFullBackupStatus("progress", "正在準備完整 ZIP 備份…", "會先確認所有引用圖片已存於此裝置。", 2);
        const sourceData = JSON.parse(JSON.stringify(state.data));

        try {
          const result = await fullBackupService.exportArchive(
            sourceData,
            { appBuild: APP_BUILD },
            (progress) => {
              const copy = fullBackupProgressMessage(progress);
              setFullBackupStatus("progress", copy.message, copy.detail, progress.percent || 0);
            }
          );

          const url = URL.createObjectURL(result.blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = result.filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(url), 30000);

          const imageCount = Number(result.manifest?.images?.total || 0);
          const imageBytes = Number(result.manifest?.images?.totalBytes || 0);
          finishFullBackupBusy();
          setFullBackupStatus(
            "success",
            "完整 ZIP 備份已匯出。",
            `${imageCount} 張圖片 · ${formatFileSize(imageBytes)} · checksum 已建立。`
          );
          showToast("完整 ZIP 備份已匯出。");
        } catch (error) {
          finishFullBackupBusy();
          const missing = error?.code === "FULL_BACKUP_MISSING_IMAGE";
          setFullBackupStatus(
            "error",
            missing ? "完整備份已停止：有圖片未能取得。" : "未能建立完整 ZIP 備份。",
            error?.message || "請稍後再試。"
          );
          showToast(missing ? "有引用圖片未齊，未有輸出不完整備份。" : "完整 ZIP 備份失敗。");
        }
      });
    }

      if (!input) return;
      input.value = "";
      input.click();

    async function confirmFullBackupImport() {
      if (!state.pendingFullImport || state.fullBackupBusy) return;
      const summary = state.pendingFullImport.summary || {};
      const cloudMessage = state.cloudSync.initialized
        ? "完成後會背景同步，並以備份完整取代 Cloud 現有資料及圖片。"
        : "目前未連接已初始化 Cloud，只會取代此裝置資料。";
      const ok = await showNativeConfirm({
        title: "匯入完整 ZIP？",
        message: `備份包含 ${Number(summary.products || 0)} 個產品、${Number(summary.observations || 0)} 筆價格、${Number(summary.stores || 0)} 間店舖及 ${Number(summary.totalImages || 0)} 張圖片。現有本機資料及圖片會完整取代，不會 merge。${cloudMessage}`,
        confirmLabel: "完整取代"
      });
      if (!ok) return;

      return runFullBackupInteraction(async () => {
        const prepared = state.pendingFullImport;
        let suspended = false;
        let oldImageRecords = null;
        let imagesReplaced = false;
        let localCommitted = false;

        setFullBackupStatus("progress", "正在匯入完整備份…", "正在保存現有資料及準備圖片。", 5);

        try {
          await cloudImageService.suspend("full-backup-import");
          suspended = true;
          oldImageRecords = await imageStore.getAllRecords();

          const importedAt = nowIso();
          const nextImageRecords = prepared.images.map((image) => ({
            logoKey: image.imageKey,
            imageKey: image.imageKey,
            blob: image.blob,
            updatedAt: image.version || importedAt,
            importedAt,
            backupSha256: image.sha256,
            backupType: image.type
          }));

          setFullBackupStatus("progress", "正在匯入完整備份…", `寫入 ${nextImageRecords.length} 張圖片。`, 35);
          await imageStore.replaceAll(nextImageRecords);
          imagesReplaced = true;

          setFullBackupStatus("progress", "正在匯入完整備份…", "正在完整取代產品、價格、店舖及設定。", 65);
          const result = dataService.importAtomically(prepared.data, {
            reason: "before-full-zip-import"
          });
          state.data = result.data;
          localCommitted = true;
          state.pendingFullImport = null;
          revokeAllLogoObjectUrls();

          setFullBackupStatus("progress", "本機完整備份已還原。", "正在建立 Cloud 同步佇列。", 88);
          try {
            cloudSyncService.recordLocalData(state.data);
          } catch (error) {
            console.warn("Full backup text Cloud queue failed:", error);
          }

          if (suspended) {
            try {
              await cloudImageService.resume({ rescan: true, source: "local" });
            } catch (error) {
              console.warn("Full backup image Cloud rescan will retry:", error);
            }
            suspended = false;
          }

          finishFullBackupBusy({ discardDeferred: true });
          setFullBackupStatus(
            "success",
            "完整備份已還原。",
            state.cloudSync.initialized
              ? "本機資料及圖片已完整取代，正背景同步至 Cloud。"
              : "本機資料及圖片已完整取代。"
          );
          showToast(
            state.cloudSync.initialized
              ? "完整備份已還原，正背景同步至 Cloud。"
              : "完整備份已還原。"
          );
          renderHome();
        } catch (error) {
          state.pendingFullImport = null;
          if (!localCommitted && imagesReplaced && Array.isArray(oldImageRecords)) {
            try {
              await imageStore.replaceAll(oldImageRecords);
            } catch (rollbackError) {
              console.error("Full backup image rollback failed:", rollbackError);
            }
          }

          state.data = dataService.getData();
          if (suspended) {
            try {
              await cloudImageService.resume({ rescan: true, source: "local" });
            } catch (resumeError) {
              console.warn("Cloud image resume failed after import error:", resumeError);
            }
          }

          finishFullBackupBusy();
          setFullBackupStatus(
            "error",
            localCommitted ? "本機已還原，但 Cloud 同步需要稍後重試。" : "完整備份匯入失敗，原有資料已保留。",
            error?.message || "未能完成匯入。"
          );
          showToast(localCommitted ? "本機已還原，Cloud 會稍後重試。" : "匯入失敗，原有資料已保留。");
        }
      });
    }

    function cancelFullBackupImport() {
      if (state.fullBackupBusy) return;
      state.pendingFullImport = null;
      state.fullBackupStatus = { kind: "", message: "", detail: "", progress: 0 };
      updateFullBackupPanel();
