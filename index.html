    async function saveProductForm(form) {
      if (state.productImageProcessing) {
        showToast("正在處理圖片…");
        return;
      }

      const formData = new FormData(form);
      const productId = form.dataset.productId;
      const barcode = cleanBarcode(formData.get("barcode"));
      const standardQuantity = Number(formData.get("standardQuantity"));

      if (!formData.get("name") || !formData.get("brand") || !Number.isFinite(standardQuantity) || standardQuantity <= 0) {
        showToast("請填寫所有必填產品資料。");
        return;
      }

      const existingBarcodeProduct = barcode ? findProductByBarcode(barcode) : null;
      if (existingBarcodeProduct && existingBarcodeProduct.id !== productId) {
        showToast("此條碼已經有產品。");
        renderProductDetail(existingBarcodeProduct.id);
        return;
      }

      const timestamp = nowIso();
      const existingProduct = productId ? findProduct(productId) : null;
      const oldProductImageKey = existingProduct?.productImageKey || existingProduct?.imageKey || "";
      let productImageKey = state.removeProductImageOnSave ? "" : oldProductImageKey;
      let productImageUpdatedAt = existingProduct?.productImageUpdatedAt || "";
      const selectedProductImage = state.pendingProductImageBlob;

      if (selectedProductImage) {
        const error = validateProcessedProductImageBlob(selectedProductImage);
        if (error) {
          showToast(error);
          return;
        }

        const newImageKey = uid("product_image");
        try {
          await saveImageBlob(newImageKey, selectedProductImage);
          revokeImageObjectUrl(newImageKey);
          productImageKey = newImageKey;
          productImageUpdatedAt = timestamp;
        } catch (error) {
          showToast("產品圖片未能儲存，但產品文字資料仍會儲存。");
          productImageKey = oldProductImageKey;
          productImageUpdatedAt = existingProduct?.productImageUpdatedAt || "";
        }
      }

      if (state.removeProductImageOnSave) productImageUpdatedAt = "";

      const shouldDeleteOldImage = Boolean(
        oldProductImageKey &&
        (state.removeProductImageOnSave || (selectedProductImage && productImageKey !== oldProductImageKey))
      );

      const payload = {
        barcode,
        brand: String(formData.get("brand") || "").trim(),
        name: String(formData.get("name") || "").trim(),
        variant: String(formData.get("variant") || "").trim(),
        standardQuantity,
        unit: String(formData.get("unit") || "ml"),
        category: String(formData.get("category") || "").trim(),
        notes: String(formData.get("notes") || "").trim(),
        productImageKey,
        productImageUpdatedAt,
        updatedAt: timestamp
      };

      if (productId) {
        const index = state.data.products.findIndex((product) => product.id === productId);
        if (index === -1) return;
        state.data.products[index] = { ...state.data.products[index], ...payload };
        state.data.observations.forEach((observation) => {
          if (observation.productId === productId) observation.barcode = barcode;
        });
        revokePendingProductImagePreview();
        state.removeProductImageOnSave = false;
        saveData();
        if (shouldDeleteOldImage) await removeStoredProductImage(oldProductImageKey);
        showToast("產品已更新。");
        renderProductDetail(productId);
        return;
      }

      const product = {
        id: uid("product"),
        ...payload,
        createdAt: timestamp
      };
      state.data.products.push(product);
      revokePendingProductImagePreview();
      state.removeProductImageOnSave = false;
      saveData();
      if (shouldDeleteOldImage) await removeStoredProductImage(oldProductImageKey);
      showToast("產品已新增，請加入第一筆價格。");
      renderObservationForm(product.id);
    }

    async function removeStoredProductImage(imageKey) {
      try {
        await deleteImageBlob(imageKey);
      } catch (error) {
        // An unreferenced local image does not affect the saved product.
      }
      revokeImageObjectUrl(imageKey);
    }

    function validateLogoFile(file) {
      if (!file || !file.size) return "";
      const extension = file.name.split(".").pop().toLowerCase();
      const isSvg = extension === "svg";
      if (!LOGO_TYPES.includes(file.type) && !isSvg) return "Logo 檔案格式不支援。請使用 PNG、JPG、WEBP 或 SVG。";
      if (file.size > MAX_LOGO_BYTES) return "Logo 檔案太大。請使用 1MB 或以下的圖片。";
      return "";
    }

    function validateProductImageFile(file) {
      if (!file || !file.size) return "無法讀取此相片，請選擇另一張圖片";
      const extension = String(file.name || "").split(".").pop().toLowerCase();
      const type = String(file.type || "").toLowerCase();
      const knownPhotoExtension = ["jpg", "jpeg", "png", "webp", "heic", "heif"].includes(extension);
      if (extension === "svg" || type === "image/svg+xml") return "不支援此圖片格式";
      if (type && !type.startsWith("image/") && !knownPhotoExtension) return "不支援此圖片格式";
      return "";
    }

    function validateProcessedProductImageBlob(blob) {
      if (!blob || !blob.size || !String(blob.type || "").startsWith("image/")) {
        return "圖片處理失敗，請選擇另一張圖片";
      }
      if (blob.size > MAX_PRODUCT_IMAGE_BYTES) {
        return "圖片壓縮後仍然太大，請選擇另一張圖片";
      }
      return "";
    }

    function handleLogoFileChange(input) {
      const file = input.files?.[0];
      revokePendingLogoPreview();
      if (!file) {
        updateLogoPreview(null);
        return;
      }

      const error = validateLogoFile(file);
      if (error) {
        input.value = "";
        showToast(error);
        updateLogoPreview(null);
        return;
      }

      state.pendingLogoFile = file;
      state.pendingLogoPreviewUrl = URL.createObjectURL(file);
      updateLogoPreview(file);
    }

    function updateLogoPreview(file) {
      const preview = document.querySelector("#logoPreview");
      if (!preview) return;
      const storeId = document.querySelector("[data-form='store']")?.dataset.storeId || "";
      const store = findStore(storeId) || {};
      const name = document.querySelector("[name='displayName']")?.value || document.querySelector("[name='storeName']")?.value || storeDisplayName(store) || "店舖";
      const logo = file && state.pendingLogoPreviewUrl
        ? `<span class="store-logo large" aria-hidden="true"><span>${escapeHtml(storeInitials(name))}</span><img src="${escapeHtml(state.pendingLogoPreviewUrl)}" alt=""></span>`
        : renderStoreLogoShell({ ...store, displayName: name, storeName: name }, "large");

      preview.innerHTML = `
        ${logo}
        <span class="helper">${file ? `已選擇：${escapeHtml(file.name)}` : "支援 PNG、JPG、WEBP、SVG，最多 1MB。JSON 備份不包含 Logo 圖片檔。"}</span>
      `;
      hydrateStoreLogos(preview);
    }

    async function handleProductImageFileChange(input) {
      const file = input.files?.[0];
      const processToken = state.productImageProcessToken + 1;
      state.productImageProcessToken = processToken;
      revokePendingProductImagePreview();
      state.removeProductImageOnSave = false;

      if (!file) {
        updateProductImagePreview();
        return;
      }

      const inputError = validateProductImageFile(file);
      if (inputError) {
        input.value = "";
        showToast(inputError);
        updateProductImagePreview({ status: inputError, statusClass: "is-error" });
        return;
      }

      setProductImageProcessing(true);
      updateProductImagePreview({ status: "正在處理圖片…", statusClass: "is-processing" });
      showToast("正在處理圖片…");

      try {
        await nextAnimationFrame();
        const processed = await processProductImage(file);
        if (processToken !== state.productImageProcessToken) return;

        const outputError = validateProcessedProductImageBlob(processed.blob);
        if (outputError) throw new Error(outputError);

        state.pendingProductImageBlob = processed.blob;
        state.pendingProductImageName = file.name || "產品圖片";
        state.pendingProductImagePreviewUrl = URL.createObjectURL(processed.blob);
        input.value = "";
        updateProductImagePreview({ status: "產品圖片已壓縮" });
        showToast("產品圖片已壓縮");
      } catch (error) {
        if (processToken !== state.productImageProcessToken) return;
        input.value = "";
        revokePendingProductImagePreview();
        const message = getProductImageErrorMessage(error);
        updateProductImagePreview({ status: message, statusClass: "is-error" });
        showToast(message);
      } finally {
        if (processToken === state.productImageProcessToken) setProductImageProcessing(false);
      }
    }

    async function processProductImage(file) {
      let decoded;
      try {
        decoded = await decodeProductImage(file);
      } catch (error) {
        throw new Error("無法讀取此相片，請選擇另一張圖片");
      }

      try {
        const useWebp = await supportsProductImageWebp();
        const outputType = useWebp ? "image/webp" : "image/jpeg";
        const qualities = useWebp ? PRODUCT_IMAGE_WEBP_QUALITIES : PRODUCT_IMAGE_JPEG_QUALITIES;

        for (const longEdge of PRODUCT_IMAGE_LONG_EDGES) {
          const dimensions = getProductImageDimensions(decoded.width, decoded.height, longEdge);
          for (const quality of qualities) {
            const blob = await encodeProductImage(decoded.source, dimensions.width, dimensions.height, outputType, quality);
            if (blob && blob.type === outputType && blob.size <= MAX_PRODUCT_IMAGE_BYTES) {
              return { blob, width: dimensions.width, height: dimensions.height, quality };
            }
          }
        }
      } finally {
        decoded.close();
      }

      throw new Error("圖片壓縮後仍然太大，請選擇另一張圖片");
    }

    async function decodeProductImage(file) {
      if (typeof createImageBitmap === "function") {
        try {
          const bitmap = await createImageBitmap(file, { imageOrientation: "from-image" });
          if (bitmap.width > 0 && bitmap.height > 0) {
            return {
              source: bitmap,
              width: bitmap.width,
              height: bitmap.height,
              close: () => bitmap.close?.()
            };
          }
          bitmap.close?.();
        } catch (error) {
          // Safari may decode a camera format through HTMLImageElement instead.
        }
      }

      const objectUrl = URL.createObjectURL(file);
      try {
        const image = await new Promise((resolve, reject) => {
          const element = new Image();
          element.onload = () => resolve(element);
          element.onerror = () => reject(new Error("decode failed"));
          element.src = objectUrl;
        });
        if (!image.naturalWidth || !image.naturalHeight) throw new Error("decode failed");
        return {
          source: image,
          width: image.naturalWidth,
          height: image.naturalHeight,
          close: () => URL.revokeObjectURL(objectUrl)
        };
      } catch (error) {
        URL.revokeObjectURL(objectUrl);
        throw error;
      }
    }

    function getProductImageDimensions(width, height, maxLongEdge) {
      const sourceLongEdge = Math.max(width, height);
      const scale = Math.min(1, maxLongEdge / sourceLongEdge);
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale))
      };
    }

    async function encodeProductImage(source, width, height, type, quality) {
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const context = canvas.getContext("2d", { alpha: false });
      if (!context) throw new Error("圖片處理失敗，請選擇另一張圖片");
      context.fillStyle = "#ffffff";
      context.fillRect(0, 0, width, height);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = "high";
      context.drawImage(source, 0, 0, width, height);
      return canvasToBlob(canvas, type, quality);
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        if (typeof canvas.toBlob !== "function") {
          reject(new Error("圖片處理失敗，請選擇另一張圖片"));
          return;
        }
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("圖片處理失敗，請選擇另一張圖片"));
        }, type, quality);
      });
    }

    async function supportsProductImageWebp() {
      if (typeof productImageWebpSupported === "boolean") return productImageWebpSupported;
      try {
        const canvas = document.createElement("canvas");
        canvas.width = 1;
        canvas.height = 1;
        const blob = await canvasToBlob(canvas, "image/webp", 0.8);
        productImageWebpSupported = blob.type === "image/webp";
      } catch (error) {
        productImageWebpSupported = false;
      }
      return productImageWebpSupported;
    }

    function nextAnimationFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function getProductImageErrorMessage(error) {
      const message = String(error?.message || "");
      if (message.includes("圖片壓縮後仍然太大")) return "圖片壓縮後仍然太大，請選擇另一張圖片";
      if (message.includes("無法讀取此相片")) return "無法讀取此相片，請選擇另一張圖片";
      return "圖片處理失敗，請選擇另一張圖片";
    }

    function setProductImageProcessing(isProcessing) {
      state.productImageProcessing = isProcessing;
      const saveButton = document.querySelector("[data-product-save]");
      const fileInput = document.querySelector("#productImageFile");
      const picker = document.querySelector("#productImagePicker");
      const removeButton = document.querySelector("#removeProductImageButton");
      if (saveButton) saveButton.disabled = isProcessing;
      if (fileInput) fileInput.disabled = isProcessing;
      if (picker) picker.setAttribute("aria-disabled", String(isProcessing));
      if (removeButton) removeButton.disabled = isProcessing;
    }

    function updateProductImagePreview({ status = "", statusClass = "" } = {}) {
      const preview = document.querySelector("#productImagePreview");
      const statusElement = document.querySelector("#productImageStatus");
      const pickerText = document.querySelector("#productImagePickerText");
      const removeButton = document.querySelector("#removeProductImageButton");
      if (!preview) return;

      const form = document.querySelector("[data-form='product']");
      const productId = form?.dataset.productId || "";
      const existing = findProduct(productId) || {};
      const draft = {
        ...existing,
        brand: form?.querySelector('[name="brand"]')?.value || existing.brand || "",
        name: form?.querySelector('[name="name"]')?.value || existing.name || "",
        productImageKey: state.removeProductImageOnSave ? "" : existing.productImageKey || existing.imageKey || ""
      };
      const hasPendingImage = Boolean(state.pendingProductImageBlob && state.pendingProductImagePreviewUrl);
      const hasExistingImage = Boolean(draft.productImageKey);
      const hasVisibleImage = hasPendingImage || hasExistingImage;
      const image = hasPendingImage
        ? `<span class="product-image preview has-loaded-image" data-action="view-product-image" role="button" tabindex="0" aria-label="查看產品圖片"><span class="product-image-fallback">${escapeHtml(productInitials(draft))}</span><img src="${escapeHtml(state.pendingProductImagePreviewUrl)}" alt=""></span>`
        : renderProductImageShell(draft, "preview");

      preview.innerHTML = image;
      if (statusElement) {
        statusElement.textContent = status || (hasVisibleImage ? "已加入產品圖片" : "未有產品圖片");
        statusElement.className = `product-image-upload-status${statusClass ? ` ${statusClass}` : ""}`;
      }
      if (pickerText) pickerText.textContent = hasVisibleImage ? "更換圖片" : "加入圖片";
      if (removeButton) removeButton.hidden = !hasVisibleImage;
      hydrateProductImages(preview);
    }

    function removeProductImage(productId) {
      state.productImageProcessToken += 1;
      state.productImageProcessing = false;
      revokePendingProductImagePreview();
      state.removeProductImageOnSave = true;
      const input = document.querySelector("[name='productImageFile']");
      if (input) input.value = "";
      setProductImageProcessing(false);
      updateProductImagePreview({ status: "未有產品圖片" });
      showToast("已標記移除產品圖片，儲存產品後生效。");
    }

    async function saveStoreForm(form) {
      const formData = new FormData(form);
      const storeId = form.dataset.storeId;
      const storeName = String(formData.get("storeName") || "").trim();
      const displayName = String(formData.get("displayName") || "").trim() || storeName;

      if (!storeName) {
        showToast("請輸入店舖名稱。");
        return;
      }

      const duplicate = state.data.stores.find((store) =>
        store.storeId !== storeId &&
        (normalizeStoreName(store.storeName) === normalizeStoreName(storeName) ||
          normalizeStoreName(store.displayName) === normalizeStoreName(displayName))
      );
      if (duplicate) {
        showToast("已有相同名稱的店舖。");
        return;
      }

      const timestamp = nowIso();
      const existing = storeId ? findStore(storeId) : null;
      const store = {
        storeId: existing?.storeId || uid("store"),
        storeName,
        displayName,
        countryOrRegion: String(formData.get("countryOrRegion") || "Hong Kong"),
        storeType: String(formData.get("storeType") || "Physical store"),
        defaultCurrency: String(formData.get("defaultCurrency") || "HKD"),
        logoKey: existing?.logoKey || "",
        notes: String(formData.get("notes") || "").trim(),
        createdAt: existing?.createdAt || timestamp,
        updatedAt: timestamp
      };

      const selectedFile = state.pendingLogoFile;
      if (selectedFile) {
        const error = validateLogoFile(selectedFile);
        if (error) {
          showToast(error);
          return;
        }

        const logoKey = store.logoKey || uid("logo");
        try {
          await saveLogoBlob(logoKey, selectedFile);
          revokeLogoObjectUrl(logoKey);
          store.logoKey = logoKey;
        } catch (error) {
          showToast("Logo 未能儲存，但店舖文字資料仍會儲存。");
          store.logoKey = existing?.logoKey || "";
        }
      }

      const index = state.data.stores.findIndex((item) => item.storeId === store.storeId);
      if (index >= 0) {
        state.data.stores[index] = { ...state.data.stores[index], ...store };
      } else {
        state.data.stores.push(store);
      }

      revokePendingLogoPreview();
      saveData();
      showToast("店舖已儲存。");
      renderStoreManagement();
    }

    function countStoreObservations(store) {
      if (!store) return 0;
      const names = [store.storeName, store.displayName].map(normalizeStoreName).filter(Boolean);
      return state.data.observations.filter((observation) =>
        observation.storeId === store.storeId ||
        names.includes(normalizeStoreName(observation.storeNameSnapshot || observation.store))
      ).length;
    }

    async function removeStoreLogo(storeId) {
      if (!storeId) {
        revokePendingLogoPreview();
        const input = document.querySelector("[name='logoFile']");
        if (input) input.value = "";
        updateLogoPreview(null);
        showToast("已清除已選 Logo。");
        return;
      }

      const store = findStore(storeId);
      if (!store?.logoKey) {
        showToast("此店舖未有 Logo。");
        return;
      }

      const logoKey = store.logoKey;
      try {
        await deleteLogoBlob(logoKey);
      } catch (error) {
        showToast("Logo 圖片未能刪除，請稍後再試。");
        return;
      }
      revokeLogoObjectUrl(logoKey);
      store.logoKey = "";
      store.updatedAt = nowIso();
      saveData();
      showToast("Logo 已移除。");
      renderStoreForm(store);
    }

    async function deleteStore(storeId) {
      const store = findStore(storeId);
      if (!store) return;
      const usedCount = countStoreObservations(store);
      const message = usedCount
        ? `此店舖已有 ${usedCount} 筆價格記錄。刪除店舖不會刪除價格記錄，舊記錄會繼續顯示原本店舖文字。確定刪除？`
        : "確定刪除此店舖？";
      if (!window.confirm(message)) return;

      const logoKey = store.logoKey;
      state.data.stores = state.data.stores.filter((item) => item.storeId !== storeId);
      saveData();
      if (logoKey) {
        try {
          await deleteLogoBlob(logoKey);
        } catch (error) {
          // Text data is already deleted; stale logo blobs are harmless and can be replaced later.
        }
        revokeLogoObjectUrl(logoKey);
      }
      showToast("店舖已刪除，價格記錄已保留。");
      renderStoreManagement();
    }

    function renderProductDetail(productId) {
      const product = findProduct(productId);
      if (!product) {
        showToast("找不到產品。");
        renderHome();
        return;
      }

      const stats = getStats(product.id);
      const observations = getProductObservations(product.id);
      const hero = getHeroSummary(stats, observations.length);

      setView(`
        <section class="section" style="margin-top:14px;">
          <div class="detail-head">
            ${renderProductImageShell(product, "detail")}
            <div class="detail-head-text">
              <h2 class="detail-title">${escapeHtml(productTitle(product))}</h2>
              <p class="detail-subtitle">${escapeHtml(product.variant || product.category || "")}</p>
            </div>
          </div>

          <div class="hero hero-${hero.statusKey}">
            <div class="hero-top">
              <div>
                <div class="hero-label">最新單位價</div>
                <div class="hero-value">${formatUnitPrice(stats.latestUnitPrice, stats.unitLabel)}</div>
              </div>
              <span class="hero-badge">${escapeHtml(hero.badgeLabel)}</span>
            </div>
            <div class="hero-divider"></div>
            <div class="hero-range">
              <div class="hero-range-dot" style="left:${hero.rangePct}%;"></div>
            </div>
            <div class="hero-range-labels">
              <span>最平 ${formatUnitPrice(stats.lowest, stats.unitLabel)}</span>
              <span>最貴 ${formatUnitPrice(stats.highest, stats.unitLabel)}</span>
            </div>
            <div class="hero-delta">${escapeHtml(hero.deltaText)}</div>
          </div>

          <p class="summary-line">
            最新價 ${stats.latest ? moneyWithCurrency(getDisplayedPrice(stats.latest), getObservationCurrency(stats.latest)) : "未有資料"}
            ${stats.latest ? ` · ${renderStoreInline(stats.latest)} · ${escapeHtml(formatDate(stats.latest.date))}` : ""}
          </p>
          ${stats.latest ? renderStalenessNote(stats.latest.date) : ""}

          <div class="button-row" style="margin-bottom:18px;">
            <button class="btn-primary" type="button" data-action="add-observation" data-product-id="${escapeHtml(product.id)}">新增價格記錄</button>
            <button class="btn-plain" type="button" data-action="edit-product" data-product-id="${escapeHtml(product.id)}" style="flex:0 0 auto;">編輯</button>
          </div>

          <details class="more-stats">
            <summary class="more-stats-summary">更多資料</summary>
            <div class="notice">
              ${product.barcode ? `條碼：${escapeHtml(product.barcode)}<br>` : "未有條碼<br>"}
              規格：${escapeHtml(product.standardQuantity)} ${escapeHtml(product.unit)}<br>
              類別：${escapeHtml(product.category || "未分類")}
              ${product.notes ? `<br>一般備註：${escapeHtml(product.notes)}` : ""}
            </div>
            <div class="stats-grid">
              ${renderStat("歷史最高", formatUnitPrice(stats.highest, stats.unitLabel))}
              ${renderStat("平均價格", formatUnitPrice(stats.average, stats.unitLabel))}
              ${renderStat("記錄數量", `${observations.length}`)}
            </div>
            <button class="btn-danger btn-sm" type="button" data-action="delete-product" data-product-id="${escapeHtml(product.id)}" style="width:100%;margin-top:12px;">刪除產品</button>
          </details>
        </section>

        <section class="section">
          <div class="section-header">
            <h2 class="section-title">價格歷史</h2>
          </div>
          ${observations.length ? `<div class="product-list">${observations.map((observation) => renderObservationCard(product, observation, stats, observations.length)).join("")}</div>` : `<div class="empty">未有價格記錄。</div>`}
        </section>
      `, null, { title: productTitle(product), back: renderHome, tab: "home", refresh: () => renderProductDetail(productId) });
    }

    // Display-only summary for the detail hero. Reads existing stats; changes no calculation.
    function getHeroSummary(stats, observationCount) {
      const hasEnoughHistory = observationCount >= 3;
      const statusKey = hasEnoughHistory ? stats.status : "normal";
      const badgeLabel = hasEnoughHistory
        ? { new: "新記錄", cheap: "抵買", normal: "大約平時", expensive: "偏貴" }[stats.status] || "新記錄"
        : "資料尚少";

      const diffPct = Number.isFinite(stats.latestUnitPrice) && Number.isFinite(stats.lowest) && stats.lowest > 0
        ? ((stats.latestUnitPrice - stats.lowest) / stats.lowest) * 100
        : Number.NaN;

      const deltaText = !hasEnoughHistory
        ? `暫時得 ${observationCount} 筆記錄，未有足夠比較`
        : !Number.isFinite(diffPct)
          ? "未有比較資料"
          : diffPct <= 2
            ? "與歷史最低價相若"
            : `貴 ${diffPct.toFixed(0)}%`;

      let rangePct = 50;
      if (Number.isFinite(stats.lowest) && Number.isFinite(stats.highest) && stats.highest > stats.lowest && Number.isFinite(stats.latestUnitPrice)) {
        rangePct = Math.max(4, Math.min(96, ((stats.latestUnitPrice - stats.lowest) / (stats.highest - stats.lowest)) * 100));
      }

      return { statusKey, badgeLabel, deltaText, rangePct };
    }

    function renderStat(label, value) {
      return `
        <div class="stat">
          <span class="stat-label">${escapeHtml(label)}</span>
          <span class="stat-value">${escapeHtml(value)}</span>
        </div>
      `;
    }

    function renderStatHtml(label, valueHtml) {
      return `
        <div class="stat">
          <span class="stat-label">${escapeHtml(label)}</span>
          <span class="stat-value">${valueHtml}</span>
        </div>
      `;
    }

    function renderStatusBadge(status) {
      const map = {
        new: ["新記錄", "status-new"],
        cheap: ["抵買", "status-cheap"],
        normal: ["大約平時", "status-normal"],
        expensive: ["偏貴", "status-expensive"]
      };
      const [label, className] = map[status] || map.new;
      return `<span class="status ${className}">${label}</span>`;
    }

    function renderStatusText(stats) {
      const label = {
        new: "新記錄",
        cheap: "抵買",
        normal: "普通",
        expensive: "偏貴"
      }[stats.status] || "新記錄";
      return `${label}: ${stats.reason}`;
    }

    function formatObservationOriginalPriceLine(observation) {
      const currency = getObservationCurrency(observation);
      const dealType = getDealType(observation);
      if (["bundle", "custom"].includes(dealType)) {
        return `${moneyWithCurrency(getTotalAmountPaid(observation), currency)} / ${getItemsReceived(observation)} 件`;
      }
      if (dealType === "b1g1" || dealType === "second-half") {
        return `${moneyWithCurrency(getDisplayedPrice(observation), currency)} / 2 件`;
      }
      return moneyWithCurrency(getDisplayedPrice(observation), currency);
    }

    function renderObservationCard(product, observation, stats, count) {
      const hkdUnit = calculateHKDUnitPrice(observation);
      const dealType = getDealType(observation);
      const dealLabel = getDealTypeLabel(dealType);
      const rowStatus = getPriceStatus(count, hkdUnit.value, stats.lowest, stats.average).status;
      return `
        <button class="card-row" type="button" data-action="edit-observation" data-product-id="${escapeHtml(product.id)}" data-observation-id="${escapeHtml(observation.id)}">
          <div class="history-row">
            <div class="history-meta">
              <span class="history-date">${escapeHtml(formatDate(observation.date))}</span>
              <span class="history-store-line">
                ${renderStoreInline(observation)}
                ${dealType !== "normal" ? `<span class="deal-tag">· ${escapeHtml(dealLabel)}</span>` : ""}
              </span>
            </div>
            <div class="history-price">
              <span class="history-unit-price-line">${renderRowPriceTag(rowStatus)}<span class="history-unit-price">${formatUnitPrice(hkdUnit.value, hkdUnit.label)}</span></span>
              <span class="history-original">${formatObservationOriginalPriceLine(observation)}</span>
            </div>
          </div>
        </button>
      `;
    }

    function renderRowPriceTag(status) {
      if (status === "cheap") return `<span class="price-tag price-tag-cheap">抵買</span>`;
      if (status === "expensive") return `<span class="price-tag price-tag-expensive">偏貴</span>`;
      return "";
    }

    function getStoreUsage(store) {
      if (!store) return { count: 0, latestDate: "" };
      const names = [store.storeName, store.displayName].map(normalizeStoreName).filter(Boolean);
      const matches = state.data.observations.filter((observation) =>
        observation.storeId === store.storeId ||
        names.includes(normalizeStoreName(observation.storeNameSnapshot || observation.store))
      );
      return {
        count: matches.length,
        latestDate: matches.map((item) => item.date || item.createdAt || "").sort().at(-1) || ""
      };
    }

    function getCommonStoreChoices(selectedStoreId = "") {
      return [...state.data.stores].sort((a, b) => {
        if (a.storeId === selectedStoreId) return -1;
        if (b.storeId === selectedStoreId) return 1;
        const usageA = getStoreUsage(a);
        const usageB = getStoreUsage(b);
        if (usageA.count !== usageB.count) return usageB.count - usageA.count;
        const latestDiff = String(usageB.latestDate).localeCompare(String(usageA.latestDate));
        if (latestDiff !== 0) return latestDiff;
        return storeDisplayName(a).localeCompare(storeDisplayName(b), "zh-Hant");
      });
    }

    const TOP_STORE_CHOICE_COUNT = 6;

    function renderObservationStoreChoice(store, selectedStoreId, isExtra = false) {
      const name = storeDisplayName(store);
      return `
        <button class="store-choice${store.storeId === selectedStoreId ? " is-selected" : ""}" type="button" data-action="select-observation-store" data-store-id="${escapeHtml(store.storeId)}" data-store-name="${escapeHtml(name.toLowerCase())}" data-extra="${isExtra ? "true" : "false"}"${isExtra ? " hidden" : ""}>
          ${renderStoreLogoShell(store, "small")}
          <span class="store-choice-content">
            <span class="store-name">${escapeHtml(name)}</span>
            <span class="store-meta">${escapeHtml(renderStoreMeta(store))}</span>
          </span>
        </button>
      `;
    }

    function renderSelectedObservationStore(store, fallbackName = "") {
      if (store) {
        return `
          ${renderStoreInline(store)}
          <span class="store-meta">${escapeHtml(renderStoreMeta(store))}</span>
        `;
      }
      const cleanName = String(fallbackName || "").trim();
      if (!cleanName) return `<span class="muted">未選擇店舖</span>`;
      return `
        ${renderStoreInline({ storeName: cleanName, displayName: cleanName })}
        <span class="store-meta">香港 · HKD</span>
      `;
    }

    function selectObservationStore(storeId) {
      const store = findStore(storeId);
      if (!store) return;
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const storeIdInput = form.querySelector('[name="storeId"]');
      const storeInput = form.querySelector('[name="store"]');
      const countryInput = form.querySelector('[name="countryOrRegionSnapshot"]');
      const currencyInput = form.querySelector('[name="currency"]');
      if (storeIdInput) storeIdInput.value = store.storeId;
      if (storeInput) storeInput.value = storeDisplayName(store);
      if (countryInput) countryInput.value = store.countryOrRegion || "Hong Kong";
      if (currencyInput) currencyInput.value = store.defaultCurrency || "HKD";
      form.querySelectorAll(".store-choice").forEach((button) => {
        button.classList.toggle("is-selected", button.dataset.storeId === store.storeId);
      });
      const selected = form.querySelector("#selectedObservationStore");
      if (selected) {
        selected.innerHTML = `
          <span class="helper">已選擇</span>
          ${renderSelectedObservationStore(store)}
        `;
        hydrateStoreLogos(selected);
      }
      updateObservationCurrencyFields(store.defaultCurrency || "HKD");
      const manual = form.querySelector("#manualStoreEntry");
      if (manual) manual.hidden = true;
      updateObservationPreview();
    }

    function showManualStoreInput() {
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const manual = form.querySelector("#manualStoreEntry");
      const storeInput = form.querySelector('[name="store"]');
      const storeIdInput = form.querySelector('[name="storeId"]');
      const countryInput = form.querySelector('[name="countryOrRegionSnapshot"]');
      const currencyInput = form.querySelector('[name="currency"]');
      if (manual) manual.hidden = false;
      if (storeIdInput) storeIdInput.value = "";
      if (countryInput) countryInput.value = "Hong Kong";
      if (currencyInput) currencyInput.value = "HKD";
      form.querySelectorAll(".store-choice").forEach((button) => button.classList.remove("is-selected"));
      if (storeInput) {
        storeInput.focus();
        storeInput.select();
      }
      handleManualStoreInput();
    }

    function handleManualStoreInput() {
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const storeInput = form.querySelector('[name="store"]');
      const storeIdInput = form.querySelector('[name="storeId"]');
      const countryInput = form.querySelector('[name="countryOrRegionSnapshot"]');
      const currencyInput = form.querySelector('[name="currency"]');
      if (!storeInput) return;
      const matchingStore = findStoreByName(storeInput.value);
      if (storeIdInput) storeIdInput.value = matchingStore?.storeId || "";
      if (countryInput) countryInput.value = matchingStore?.countryOrRegion || "Hong Kong";
      if (currencyInput) currencyInput.value = matchingStore?.defaultCurrency || "HKD";
      form.querySelectorAll(".store-choice").forEach((button) => {
        button.classList.toggle("is-selected", Boolean(matchingStore && button.dataset.storeId === matchingStore.storeId));
      });
      const selected = form.querySelector("#selectedObservationStore");
      if (selected) {
        selected.innerHTML = `
          <span class="helper">${matchingStore ? "已選擇" : "手動輸入"}</span>
          ${renderSelectedObservationStore(matchingStore, storeInput.value)}
        `;
        hydrateStoreLogos(selected);
      }
      updateObservationCurrencyFields(matchingStore?.defaultCurrency || "HKD");
    }

    function updateObservationCurrencyHint(currency) {
      const hint = document.querySelector("#observationCurrencyHint");
      if (hint) hint.textContent = currency || "HKD";
    }

    function updateObservationCurrencyFields(currency) {
      const form = document.querySelector('[data-form="observation"]');
      if (!form) return;
      const cleanCurrency = String(currency || "HKD");
      const currencyInput = form.querySelector('[name="currency"]');
      const exchangeField = form.querySelector("[data-currency-field='exchange']");
      const exchangeInput = form.querySelector('[name="exchangeRateToHKD"]');
      const priceInput = form.querySelector('[name="price"]');
      const totalInput = form.querySelector('[name="totalAmountPaid"]');
      if (currencyInput) currencyInput.value = cleanCurrency;
      if (priceInput) priceInput.placeholder = cleanCurrency;
      if (totalInput) totalInput.placeholder = cleanCurrency;
      if (exchangeField) exchangeField.hidden = cleanCurrency === "HKD";
      if (exchangeInput) {
        if (cleanCurrency === "HKD") {
          exchangeInput.value = "1";
        } else if (!exchangeInput.value || exchangeInput.value === "1") {
          exchangeInput.value = "";
        }
      }
      updateObservationCurrencyHint(cleanCurrency);
    }

    function filterObservationStores(query) {
      const normalized = normalizeStoreName(query);
      document.querySelectorAll(".store-choice").forEach((button) => {
        const name = normalizeStoreName(button.dataset.storeName);
        if (normalized) {
          button.hidden = !name.includes(normalized);
          return;
        }
        button.hidden = button.dataset.extra === "true" && !state.showAllObservationStores;
      });
    }

    function toggleAllObservationStores() {
      state.showAllObservationStores = true;
      const toggleButton = document.querySelector("#toggleAllObservationStores");
      if (toggleButton) toggleButton.hidden = true;
      const searchInput = document.querySelector("#observationStoreSearch");
      filterObservationStores(searchInput ? searchInput.value : "");
    }

    function getObservationPricingFromForm(formData) {
      const dealType = normalizeDealType(formData.get("dealType"));
      const displayedPriceText = String(formData.get("price") || "").trim();
      const totalAmountPaidText = String(formData.get("totalAmountPaid") || "").trim();
      const itemsReceivedText = String(formData.get("itemsReceived") || "").trim();
      const discountPercentageText = String(formData.get("discountPercentage") || "").trim();
      const discountAmountText = String(formData.get("discountAmount") || "").trim();
      const inputDisplayedPrice = displayedPriceText ? Number(displayedPriceText) : Number.NaN;
      const inputTotalAmountPaid = totalAmountPaidText ? Number(totalAmountPaidText) : Number.NaN;
      const inputItemsReceived = itemsReceivedText ? Number(itemsReceivedText) : Number.NaN;
      const discountPercentage = discountPercentageText ? Number(discountPercentageText) : null;
      const discountAmount = discountAmountText ? Number(discountAmountText) : null;
      const needsDisplayedPrice = ["normal", "b1g1", "second-half", "percentage", "fixed"].includes(dealType);
      const needsTotalAndItems = ["bundle", "custom"].includes(dealType);

      let displayedPrice = inputDisplayedPrice;
      let totalAmountPaid = Number.isFinite(inputTotalAmountPaid) ? inputTotalAmountPaid : inputDisplayedPrice;
      let itemsReceived = Number.isFinite(inputItemsReceived) ? inputItemsReceived : 1;

      if (dealType === "b1g1") {
        totalAmountPaid = inputDisplayedPrice;
        itemsReceived = 2;
      }

      if (dealType === "second-half") {
        totalAmountPaid = inputDisplayedPrice * 1.5;
        itemsReceived = 2;
      }

      if (needsTotalAndItems && !Number.isFinite(displayedPrice) && Number.isFinite(inputTotalAmountPaid)) {
        displayedPrice = inputTotalAmountPaid;
      }

      return {
        dealType,
        displayedPrice,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount,
        needsDisplayedPrice,
        needsTotalAndItems
      };
    }

    function updateObservationPreview() {
      const form = document.querySelector('[data-form="observation"]');
      const preview = document.querySelector("#observationPreview");
      if (!form || !preview) return;
      const formData = new FormData(form);
      const pricing = getObservationPricingFromForm(formData);
      const quantity = Number(formData.get("quantity"));
      const unit = String(formData.get("unit") || "");
      const currency = String(formData.get("currency") || "HKD");
      const exchangeRateToHKD = currency === "HKD" ? 1 : Number(formData.get("exchangeRateToHKD"));
      const previewObservation = {
        price: pricing.displayedPrice,
        displayedPrice: pricing.displayedPrice,
        dealType: pricing.dealType,
        totalAmountPaid: pricing.totalAmountPaid,
        itemsReceived: pricing.itemsReceived,
        discountPercentage: pricing.discountPercentage,
        discountAmount: pricing.discountAmount
      };
      const effectiveItemPrice = calculateEffectiveItemPriceOriginalCurrency(previewObservation);
      const originalUnitPrice = calculateUnitPriceFromItemPrice(effectiveItemPrice, quantity, unit);
      const hkdItemPrice = Number.isFinite(exchangeRateToHKD) && exchangeRateToHKD > 0 ? effectiveItemPrice * exchangeRateToHKD : Number.NaN;
      const hkdUnitPrice = calculateUnitPriceFromItemPrice(hkdItemPrice, quantity, unit);
      preview.innerHTML = `
        <div>
          <span class="helper">原幣優惠後每件價</span>
          <span class="preview-value">${moneyWithCurrency(effectiveItemPrice, currency)}</span>
        </div>
        <div>
          <span class="helper">原幣優惠後單位價</span>
          <span class="preview-value">${formatUnitPriceWithCurrency(originalUnitPrice.value, originalUnitPrice.label, currency)}</span>
        </div>
        <div>
          <span class="helper">折合港幣每件價</span>
          <span class="preview-value">${moneyWithCurrency(hkdItemPrice, "HKD")}</span>
        </div>
        <div>
          <span class="helper">折合港幣單位價</span>
          <span class="preview-value">${formatUnitPrice(hkdUnitPrice.value, hkdUnitPrice.label)}</span>
        </div>
      `;

      const mismatchBox = document.querySelector("#specMismatchWarning");
      if (mismatchBox) {
        const product = findProduct(form.dataset.productId);
        const specMismatch = Boolean(
          product &&
          Number.isFinite(quantity) &&
          quantity > 0 &&
          (quantity !== Number(product.standardQuantity) || unit !== product.unit)
        );
        mismatchBox.innerHTML = specMismatch
          ? `<p class="notice danger-note">⚠ 呢次容量／單位（${escapeHtml(String(quantity))} ${escapeHtml(unit)}）同呢件產品嘅規格（${escapeHtml(String(product.standardQuantity))} ${escapeHtml(product.unit)}）唔同。如果唔係刻意，麻煩檢查清楚，否則會影響單位價比較同歷史最低嘅準確度。</p>`
          : "";
      }
    }

      const totalAmountPaid = getTotalAmountPaid(safeObservation, displayedPrice);
      const itemsReceived = getItemsReceived(safeObservation);
      const discountPercentage = getDiscountPercentage(safeObservation);
      const discountAmount = getDiscountAmount(safeObservation);
      const currentStoreName = getObservationStoreName(safeObservation);
      const selectedStore = safeObservation.storeId ? findStore(safeObservation.storeId) : findStoreByName(currentStoreName);

                ` : ""}

              <input name="storeId" type="hidden" value="${escapeHtml(selectedStoreId)}">
              <div class="button-row">

              <label>
                優惠備註
                <input name="promotionNotes" type="text" autocomplete="off" value="${escapeHtml(safeObservation.promotionNotes || "")}" placeholder="例如 會員價">
              </label>
              <label>
                信用卡／付款備註
                <input name="paymentNotes" type="text" autocomplete="off" value="${escapeHtml(safeObservation.paymentNotes || "")}" placeholder="例如 滙豐 Red 4%">
              </label>
              <label>
                一般備註
                <textarea name="generalNotes">${escapeHtml(safeObservation.generalNotes || "")}</textarea>
              </label>
            </section>
            <div class="button-row">
              <button class="btn-primary" type="submit">儲存價格記錄</button>
              <button class="btn-plain" type="button" data-action="open-product" data-product-id="${escapeHtml(product.id)}">取消</button>
            </div>
            ${isEdit ? `
            <div class="button-row">
              <button class="btn-danger" type="button" data-action="delete-observation" data-product-id="${escapeHtml(product.id)}" data-observation-id="${escapeHtml(safeObservation.id)}">刪除呢筆價格記錄</button>
            </div>
            ` : ""}
          </form>
        </section>
      `, () => {
        updateDealFieldVisibility();
        updateObservationCurrencyFields(document.querySelector('[name="currency"]')?.value || "HKD");
        updateObservationPreview();
      }, {
        title: isEdit ? "編輯價格記錄" : "新增價格記錄",
        back: () => renderProductDetail(product.id),
        tab: "home"
      });
    }

    function saveObservationForm(form) {
      const formData = new FormData(form);
      const productId = form.dataset.productId;
      const observationId = form.dataset.observationId;
      const product = findProduct(productId);
      const quantity = Number(formData.get("quantity"));
      const dealType = normalizeDealType(formData.get("dealType"));
      const displayedPriceText = String(formData.get("price") || "").trim();
      const totalAmountPaidText = String(formData.get("totalAmountPaid") || "").trim();
      const itemsReceivedText = String(formData.get("itemsReceived") || "").trim();
      const discountPercentageText = String(formData.get("discountPercentage") || "").trim();
      const discountAmountText = String(formData.get("discountAmount") || "").trim();
      const typedStoreName = String(formData.get("store") || "").trim();
      const selectedStoreId = String(formData.get("storeId") || "").trim();
      const inputCountrySnapshot = String(formData.get("countryOrRegionSnapshot") || "").trim();
      const inputCurrency = String(formData.get("currency") || "").trim() || "HKD";
      const exchangeRateText = String(formData.get("exchangeRateToHKD") || "").trim();
      const inputExchangeRateToHKD = inputCurrency === "HKD" ? 1 : Number(exchangeRateText);
      const inputDisplayedPrice = displayedPriceText ? Number(displayedPriceText) : Number.NaN;
      const inputTotalAmountPaid = totalAmountPaidText ? Number(totalAmountPaidText) : Number.NaN;
      const inputItemsReceived = itemsReceivedText ? Number(itemsReceivedText) : Number.NaN;
      const discountPercentage = discountPercentageText ? Number(discountPercentageText) : null;
      const discountAmount = discountAmountText ? Number(discountAmountText) : null;
      const needsDisplayedPrice = ["normal", "b1g1", "second-half", "percentage", "fixed"].includes(dealType);
      const needsTotalAndItems = ["bundle", "custom"].includes(dealType);

      let displayedPrice = inputDisplayedPrice;
      let totalAmountPaid = Number.isFinite(inputTotalAmountPaid) ? inputTotalAmountPaid : inputDisplayedPrice;
      let itemsReceived = Number.isFinite(inputItemsReceived) ? inputItemsReceived : 1;

      if (dealType === "b1g1") {
        totalAmountPaid = inputDisplayedPrice;
        itemsReceived = 2;
      }

      if (dealType === "second-half") {
        totalAmountPaid = inputDisplayedPrice * 1.5;
        itemsReceived = 2;
      }

      if (needsTotalAndItems && !Number.isFinite(displayedPrice) && Number.isFinite(inputTotalAmountPaid)) {
        displayedPrice = inputTotalAmountPaid;
      }

      if (!product) {
        showToast("找不到產品。");
        renderHome();
        return;
      }

      if (!typedStoreName || !Number.isFinite(quantity) || quantity <= 0 || !formData.get("date")) {
        showToast("請填寫所有必填價格資料。");
        return;
      }

      if (needsDisplayedPrice && (!Number.isFinite(displayedPrice) || displayedPrice <= 0)) {
        showToast("請輸入單件原價。");
        return;
      }

      if (needsTotalAndItems && (!Number.isFinite(totalAmountPaid) || totalAmountPaid <= 0 || !Number.isFinite(itemsReceived) || itemsReceived <= 0)) {
        showToast("套裝價或自訂優惠需要優惠總價及實際件數。");
        return;
      }

      if (dealType === "percentage" && (!Number.isFinite(discountPercentage) || discountPercentage < 0 || discountPercentage > 100)) {
        showToast("請輸入 0 至 100 的折扣百分比。");
        return;
      }

      if (dealType === "fixed" && (!Number.isFinite(discountAmount) || discountAmount < 0)) {
        showToast("請輸入固定折扣金額。");
        return;
      }

      if (!["HKD", "JPY", "Other"].includes(inputCurrency)) {
        showToast("請選擇貨幣。");
        return;
      }

      if (!Number.isFinite(inputExchangeRateToHKD) || inputExchangeRateToHKD <= 0) {
        showToast("請輸入有效的兌港幣匯率。");
        return;
      }

      const effectiveItemPrice = calculateEffectiveItemPrice({
        price: displayedPrice,
        displayedPrice,
        dealType,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount
      });
      if (!Number.isFinite(effectiveItemPrice) || effectiveItemPrice <= 0) {
        showToast("優惠後價格必須大於 0。");
        return;
      }

      const timestamp = nowIso();
      const selectedStore = findStore(selectedStoreId) || findStoreByName(typedStoreName) || ensureStoreForObservation(typedStoreName);
      const storeNameSnapshot = selectedStore ? storeDisplayName(selectedStore) : typedStoreName;
      const countryOrRegionSnapshot = selectedStore?.countryOrRegion || inputCountrySnapshot || "Hong Kong";
      const currency = inputCurrency || selectedStore?.defaultCurrency || "HKD";
      const currencySnapshot = currency;
      const payload = {
        productId,
        barcode: product.barcode,
        store: storeNameSnapshot,
        storeId: selectedStore?.storeId || "",
        storeNameSnapshot,
        countryOrRegionSnapshot,
        currency,
        currencySnapshot,
        exchangeRateToHKD: inputExchangeRateToHKD,
        price: displayedPrice,
        displayedPrice,
        dealType,
        totalAmountPaid,
        itemsReceived,
        discountPercentage,
        discountAmount,
        quantity,
        unit: String(formData.get("unit") || product.unit),
        date: String(formData.get("date") || today()),
        taxIncluded: String(formData.get("taxIncluded") || "").trim(),
        locationNotes: String(formData.get("locationNotes") || "").trim(),
        promotionNotes: String(formData.get("promotionNotes") || "").trim(),
        paymentNotes: String(formData.get("paymentNotes") || "").trim(),
        generalNotes: String(formData.get("generalNotes") || "").trim(),
        updatedAt: timestamp
      };

      if (observationId) {
        const index = state.data.observations.findIndex((observation) => observation.id === observationId);
        if (index === -1) return;
        state.data.observations[index] = { ...state.data.observations[index], ...payload };
      } else {
        state.data.observations.push({
          id: uid("observation"),
          ...payload,
          createdAt: timestamp
        });
      }

      product.updatedAt = timestamp;
      saveData();
      showToast("價格記錄已儲存。");
      renderProductDetail(productId);
    }

    function normalizeDealType(value) {
      const dealType = String(value || "normal");
      return DEAL_TYPES.some(([type]) => type === dealType) ? dealType : "normal";
    }

    function getDealType(observation) {
      return normalizeDealType(observation.dealType);
    }

    function getDealTypeLabel(dealType) {
      return DEAL_TYPES.find(([value]) => value === dealType)?.[1] || "普通價";
    }

    function getDisplayedPrice(observation) {
      const displayedPrice = Number(observation.displayedPrice);
      if (Number.isFinite(displayedPrice) && displayedPrice > 0) return displayedPrice;
      return Number(observation.price);
    }

    function getTotalAmountPaid(observation, displayedPrice = getDisplayedPrice(observation)) {
      const totalAmountPaid = Number(observation.totalAmountPaid);
      if (Number.isFinite(totalAmountPaid) && totalAmountPaid > 0) return totalAmountPaid;
      return displayedPrice;
    }

    function getItemsReceived(observation) {
      const itemsReceived = Number(observation.itemsReceived);
      if (Number.isFinite(itemsReceived) && itemsReceived > 0) return itemsReceived;
      return 1;
    }

    function getDiscountPercentage(observation) {
      if (observation.discountPercentage === null || observation.discountPercentage === undefined || observation.discountPercentage === "") return Number.NaN;
      const discountPercentage = Number(observation.discountPercentage);
      return Number.isFinite(discountPercentage) ? discountPercentage : Number.NaN;
    }

    function getDiscountAmount(observation) {
      if (observation.discountAmount === null || observation.discountAmount === undefined || observation.discountAmount === "") return Number.NaN;
      const discountAmount = Number(observation.discountAmount);
      return Number.isFinite(discountAmount) ? discountAmount : Number.NaN;
    }

    function calculateEffectiveItemPrice(observation) {
      const displayedPrice = getDisplayedPrice(observation);
      const dealType = getDealType(observation);
      const totalAmountPaid = getTotalAmountPaid(observation, displayedPrice);
      const itemsReceived = getItemsReceived(observation);
      const discountPercentage = getDiscountPercentage(observation);
      const discountAmount = getDiscountAmount(observation);

      if (!Number.isFinite(displayedPrice) || displayedPrice <= 0) return Number.NaN;

      if (dealType === "b1g1") return totalAmountPaid / 2;
      if (dealType === "bundle") return totalAmountPaid / itemsReceived;
      if (dealType === "second-half") return (displayedPrice * 1.5) / 2;
      if (dealType === "percentage") return displayedPrice * (1 - discountPercentage / 100);
      if (dealType === "fixed") return displayedPrice - discountAmount;
      if (dealType === "custom") return totalAmountPaid / itemsReceived;
      return displayedPrice;
    }

    function getExchangeRateToHKD(observation) {
      const rate = Number(observation?.exchangeRateToHKD);
      if (Number.isFinite(rate) && rate > 0) return rate;
      return 1;
    }

    function calculateEffectiveItemPriceOriginalCurrency(observation) {
      return calculateEffectiveItemPrice(observation);
    }

    function calculateHKDEffectiveItemPrice(observation) {
      const originalPrice = calculateEffectiveItemPriceOriginalCurrency(observation);
      if (!Number.isFinite(originalPrice)) return Number.NaN;
      return originalPrice * getExchangeRateToHKD(observation);
    }

    function calculateUnitPriceFromItemPrice(itemPrice, quantity, unit) {
      if (!Number.isFinite(itemPrice) || !Number.isFinite(quantity) || quantity <= 0) {
        return { value: Number.NaN, label: "" };
      }

      if (unit === "ml") return { value: (itemPrice / quantity) * 100, label: "每 100ml" };
      if (unit === "L") return { value: (itemPrice / (quantity * 1000)) * 100, label: "每 100ml" };
      if (unit === "g") return { value: (itemPrice / quantity) * 100, label: "每 100g" };
      if (unit === "kg") return { value: (itemPrice / (quantity * 1000)) * 100, label: "每 100g" };
      if (unit === "pcs") return { value: itemPrice / quantity, label: "每 pc" };
      if (unit === "pack") return { value: itemPrice / quantity, label: "每 pack" };
      return { value: itemPrice / quantity, label: `每 ${unit || "單位"}` };
    }

    function calculateEffectiveUnitPriceOriginalCurrency(observation) {
      return calculateUnitPriceFromItemPrice(
        calculateEffectiveItemPriceOriginalCurrency(observation),
        Number(observation.quantity),
        observation.unit
      );
    }

    function calculateHKDUnitPrice(observation) {
      return calculateUnitPriceFromItemPrice(
        calculateHKDEffectiveItemPrice(observation),
        Number(observation.quantity),
        observation.unit
      );
    }

    function calculateUnitPrice(observation) {
      // All stats and Cheap / Normal / Expensive comparisons use HKD-equivalent unit price.
      return calculateHKDUnitPrice(observation);
    }

    function calculateUnitPriceOriginalCurrency(observation) {
      const price = calculateEffectiveItemPriceOriginalCurrency(observation);
      const quantity = Number(observation.quantity);
      const unit = observation.unit;

      return calculateUnitPriceFromItemPrice(price, quantity, unit);
    }

    function formatUnitPrice(value, label) {
      if (!Number.isFinite(value)) return "未有資料";
      return `${money(value)} ${label || ""}`.trim();
    }

    function formatUnitPriceWithCurrency(value, label, currency = "HKD") {
      if (!Number.isFinite(value)) return "未有資料";
      return `${moneyWithCurrency(value, currency)} ${label || ""}`.trim();
    }

    function getStats(productId) {
      const observations = getProductObservations(productId);
      const latest = observations[0] || null;
      const unitPrices = observations
        .map((observation) => ({ observation, unit: calculateUnitPrice(observation) }))
        .filter((entry) => Number.isFinite(entry.unit.value));

      const values = unitPrices.map((entry) => entry.unit.value);
      const latestUnit = latest ? calculateUnitPrice(latest) : { value: Number.NaN, label: unitPrices[0]?.unit.label || "" };
      const lowest = values.length ? Math.min(...values) : Number.NaN;
      const highest = values.length ? Math.max(...values) : Number.NaN;
      const average = values.length ? values.reduce((sum, value) => sum + value, 0) / values.length : Number.NaN;
      const status = getPriceStatus(observations.length, latestUnit.value, lowest, average);

      return {
        latest,
        latestUnitPrice: latestUnit.value,
        unitLabel: latestUnit.label || unitPrices[0]?.unit.label || "",
        lowest,
        highest,
        average,
        status: status.status,
        reason: status.reason
      };
    }

    function getPriceStatus(count, latestUnitPrice, lowest, average) {
      if (count <= 1 || !Number.isFinite(latestUnitPrice)) {
        return { status: "new", reason: "暫時只有一筆紀錄" };
      }

      if (Number.isFinite(lowest) && latestUnitPrice <= lowest * 1.1) {
        return { status: "cheap", reason: "接近歷史最低價" };
      }

      if (Number.isFinite(average) && latestUnitPrice > average * 1.15) {
        return { status: "expensive", reason: "比平時價格高" };
      }

      return { status: "normal", reason: "大約等於平時價格" };
    }

    async function deleteProduct(productId) {
      const product = findProduct(productId);
      if (!product) return;
      const ok = window.confirm("刪除產品會同時刪除相關價格記錄。確定刪除？");
      if (!ok) return;

      const productImageKey = product.productImageKey || product.imageKey || "";
      state.data.products = state.data.products.filter((item) => item.id !== productId);
      state.data.observations = state.data.observations.filter((item) => item.productId !== productId);
      saveData();
      if (productImageKey) {
        try {
          await deleteImageBlob(productImageKey);
        } catch (error) {
          // The product no longer references this local image, so a stale blob is harmless.
        }
        revokeImageObjectUrl(productImageKey);
      }
      showToast("產品已刪除。");
      renderHome();
    }

    function deleteObservation(productId, observationId) {
      const ok = window.confirm("確定刪除此價格記錄？");
      if (!ok) return;
      state.data.observations = state.data.observations.filter((item) => item.id !== observationId);
      const product = findProduct(productId);
      if (product) product.updatedAt = nowIso();
      saveData();
      showToast("價格記錄已刪除。");
      renderProductDetail(productId);
    }

    function exportBackup() {
      const payload = JSON.stringify(state.data, null, 2);
      const textarea = document.querySelector("#backupJson");
      if (textarea) textarea.value = payload;

      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `barcode-price-backup-${today()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("已匯出備份。");
    }

    async function copyBackup() {
      const textarea = document.querySelector("#backupJson");
      const payload = textarea?.value.trim() || JSON.stringify(state.data, null, 2);
      if (textarea && !textarea.value.trim()) textarea.value = payload;

      try {
        await navigator.clipboard.writeText(payload);
        showToast("已複製 JSON。");
      } catch (error) {
        if (textarea) {
          textarea.focus();
          textarea.select();
        }
        showToast("請手動複製文字框內容。");
      }
    }

    function importBackup() {
      const textarea = document.querySelector("#backupJson");
      const raw = textarea?.value.trim();
      if (!raw) {
        showToast("請先貼上 JSON 備份。");
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (error) {
        showToast("JSON 格式不正確。");
        return;
      }

      if (!Array.isArray(parsed.products) || !Array.isArray(parsed.observations)) {
        showToast("備份內容缺少 products 或 observations。");
        return;
      }

      state.pendingImport = {
        products: parsed.products.map(normalizeProductRecord),
        observations: parsed.observations,
        stores: Array.isArray(parsed.stores) ? parsed.stores : []
      };

      const warning = document.querySelector("#importWarning");
      if (warning) {
        warning.innerHTML = `
          <div class="notice danger-note">
            匯入會覆蓋現有本機資料。備份內有 ${parsed.products.length} 個產品、${parsed.observations.length} 筆價格記錄及 ${Array.isArray(parsed.stores) ? parsed.stores.length : 0} 間店舖。Logo 或產品圖片檔不會由 JSON 備份還原。
          </div>
          <div class="button-row">
            <button class="btn-danger" type="button" data-action="confirm-import-json">確認匯入</button>
            <button class="btn-plain" type="button" data-action="cancel-import-json">取消匯入</button>
          </div>
        `;
      }
    }

    function confirmImportBackup() {
      if (!state.pendingImport) {
        showToast("請先貼上有效 JSON 備份。");
        return;
      }

      state.data = state.pendingImport;
      state.pendingImport = null;
      saveData();
      showToast("備份已匯入。");
      renderHome();
    }

    function cancelImportBackup() {
      state.pendingImport = null;
      const warning = document.querySelector("#importWarning");
      if (warning) warning.innerHTML = "";
      showToast("已取消匯入。");
    }

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      if (!window.isSecureContext) return;
      navigator.serviceWorker.register("./service-worker.js").catch(() => {});
    }
  </script>
</body>
</html>
