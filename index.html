    function createBackupPayload() {
      return backupService.stringifyEnvelope(state.data, 2);
    }

    function exportBackup() {
      let payload;
      try {
        payload = createBackupPayload();
      } catch (error) {
        showToast("現有資料完整性檢查失敗，未能匯出。");
        return;
      }

      const textarea = document.querySelector("#backupJson");
      if (textarea) textarea.value = payload;

      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `barcode-price-backup-v${BACKUP_FORMAT_VERSION}-${today()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("已匯出已驗證備份。");
    }

    async function copyBackup() {
      const textarea = document.querySelector("#backupJson");
      let payload = textarea?.value.trim();

      if (!payload) {
        try {
          payload = createBackupPayload();
        } catch (error) {
          showToast("現有資料完整性檢查失敗，未能複製。");
          return;
        }
        if (textarea) textarea.value = payload;
      }

      try {
        await navigator.clipboard.writeText(payload);
        showToast("已複製 JSON。");
      } catch (error) {
        if (textarea) {
          textarea.focus();
          textarea.select();
        }
        showToast("請手動複製文字框內容。");
      }
    }

    function resetPendingImport() {
      state.pendingImport = null;
      state.pendingImportReport = null;
      state.pendingImportValidation = null;
      state.pendingImportBackupInfo = null;
    }

    function importBackup() {
      const textarea = document.querySelector("#backupJson");
      const raw = textarea?.value.trim();
      if (!raw) {
        showToast("請先貼上 JSON 備份。");
        return;
      }

      let preparedImport;
      try {
        preparedImport = backupService.prepareImport(raw);
      } catch (error) {
        resetPendingImport();

        if (error?.code === "INVALID_JSON") {
          showToast("JSON 格式不正確。");
        } else if (error?.code === "CHECKSUM_MISMATCH") {
          showToast("備份 checksum 不一致，已停止匯入。");
        } else if (error?.code === "UNSUPPORTED_FUTURE_SCHEMA") {
          showToast(`此備份需要支援 schema v${error.sourceVersion} 的版本。`);
        } else if (error?.code === "UNSUPPORTED_BACKUP_FORMAT") {
          showToast(`此備份格式 v${error.sourceVersion} 較新。`);
        } else if (error?.code === "DATA_VALIDATION_FAILED") {
          showToast(`資料驗證失敗：${error.validation?.errors?.[0] || "內容不完整"}`);
        } else {
          showToast(error?.message || "備份資料未能驗證。");
        }
        return;
      }

      state.pendingImport = preparedImport.data;
      state.pendingImportReport = preparedImport.migrationReport;
      state.pendingImportValidation = preparedImport.validation;
      state.pendingImportBackupInfo = preparedImport.backupInfo;

      const validation = preparedImport.validation;
      const backupInfo = preparedImport.backupInfo;
      const migrationReport = preparedImport.migrationReport;
      const warningItems = validation.warnings
        .slice(0, 5)
        .map((warning) => `<li>${escapeHtml(warning)}</li>`)
        .join("");
      const remainingWarnings = Math.max(0, validation.warnings.length - 5);

      const warning = document.querySelector("#importWarning");
      if (warning) {
        warning.innerHTML = `
          <div class="notice danger-note">
            <strong>匯入前驗證完成</strong><br>
            ${validation.summary.products} 個產品、${validation.summary.observations} 筆價格記錄、${validation.summary.stores} 間店舖。<br>
            備份格式：${backupInfo.legacy ? "舊版 raw JSON" : `v${backupInfo.formatVersion}`}${backupInfo.integrityVerified ? " · checksum 已驗證" : ""}<br>
            Data schema：v${migrationReport.sourceVersion} → v${migrationReport.currentVersion}${migrationReport.didMigrate ? "（將自動轉換）" : ""}<br>
            Migration log：${validation.summary.migrationSteps} 筆<br>
            匯入前會自動保存目前文字資料；圖片不會被刪除或由 JSON 還原。需要連圖片一併還原時，請使用上方完整 ZIP。
          </div>
          ${warningItems ? `
            <div class="notice">
              <strong>注意事項</strong>
              <ul>${warningItems}</ul>
              ${remainingWarnings ? `<div>另有 ${remainingWarnings} 項提示。</div>` : ""}
            </div>
          ` : ""}
          <div class="button-row">
            <button class="btn-danger" type="button" data-action="confirm-import-json">確認匯入</button>
            <button class="btn-plain" type="button" data-action="cancel-import-json">取消匯入</button>
          </div>
        `;
      }
    }

    async function confirmImportBackup() {
      if (!state.pendingImport) {
        showToast("請先貼上有效 JSON 備份。");
        return;
      }

      const ok = await showNativeConfirm({
        title: "覆蓋現有資料？",
        message: state.cloudSync.initialized
          ? "系統會先保存目前文字資料，再以備份完整取代本機及 Cloud 文字資料，不會 merge。產品圖片及店舖 Logo 不會被刪除。"
          : "系統會先自動保存目前文字資料，再匯入已驗證的備份。產品圖片及店舖 Logo 不會被刪除。",
        confirmLabel: "匯入"
      });

      if (!ok) return;

      try {
        const result = dataService.importAtomically(state.pendingImport, {
          reason: "before-import"
        });

        state.data = result.data;
        cloudSyncService.recordLocalData(state.data);
        resetPendingImport();
        showToast(
          state.cloudSync.initialized
            ? "備份已匯入，正同步取代 Cloud 文字資料。"
            : "備份已安全匯入。"
        );
        renderHome();
      } catch (error) {
        showToast("匯入失敗，原有資料已保留。");
      }
    }

    function cancelImportBackup() {
      resetPendingImport();
      const warning = document.querySelector("#importWarning");
      if (warning) warning.innerHTML = "";
      showToast("已取消匯入。");
    }



    let activeCloudSyncAttachment = "";
    let activeCloudImageAttachment = "";
    let cloudSyncRenderTimer = 0;
    let cloudImageRenderTimer = 0;

    function handleCloudDataApplied(context = {}) {
      if (context.source !== "cloud") return;

      if (!cloudRecoveryBusy()) {
        cloudImageService
          .syncReferences(state.data, { source: "cloud" })
          .catch((error) => {
            console.warn("Remote image reference update failed:", error);
          });
      }

      if (state.currentViewKey === "home") {
        renderHome();
      } else if (state.currentViewKey === "stores") {
        renderStores();
      } else if (state.currentViewKey === "settings:cloud") {
        renderCloudSettings();
      } else {
        showToast("另一部裝置的 Cloud 資料已更新。");
      }
    }

    function canAttachCloudSync(status = state.cloud) {
      const mode = state.cloudProfile?.mode || "local";
      if (mode === "local") return false;
      if (!status.initialized || !status.authenticated || !status.user?.uid) {
        return false;
      }

      if (mode === "shared") {
        return status.approval === "approved";
      }

      return true;
    }

    async function updateCloudImageAttachment(status = state.cloud) {
      if (
        !canAttachCloudSync(status) ||
        !state.cloudSync.initialized
      ) {
        activeCloudImageAttachment = "";
        await cloudImageService.detach();
        return;
      }

      const services = firebaseService.getServices();
      if (!services?.storage || !services?.modules?.storage) return;

      const key = `${status.projectId}::${status.user.uid}`;
      if (
        activeCloudImageAttachment === key &&
        state.cloudImages.attached
      ) {
        return;
      }

      activeCloudImageAttachment = key;

      try {
        await cloudImageService.attach({
          services,
          projectId: status.projectId,
          uid: status.user.uid,
          basePath: firebaseService.getUserStoragePath(status.user.uid)
        });
      } catch (error) {
        console.warn("Cloud image sync attachment failed:", error);
      }
    }

    async function updateCloudSyncAttachment(status = state.cloud) {
      if (!canAttachCloudSync(status)) {
        activeCloudSyncAttachment = "";
        await cloudSyncService.detach();
        return;
      }

      const services = firebaseService.getServices();
      if (!services?.firestore) return;

      const key = `${status.projectId}::${status.user.uid}`;
      if (activeCloudSyncAttachment === key && state.cloudSync.attached) {
        return;
      }

      activeCloudSyncAttachment = key;

      try {
        await cloudSyncService.attach({
          services,
          projectId: status.projectId,
          uid: status.user.uid,
          basePath: firebaseService.getUserDocumentPath(status.user.uid)
        });
      } catch (error) {
        console.warn("Cloud data sync attachment failed:", error);
      }
    }

    function installFirebaseFoundation() {
      cloudImageService.subscribe((status) => {
        state.cloudImages = status;

        window.clearTimeout(cloudImageRenderTimer);
        cloudImageRenderTimer = window.setTimeout(() => {
          if (
            state.currentViewKey === "settings:cloud" &&
            !document.querySelector(".cloud-config-card input:focus")
          ) {
            renderCloudSettings({ onboarding: state.cloudOnboarding });
          }
        }, 80);
      });

      cloudSyncService.subscribe((status) => {
        state.cloudSync = status;
        updateCloudImageAttachment(state.cloud).catch((error) => {
          console.warn("Cloud image state update failed:", error);
        });

        window.clearTimeout(cloudSyncRenderTimer);
        cloudSyncRenderTimer = window.setTimeout(() => {
          if (
            state.currentViewKey === "settings:cloud" &&
            !document.querySelector(".cloud-config-card input:focus")
          ) {
            renderCloudSettings({ onboarding: state.cloudOnboarding });
          }
        }, 80);
      });

      firebaseService.subscribe((status) => {
        state.cloud = status;
        updateCloudSyncAttachment(status).catch((error) => {
          console.warn("Cloud sync state update failed:", error);
        });
        updateCloudImageAttachment(status).catch((error) => {
          console.warn("Cloud image state update failed:", error);
        });

        if (
          state.currentViewKey === "settings:cloud" &&
          !document.querySelector(".cloud-config-card input:focus")
        ) {
          renderCloudSettings({ onboarding: state.cloudOnboarding });
        }
      });

      connectCurrentCloudProfile().catch((error) => {
        console.warn("Cloud profile connection failed:", error);
      });
    }

    function installFixedTopbarSpacing() {
      document.documentElement.style.setProperty(
        "--topbar-space",
        "calc(env(safe-area-inset-top, 0px) + 64px)"
      );
    }

    function installNativeConfirmDialog() {
      if (!iosConfirmOverlay) return;

      iosConfirmOverlay.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-confirm-action]");
        if (!actionButton) return;
        closeNativeConfirm(actionButton.dataset.confirmAction === "confirm");
      });

      document.addEventListener("keydown", (event) => {
        if (iosConfirmOverlay.hidden) return;

        if (event.key === "Escape") {
          event.preventDefault();
          closeNativeConfirm(false);
          return;
        }

        if (event.key === "Tab") {
          const buttons = [...iosConfirmOverlay.querySelectorAll("button:not(:disabled)")];
          if (!buttons.length) return;
          const first = buttons[0];
          const last = buttons[buttons.length - 1];

          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });
    }

    function showNativeConfirm({
      title = "確定執行？",
      message = "",
      confirmLabel = "確定"
    } = {}) {
      if (!iosConfirmOverlay) {
        return Promise.resolve(false);
      }

      if (iosConfirmResolver) {
        iosConfirmResolver(false);
        iosConfirmResolver = null;
      }

      iosConfirmRestoreFocus = document.activeElement instanceof HTMLElement
        ? document.activeElement
        : null;

      iosConfirmTitle.textContent = title;
      iosConfirmMessage.textContent = message;
      iosConfirmButton.textContent = confirmLabel;
      iosConfirmOverlay.hidden = false;
      iosConfirmOverlay.setAttribute("aria-hidden", "false");

      requestAnimationFrame(() => {
        iosConfirmOverlay.classList.add("is-visible");
        const cancelButton = iosConfirmOverlay.querySelector('[data-confirm-action="cancel"]');
        cancelButton?.focus({ preventScroll: true });
      });

      return new Promise((resolve) => {
        iosConfirmResolver = resolve;
      });
    }

    function closeNativeConfirm(confirmed) {
      if (!iosConfirmOverlay || iosConfirmOverlay.hidden) return;

      iosConfirmOverlay.classList.remove("is-visible");
      iosConfirmOverlay.setAttribute("aria-hidden", "true");

      const resolver = iosConfirmResolver;
      iosConfirmResolver = null;

      window.setTimeout(() => {
        iosConfirmOverlay.hidden = true;
        if (iosConfirmRestoreFocus?.isConnected) {
          iosConfirmRestoreFocus.focus({ preventScroll: true });
        }
        iosConfirmRestoreFocus = null;
        resolver?.(Boolean(confirmed));
      }, window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 190);
    }

    function isKeyboardInput(element) {
      if (!(element instanceof HTMLElement)) return false;
      if (element instanceof HTMLTextAreaElement || element.isContentEditable) return true;
      if (element instanceof HTMLSelectElement) return true;
      if (!(element instanceof HTMLInputElement)) return false;

      return ![
        "button",
        "submit",
        "reset",
        "checkbox",
        "radio",
        "range",
        "color",
        "file",
        "image",
        "hidden"
      ].includes(String(element.type || "text").toLowerCase());
    }

    function setKeyboardTabbarState(isOpen) {
      const tabbar = document.querySelector("#tabbar");
      if (!tabbar) return;
      tabbar.classList.toggle("is-keyboard-open", isOpen);
      document.body.classList.toggle("keyboard-open", isOpen);
    }

    function installKeyboardAwareTabbar() {
      let focusTimer = 0;

      const syncFromFocus = () => {
        window.clearTimeout(focusTimer);
        focusTimer = window.setTimeout(() => {
          setKeyboardTabbarState(isKeyboardInput(document.activeElement));
        }, 80);
      };

      document.addEventListener("focusin", (event) => {
        if (isKeyboardInput(event.target)) {
          window.clearTimeout(focusTimer);
          setKeyboardTabbarState(true);
        }
      });

      document.addEventListener("focusout", syncFromFocus);

      if (window.visualViewport) {
        let largestViewportHeight = window.visualViewport.height;

        const syncFromViewport = () => {
          const viewportHeight = window.visualViewport.height;
          if (!isKeyboardInput(document.activeElement)) {
            largestViewportHeight = Math.max(largestViewportHeight, viewportHeight);
          }

          const keyboardLikelyOpen =
            isKeyboardInput(document.activeElement) &&
            largestViewportHeight - viewportHeight > 100;

          setKeyboardTabbarState(
            keyboardLikelyOpen || isKeyboardInput(document.activeElement)
          );
        };

        window.visualViewport.addEventListener("resize", syncFromViewport);
        window.visualViewport.addEventListener("scroll", syncFromViewport);
      }
    }

    function installNativeInteractionGuards() {
      const blockGesture = (event) => {
        event.preventDefault();
      };

      let topOverscrollStartX = 0;
      let topOverscrollStartY = 0;
      let topOverscrollTouchActive = false;

      document.addEventListener("gesturestart", blockGesture, { passive: false });
      document.addEventListener("gesturechange", blockGesture, { passive: false });
      document.addEventListener("gestureend", blockGesture, { passive: false });

      document.addEventListener("touchstart", (event) => {
        if (!event.touches || event.touches.length !== 1) {
          topOverscrollTouchActive = false;
          return;
        }

        const touch = event.touches[0];
        topOverscrollStartX = touch.clientX;
        topOverscrollStartY = touch.clientY;
        topOverscrollTouchActive = getAppScrollTop() <= 0;
      }, { passive: true });

      document.addEventListener("touchmove", (event) => {
        if (!event.touches) return;

        if (event.touches.length > 1) {
          event.preventDefault();
          return;
        }

        if (!topOverscrollTouchActive || getAppScrollTop() > 0) return;

        const touch = event.touches[0];
        const deltaX = touch.clientX - topOverscrollStartX;
        const deltaY = touch.clientY - topOverscrollStartY;

        const isDownwardPull =
          deltaY > 4 &&
          Math.abs(deltaY) > Math.abs(deltaX);

        // When custom pull-to-refresh is active, its own handler controls the gesture.
        // Otherwise prevent Safari's native rubber-band from exposing a large gap above the Top Bar.
        if (isDownwardPull && !state.pullTracking && !state.pullRefreshing) {
          event.preventDefault();
        }
      }, { passive: false });

      document.addEventListener("touchend", () => {
        topOverscrollTouchActive = false;
      }, { passive: true });

      document.addEventListener("touchcancel", () => {
        topOverscrollTouchActive = false;
      }, { passive: true });

      document.addEventListener("selectstart", (event) => {
        const target = event.target;
        if (
          target instanceof HTMLInputElement ||
          target instanceof HTMLTextAreaElement ||
          target instanceof HTMLSelectElement ||
          target?.isContentEditable
        ) {
          return;
        }
        event.preventDefault();
      });
    }

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      if (!window.isSecureContext) return;

      try {
        const registration = await navigator.serviceWorker.register(
          "./service-worker.js?v=v86",
          { updateViaCache: "none" }
        );
        await registration.update();
      } catch (error) {
        console.warn("Service worker registration failed:", error);
      }
    }
  </script>
